                    this.ctx.fillStyle = '#b2aca4';
                    this.ctx.font = '13px Arial';
                    this.ctx.fillText(`Click a cell in rows ${p === 1 ? P1_ZONE[0] + '-' + P1_ZONE[1] + ' (top)' : P2_ZONE[0] + '-' + P2_ZONE[1] + ' (bottom)'}`, CANVAS_W / 2, UI_TOP + 100);
                } else {
                    this.ctx.fillText('All units placed!', CANVAS_W / 2, UI_TOP + 75);
                }

                // Auto-place button
                if (unplaced.length > 0) {
                    this.drawButton(game, 'auto_place', CANVAS_W / 2 - 100, UI_TOP + 130, 200, 40, 'Auto-Place Remaining', {color: '#3a5a9a'});
                }
            }

            drawPlan(game) {
                let p = game.phase === 'PLAN_P1' ? 1 : 2;
                let units = game.phase === 'PLAN_P1' ? game.p1Units : game.p2Units;
                let ordered = units.filter(u => u.ordered).length;
                let color = p === 1 ? P1_COLOR : P2_COLOR;

                // Header
                this.ctx.fillStyle = color;
                this.ctx.fillRect(0, UI_TOP + 10, CANVAS_W, 34);
                this.ctx.fillStyle = '#fff';
                this.ctx.font = 'bold 16px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText(`Player ${p} — Planning  (${ordered}/${units.length} ordered)`, CANVAS_W / 2, UI_TOP + 33);

                this.ctx.textAlign = 'left';
                this.ctx.fillStyle = '#eeeeee';
                this.ctx.font = '14px Arial';

                if (game.selectedUnit) {
                    let u = game.selectedUnit;
                    let s = STATS[u.type];
                    this.ctx.fillText(`Selected: ${u.type}`, 14, UI_TOP + 70);
                    this.ctx.font = '12px Arial';
                    this.ctx.fillStyle = '#b2aca4';
                    this.ctx.fillText(`HP ${u.hp}/${u.maxHp} · Move ${s.mov} · Range ${s.rng}`, 14, UI_TOP + 90);

                    if (game.planStep === 'MOVE') {
                        this.ctx.fillStyle = '#46d246';
                        this.ctx.font = 'bold 13px Arial';
                        this.ctx.fillText('Step 1: Click a green tile to move, or click your own', 14, UI_TOP + 115);
                        this.ctx.fillText('unit\'s tile (marked HOLD) to stay put.', 14, UI_TOP + 133);
                        this.drawButton(game, 'plan_deselect', 14, UI_TOP + 148, 160, 34, '✕ Deselect', {color: '#7a3a3a'});
                    } else if (game.planStep === 'ATTACK') {
                        this.ctx.fillStyle = '#ff8844';
                        this.ctx.font = 'bold 13px Arial';
                        this.ctx.fillText('Step 2: Click a target / direction to attack', 14, UI_TOP + 115);
                        this.drawButton(game, 'plan_skip_attack', 14, UI_TOP + 130, 180, 36, 'Skip Attack', {color: '#555'});
                        this.drawButton(game, 'plan_reset_move', 210, UI_TOP + 130, 140, 36, '← Redo Move', {color: '#5a5a8a'});
                        this.drawButton(game, 'plan_deselect', 360, UI_TOP + 130, 140, 36, '✕ Deselect', {color: '#7a3a3a'});

                        // Class-specific ability buttons (second row at UI_TOP + 174)
                        let abilityY = UI_TOP + 174;
                        if (u.type === 'Rogue') {
                            this.drawButton(game, 'ability_trap', 14, abilityY, 180, 36, '🧨 Place Trap', {color: '#a06030', font: 'bold 13px Arial'});
                        }
                        if (u.type === 'Adept') {
                            this.drawButton(game, 'ability_beacon', 14, abilityY, 180, 36, '🔮 Beacon', {color: '#6a4aa0', font: 'bold 13px Arial'});
                        }
                        if (u.type === 'Assassin') {
                            if (u.stealthed) {
                                this.drawButton(game, 'ability_strike', 14, abilityY, 200, 36, '🗡 Shadow Strike', {color: '#5a2a6a', font: 'bold 13px Arial'});
                            } else {
                                this.drawButton(game, 'ability_vanish', 14, abilityY, 200, 36, '👻 Vanish (Stealth)', {color: '#3a3a5a', font: 'bold 13px Arial'});
                            }
                        }
                        let isHeavy = u.type === 'Knight' || u.type === 'Paladin';
                        let movedOne = u.plannedR != null && u.plannedC != null
                            && Math.max(Math.abs(u.plannedR - u.r), Math.abs(u.plannedC - u.c)) <= 1;
                        if (isHeavy && movedOne) {
                            this.drawButton(game, 'ability_aid', 230, abilityY, 180, 36, '✚ Lend Aid', {color: '#3a8a4a', font: 'bold 13px Arial'});
                        }
                        if (u.type === 'Archmage' && !u.archmageState) {
                            this.drawButton(game, 'ability_channel', 14, abilityY, 200, 36, '🌀 Channel Rain Fire', {color: '#3a3a8a', font: 'bold 13px Arial'});
                        }
                    } else if (game.planStep === 'RAIN') {
                        this.ctx.fillStyle = '#ff8030';
                        this.ctx.font = 'bold 13px Arial';
                        this.ctx.fillText('Click a tile within 6 — Rain Fire hits a 3x3 area (14 Magic center, 7 around)', 14, UI_TOP + 115);
                        this.drawButton(game, 'plan_deselect', 14, UI_TOP + 130, 200, 36, '✕ Deselect (re-pick later)', {color: '#7a3a3a'});
                    } else if (game.planStep === 'BLINK') {
                        this.ctx.fillStyle = '#80c0ff';
                        this.ctx.font = 'bold 13px Arial';
                        this.ctx.fillText('Exhausted — Click any empty tile within 5 to BLINK there. No attack this turn.', 14, UI_TOP + 115);
                        this.drawButton(game, 'plan_deselect', 14, UI_TOP + 130, 200, 36, '✕ Deselect (re-pick later)', {color: '#7a3a3a'});
                    } else if (game.planStep === 'STRIKE') {
                        this.ctx.fillStyle = '#c060ff';
                        this.ctx.font = 'bold 13px Arial';
                        this.ctx.fillText('Pick a direction (1 tile from your move). Strike kills if enemy ends there & you are behind them.', 14, UI_TOP + 115);
                        this.drawButton(game, 'plan_cancel_ability', 14, UI_TOP + 130, 220, 36, '← Back to Attack', {color: '#5a5a8a'});
                        this.drawButton(game, 'plan_deselect', 250, UI_TOP + 130, 140, 36, '✕ Deselect', {color: '#7a3a3a'});
                    } else if (game.planStep === 'TRAP') {
                        this.ctx.fillStyle = '#e08040';
                        this.ctx.font = 'bold 13px Arial';
                        this.ctx.fillText('Click a tile within 2 squares to place your trap (no attack this turn)', 14, UI_TOP + 115);
                        this.drawButton(game, 'plan_cancel_ability', 14, UI_TOP + 130, 220, 36, '← Back to Attack', {color: '#5a5a8a'});
                        this.drawButton(game, 'plan_deselect', 250, UI_TOP + 130, 140, 36, '✕ Deselect', {color: '#7a3a3a'});
                    } else if (game.planStep === 'BEACON') {
                        this.ctx.fillStyle = '#b080ff';
                        this.ctx.font = 'bold 13px Arial';
                        this.ctx.fillText('Click any tile to plant your beacon (Adept skips firebolt). Friendly Archers can hit it for 3X.', 14, UI_TOP + 115);
                        this.drawButton(game, 'plan_cancel_ability', 14, UI_TOP + 130, 220, 36, '← Back to Attack', {color: '#5a5a8a'});
                        this.drawButton(game, 'plan_deselect', 250, UI_TOP + 130, 140, 36, '✕ Deselect', {color: '#7a3a3a'});
                    } else if (game.planStep === 'AID') {
                        this.ctx.fillStyle = '#7adc7a';
                        this.ctx.font = 'bold 13px Arial';
                        this.ctx.fillText('Click an adjacent friendly to lend aid (+2 HP)', 14, UI_TOP + 115);
                        this.drawButton(game, 'plan_cancel_ability', 14, UI_TOP + 130, 220, 36, '← Back to Attack', {color: '#5a5a8a'});
                        this.drawButton(game, 'plan_deselect', 250, UI_TOP + 130, 140, 36, '✕ Deselect', {color: '#7a3a3a'});
                    }
                } else {
                    this.ctx.fillText('Click a unit on the board to give it orders.', 14, UI_TOP + 70);
                }

                // Unordered-unit quick-pick list
                let unordered = units.filter(u => !u.ordered);
                if (unordered.length > 0 && !game.selectedUnit) {
                    this.ctx.fillStyle = '#b2aca4';
                    this.ctx.font = '11px Arial';
                    this.ctx.textAlign = 'left';
                    this.ctx.fillText(`Un-ordered (${unordered.length}):`, 14, UI_TOP + 115);
                    for (let i = 0; i < unordered.length; i++) {
                        let u = unordered[i];
                        let col = i % 4;
                        let row = Math.floor(i / 4);
                        let x = 14 + col * 160;
                        let y = UI_TOP + 130 + row * 30;
                        this.drawButton(game, `pick_${units.indexOf(u)}`, x, y, 150, 26, `${u.type} (${u.r},${u.c})`, {color: '#3a5a9a', font: 'bold 11px Arial'});
                    }
                }

                // Ready button — pinned above the game board (between the
                // turn/army-count strip and the isometric grid) so it's in
                // the player's primary eyeline while planning, not tucked
                // below the board.
                let allReady = ordered === units.length;
                let btnW = 240, btnH = 34;
                let btnX = CANVAS_W / 2 - btnW / 2;
                let btnY = 8;
                this.drawButton(game, 'plan_ready', btnX, btnY, btnW, btnH,
                    allReady ? 'Ready — Resolve Turn →' : `Finish orders (${units.length - ordered} left)`,
                    {color: allReady ? '#46a046' : '#2a2a2a', enabled: allReady, font: 'bold 13px Arial'});
            }

            drawReady(game) {
                let cx = CANVAS_W / 2;
                this.ctx.fillStyle = '#eeeeee';
                this.ctx.font = 'bold 20px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('Both players ready!', cx, UI_TOP + 60);
                this.drawButton(game, 'resolve', cx - 160, UI_TOP + 100, 320, 50, '⚔ Resolve Battle', {color: '#af2626', font: 'bold 18px Arial'});
            }

            drawGameOver(game) {
                let cx = CANVAS_W / 2;
                let winner = game.p1Units.length > 0 ? 1 : (game.p2Units.length > 0 ? 2 : 0);
                this.ctx.fillStyle = '#eeeeee';
                this.ctx.font = 'bold 24px Arial';
                this.ctx.textAlign = 'center';
                if (game.gameMode === 'Campaign') {
                    this.ctx.fillText(winner === 0 ? 'DRAW!' : `Player ${winner} wins match ${game.campaignMatch}!`, cx, UI_TOP + 45);
                    this.ctx.font = '16px Arial';
                    this.ctx.fillStyle = '#b2aca4';
                    this.ctx.fillText(`Score: You ${game.campaignScore[0]} — ${game.campaignScore[1]} AI`, cx, UI_TOP + 75);
                    let neededToWin = Math.ceil(game.campaignTotal / 2);
                    if (game.campaignScore[0] >= neededToWin) {
                        this.ctx.fillStyle = '#46d246';
                        this.ctx.font = 'bold 22px Arial';
                        this.ctx.fillText('🏆 CAMPAIGN VICTORY! 🏆', cx, UI_TOP + 115);
                        this.drawButton(game, 'new_game', cx - 110, UI_TOP + 140, 220, 44, 'New Game', {color: '#46a046'});
                    } else if (game.campaignScore[1] >= neededToWin) {
                        this.ctx.fillStyle = '#ff4444';
                        this.ctx.font = 'bold 22px Arial';
                        this.ctx.fillText('✗ CAMPAIGN DEFEAT ✗', cx, UI_TOP + 115);
                        this.drawButton(game, 'new_game', cx - 110, UI_TOP + 140, 220, 44, 'New Game', {color: '#46a046'});
                    } else {
                        this.ctx.fillStyle = '#46d246';
                        this.ctx.font = '14px Arial';
                        this.ctx.fillText(`Next match: ${game.campaignMatch + 2} token budget`, cx, UI_TOP + 110);
                        this.drawButton(game, 'next_match', cx - 240, UI_TOP + 140, 230, 44, 'Next Match →', {color: '#46a046'});
                        this.drawButton(game, 'new_game', cx + 10, UI_TOP + 140, 230, 44, 'Quit Campaign', {color: '#7a3a3a'});
                    }
                } else {
                    this.ctx.fillText(winner === 0 ? 'DRAW!' : `Player ${winner} WINS!`, cx, UI_TOP + 60);
                    this.drawButton(game, 'new_game', cx - 160, UI_TOP + 100, 320, 50, 'New Game →', {color: '#46a046', font: 'bold 18px Arial'});
                }
            }

            drawIsoDiamond(r, c, color) {
                let [x, y] = this.isoCenter(r, c);
                this.ctx.fillStyle = color;
                this.ctx.beginPath();
                this.ctx.moveTo(x, y - ISO_TH);
                this.ctx.lineTo(x + ISO_TW, y);
                this.ctx.lineTo(x, y + ISO_TH);
                this.ctx.lineTo(x - ISO_TW, y);
                this.ctx.closePath();
                this.ctx.fill();
            }

            drawValidMoves(game, moves, unit) {
                for (let [r, c] of moves) {
                    this.drawIsoDiamond(r, c, 'rgba(0,255,0,0.35)');
                }
                // Also highlight the unit's current tile so new players
                // understand they can click it to stay put. Draw it with
                // a slightly deeper green + a subtle "hold" ring so it
                // reads as a distinct "stay here" option rather than just
                // another move target.
                if (unit && unit.r != null) {
                    this.drawIsoDiamond(unit.r, unit.c, 'rgba(0,220,80,0.45)');
                    let [hx, hy] = this.isoCenter(unit.r, unit.c);
                    let pulse = 0.6 + 0.4 * Math.sin(performance.now() / 220);
                    this.ctx.strokeStyle = `rgba(120,255,150,${0.55 + 0.35 * pulse})`;
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(hx, hy - ISO_TH / 2);
                    this.ctx.lineTo(hx + ISO_TW / 2, hy);
                    this.ctx.lineTo(hx, hy + ISO_TH / 2);
                    this.ctx.lineTo(hx - ISO_TW / 2, hy);
                    this.ctx.closePath();
                    this.ctx.stroke();
                    // Tiny "HOLD" label centered on the tile
                    this.ctx.fillStyle = 'rgba(230,255,230,0.95)';
                    this.ctx.font = 'bold 9px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('HOLD', hx, hy + 3);
                }
            }

            drawValidAttacks(game, unit, toR, toC, atks) {
                if (STATS[unit.type].rng === 1) {
                    for (let {r, c} of atks) {
                        this.drawIsoDiamond(r, c, 'rgba(255,0,0,0.35)');
                    }
                } else if (STATS[unit.type].tileTarget) {
                    // Tile-target ranged: highlight every tile within Chebyshev
                    // effective-range (High Ground: +1 from back row Archer).
                    // Temporarily stash planned pos so getEffectiveRange uses it.
                    let savedR = unit.plannedR, savedC = unit.plannedC;
                    unit.plannedR = toR; unit.plannedC = toC;
                    let rng = game.getEffectiveRange(unit);
                    unit.plannedR = savedR; unit.plannedC = savedC;
                    for (let r = 0; r < ROWS; r++) {
                        for (let c = 0; c < COLS; c++) {
                            let dist = Math.max(Math.abs(r - toR), Math.abs(c - toC));
                            if (dist === 0 || dist > rng) continue;
                            this.drawIsoDiamond(r, c, 'rgba(255,120,40,0.22)');
                        }
                    }
                } else {
                    // Directional (Adept firebolt)
                    let [ux, uy] = this.isoCenter(toR, toC);
                    for (let {dir} of atks) {
                        let [dr, dc] = dir;
                        let [ex, ey] = this.isoCenter(toR + dr, toC + dc);
                        this.ctx.strokeStyle = 'rgba(255,100,0,0.8)';
                        this.ctx.lineWidth = 3;
                        this.ctx.beginPath();
                        this.ctx.moveTo(ux, uy);
                        this.ctx.lineTo(ex, ey);
                        this.ctx.stroke();
                        this.ctx.fillStyle = 'rgba(255,100,0,0.9)';
                        this.ctx.beginPath();
                        this.ctx.arc(ex, ey, 5, 0, Math.PI * 2);
                        this.ctx.fill();
                    }
                }
            }

            render(game) {
                this._badgeHitAreas = []; // reset each frame
                this.drawBoard(game);

                // Archmage cycle aura — pulse a colored ring under the unit
                // so both players can see who's mid-cycle.
                if (game.phase === 'PLAN_P1' || game.phase === 'PLAN_P2'
                    || game.phase === 'ACTION_RESOLVE' || game.phase === 'READY_ACTION') {
                    let viewerSees = (u) => {
                        // Mages aren't stealthed; everyone sees their state.
                        return u.type === 'Archmage' && u.archmageState;
                    };
                    let pulse = 0.6 + 0.4 * Math.sin(performance.now() / 250);
                    for (let u of [...game.p1Units, ...game.p2Units]) {
                        if (!viewerSees(u) || u.r == null) continue;
                        let [hx, hy] = this.isoCenter(u.r, u.c);
                        let color = u.archmageState === 'rainReady'
                            ? `rgba(255,140,40,${0.5 + 0.4 * pulse})`
                            : `rgba(120,140,200,${0.4 + 0.3 * pulse})`;
                        this.ctx.beginPath();
                        this.ctx.arc(hx, hy + 2, 18, 0, Math.PI * 2);
                        this.ctx.strokeStyle = color;
                        this.ctx.lineWidth = 3;
                        this.ctx.stroke();
                    }
                }

                if (game.phase.startsWith('PLAN') && game.selectedUnit) {
                    let moves = game.getValidMoves(game.selectedUnit);
                    if (game.planStep === 'MOVE') {
                        this.drawValidMoves(game, moves, game.selectedUnit);
                    } else if (game.planStep === 'ATTACK') {
                        // Use planned (post-move) position, not current position.
                        // Fallback uses != null so row/column 0 doesn't collapse to the unit's live r/c.
                        let su = game.selectedUnit;
                        let fromR = su.plannedR != null ? su.plannedR : su.r;
                        let fromC = su.plannedC != null ? su.plannedC : su.c;
                        let atks = game.getValidAttacks(su, fromR, fromC);
                        this.drawValidAttacks(game, su, fromR, fromC, atks);
                    } else if (game.planStep === 'RAIN') {
                        // Highlight all tiles within Chebyshev 6 of the Archmage.
                        let su = game.selectedUnit;
                        for (let r = 0; r < ROWS; r++) {
                            for (let c = 0; c < COLS; c++) {
                                let dist = Math.max(Math.abs(r - su.r), Math.abs(c - su.c));
                                if (dist === 0 || dist > 6) continue;
                                let [hx, hy] = this.isoCenter(r, c);
                                this.ctx.beginPath();
                                this.ctx.moveTo(hx, hy - ISO_TH / 2);
                                this.ctx.lineTo(hx + ISO_TW / 2, hy);
                                this.ctx.lineTo(hx, hy + ISO_TH / 2);
                                this.ctx.lineTo(hx - ISO_TW / 2, hy);
                                this.ctx.closePath();
                                this.ctx.fillStyle = 'rgba(255,140,40,0.18)';
                                this.ctx.fill();
                                this.ctx.strokeStyle = 'rgba(255,140,40,0.6)';
                                this.ctx.lineWidth = 1;
                                this.ctx.stroke();
                            }
                        }
                    } else if (game.planStep === 'BLINK') {
                        // Highlight empty tiles within Chebyshev 5 of the Archmage.
                        let su = game.selectedUnit;
                        for (let r = 0; r < ROWS; r++) {
                            for (let c = 0; c < COLS; c++) {
                                let dist = Math.max(Math.abs(r - su.r), Math.abs(c - su.c));
                                if (dist === 0 || dist > 5) continue;
                                if (game.getUnitAt(r, c)) continue;
                                let [hx, hy] = this.isoCenter(r, c);
                                this.ctx.beginPath();
                                this.ctx.moveTo(hx, hy - ISO_TH / 2);
                                this.ctx.lineTo(hx + ISO_TW / 2, hy);
                                this.ctx.lineTo(hx, hy + ISO_TH / 2);
                                this.ctx.lineTo(hx - ISO_TW / 2, hy);
                                this.ctx.closePath();
                                this.ctx.fillStyle = 'rgba(120,180,255,0.22)';
                                this.ctx.fill();
                                this.ctx.strokeStyle = 'rgba(120,180,255,0.85)';
                                this.ctx.lineWidth = 2;
                                this.ctx.stroke();
                            }
                        }
                    } else if (game.planStep === 'TRAP') {
                        // Highlight tiles within Chebyshev 2 of the Rogue's planned position.
                        let su = game.selectedUnit;
                        let baseR = su.plannedR != null ? su.plannedR : su.r;
                        let baseC = su.plannedC != null ? su.plannedC : su.c;
                        for (let r = 0; r < ROWS; r++) {
                            for (let c = 0; c < COLS; c++) {
                                let dist = Math.max(Math.abs(r - baseR), Math.abs(c - baseC));
                                if (dist === 0 || dist > 2) continue;
                                let [hx, hy] = this.isoCenter(r, c);
                                this.ctx.beginPath();
                                this.ctx.moveTo(hx, hy - ISO_TH / 2);
                                this.ctx.lineTo(hx + ISO_TW / 2, hy);
                                this.ctx.lineTo(hx, hy + ISO_TH / 2);
                                this.ctx.lineTo(hx - ISO_TW / 2, hy);
                                this.ctx.closePath();
                                this.ctx.fillStyle = 'rgba(224,128,64,0.18)';
                                this.ctx.fill();
                                this.ctx.strokeStyle = 'rgba(224,128,64,0.7)';
                                this.ctx.lineWidth = 1;
                                this.ctx.stroke();
                            }
                        }
                    } else if (game.planStep === 'STRIKE') {
                        // Show purple highlights on the 8 tiles adjacent to the
                        // Assassin's planned position. The player picks ONE — the
                        // strike lands there at resolution if an enemy ends up on
                        // that tile AND the Assassin is in that enemy's behind.
                        let su = game.selectedUnit;
                        let baseR = su.plannedR != null ? su.plannedR : su.r;
                        let baseC = su.plannedC != null ? su.plannedC : su.c;
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                if (dr === 0 && dc === 0) continue;
                                let nr = baseR + dr, nc = baseC + dc;
                                if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
                                let [hx, hy] = this.isoCenter(nr, nc);
                                // Filled diamond outline on the tile
                                this.ctx.beginPath();
                                this.ctx.moveTo(hx, hy - ISO_TH / 2);
                                this.ctx.lineTo(hx + ISO_TW / 2, hy);
                                this.ctx.lineTo(hx, hy + ISO_TH / 2);
                                this.ctx.lineTo(hx - ISO_TW / 2, hy);
                                this.ctx.closePath();
                                this.ctx.fillStyle = 'rgba(192,96,255,0.28)';
                                this.ctx.fill();
                                this.ctx.strokeStyle = 'rgba(192,96,255,0.95)';
                                this.ctx.lineWidth = 2;
                                this.ctx.stroke();
                                // Dagger glyph
                                this.ctx.fillStyle = 'rgba(220,180,255,0.95)';
                                this.ctx.font = 'bold 16px Arial';
                                this.ctx.textAlign = 'center';
                                this.ctx.fillText('🗡', hx, hy + 4);
                            }
                        }
                    }
                }

                this.drawUI(game);

                // Remote PvP: paint a "waiting for opponent" overlay over the
                // UI panel when the opposing side is acting. The board stays
                // visible so the local player can follow along.
                if (game.gameMode === 'Remote' && !remoteIsMyTurn(game)
                    && !game.phase.startsWith('REMOTE_')
                    && game.phase !== 'GAME_OVER'
                    && game.phase !== 'ACTION_RESOLVE'
                    && game.phase !== 'MENU') {
                    let labels = {
                        'BUDGET':   'Host is choosing match budget',
                        'SHOP_P1':  'Host is picking their roster',
                        'SHOP_P2':  'Guest is picking their roster',
                        'PLACE_P1': 'Host is placing units',
                        'PLACE_P2': 'Guest is placing units',
                        'PLAN_P1':  'Host is planning their turn',
                        'PLAN_P2':  'Guest is planning their turn'
                    };
                    let label = labels[game.phase] || 'Waiting...';
                    // Clear clickBounds except the quit/cancel button so the
                    // local player can't click through the overlay.
                    game.clickBounds = {};
                    this.drawRemoteWait(game, label);
                }

                // ===== REFERENCE ICONS =====
                // Two small icons above the board corners for quick stat/amplifier lookup.
                // Visible during gameplay phases (not menu/tutorial/shop).
                if (!['MENU','TUTORIAL','BUDGET'].includes(game.phase)
                    && !game.phase.startsWith('SHOP') && !game.phase.startsWith('HANDOFF')
                    && !game.phase.startsWith('REMOTE_')) {
                    let statsIconX = 30, statsIconY = 20, iconR = 15;
                    let ampsIconX = CANVAS_W - 30, ampsIconY = 20;

                    // Detect hover or tap-toggle
                    let statsDist = Math.sqrt((mouseCanvasX - statsIconX) ** 2 + (mouseCanvasY - statsIconY) ** 2);
                    let ampsDist = Math.sqrt((mouseCanvasX - ampsIconX) ** 2 + (mouseCanvasY - ampsIconY) ** 2);
                    let statsHover = statsDist < iconR + 6 || game._refPanelOpen === 'stats';
                    let ampsHover = ampsDist < iconR + 6 || game._refPanelOpen === 'amps';

                    // Draw stats icon (⚔)
                    this.ctx.save();
                    this.ctx.fillStyle = statsHover ? 'rgba(60,80,120,0.95)' : 'rgba(30,30,40,0.75)';
                    this.ctx.beginPath();
                    this.ctx.arc(statsIconX, statsIconY, iconR, 0, Math.PI * 2);

                    this.ctx.strokeStyle = statsHover ? '#ffd84a' : '#706a64';
                    this.ctx.lineWidth = 1.5;
                    this.ctx.stroke();
                    this.ctx.fillStyle = statsHover ? '#fff' : '#b2aca4';

                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';

                    // Draw amps icon (✦)
                    this.ctx.save();
                    this.ctx.fillStyle = ampsHover ? 'rgba(60,80,120,0.95)' : 'rgba(30,30,40,0.75)';
                    this.ctx.beginPath();

                    this.ctx.fillStyle = ampsHover ? '#fff' : '#b2aca4';
                    this.ctx.font = 'bold 14px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText('✦', ampsIconX, ampsIconY);
                    this.ctx.restore();

                    // Register click areas for tap-toggle (mobile)
                    this._refIconAreas = [
                        { x: statsIconX, y: statsIconY, r: iconR, panel: 'stats' },
                        { x: ampsIconX, y: ampsIconY, r: iconR, panel: 'amps' },
                    ];

                    // Stats panel
                    if (statsHover) {
                        let types = ['Squire','Knight','Paladin','Archer','Rogue','Assassin','Adept','Mage','Archmage'];
                        let rowH = 15, headerH = 20, sectionGap = 22;

                        let panW = 480;

                        let panX = 8, panY = statsIconY + iconR + 8;
                        // Clamp panel to screen
                        if (panY + panH > UI_TOP - 4) panY = UI_TOP - panH - 4;
                        if (panY < 4) panY = 4;
                        this.ctx.save();
                        this.ctx.fillStyle = 'rgba(14,14,22,0.96)';
                        this.ctx.beginPath();
                        this.ctx.roundRect(panX, panY, panW, panH, 6);
                        this.ctx.fill();
                        this.ctx.strokeStyle = '#ffd84a';
                        this.ctx.lineWidth = 1;
                        this.ctx.stroke();
                        this.ctx.textAlign = 'left';
                        this.ctx.textBaseline = 'top';

                        // --- ATTACK TABLE ---
                        this.ctx.fillStyle = '#ffd84a';
                        this.ctx.font = 'bold 10px Arial';
                        let aCols = ['Unit','Cost','HP','Mv','Rng','Wt','Atk','Type','Special'];
                        let aX = [panX+8, panX+65, panX+95, panX+125, panX+150, panX+177, panX+202, panX+230, panX+290];
                        for (let i = 0; i < aCols.length; i++) this.ctx.fillText(aCols[i], aX[i], panY + 4);
                        this.ctx.font = '9px Arial';
                        for (let j = 0; j < types.length; j++) {
                            let t = types[j], s = STATS[t];
                            let y = panY + headerH + j * rowH;
                            let tier = INVESTED[t];
                            let tierColor = tier >= 6 ? '#f6d87a' : tier >= 3 ? '#b0c4ff' : '#ccc';
                            this.ctx.fillStyle = tierColor;
                            let atkType = s.atk_type;
                            let atkKey = atkType === 'Piercing' ? 'P' : atkType === 'Melee' ? 'Me' : 'Ma';
                            let atkVal = s.atk[atkKey];
                            let special = '';
                            if (s.cleave > 0) special = `Cleave ${s.cleave}`;
                            if (s.firebolt) special = 'Firebolt';
                            if (s.blocks) special += (special ? ', ' : '') + 'Block';
                            if (t === 'Archer') special = 'Readied Shot';
                            if (t === 'Rogue' || t === 'Assassin') special = 'Trap';
                            if (t === 'Assassin') special += ', Stealth';
                            if (t === 'Archmage') special = 'Rain Fire, Blink';
                            let vals = [t, tier+'t', s.hp, s.mov, s.rng, s.weight, atkVal, atkType, special];
                            for (let i = 0; i < vals.length; i++) this.ctx.fillText(''+vals[i], aX[i], y);
                        }

                        // --- DEFENSE TABLE ---
                        let defStartY = panY + headerH + atkRows * rowH + sectionGap;
                        this.ctx.fillStyle = '#9af0ff';
                        this.ctx.font = 'bold 10px Arial';
                        let dCols = ['Unit','vs Pierce','vs Melee','vs Explo','vs Magic'];
                        let dX = [panX+8, panX+75, panX+155, panX+235, panX+315];
                        for (let i = 0; i < dCols.length; i++) this.ctx.fillText(dCols[i], dX[i], defStartY);
                        this.ctx.font = '9px Arial';
                        for (let j = 0; j < types.length; j++) {
                            let t = types[j], s = STATS[t];
                            let y = defStartY + headerH + j * rowH;
                            let tier = INVESTED[t];
                            let tierColor = tier >= 6 ? '#f6d87a' : tier >= 3 ? '#b0c4ff' : '#ccc';
                            this.ctx.fillStyle = tierColor;
                            let vals = [t, s.dfn.P, s.dfn.Me, s.dfn.Ex, s.dfn.Ma];
                            for (let i = 0; i < vals.length; i++) this.ctx.fillText(''+vals[i], dX[i], y);
                        }
                        this.ctx.restore();
                    }

                    // Amplifiers panel
                    if (ampsHover) {
                        let amps = [
                            {glyph:'⇑', name:'High Ground', unit:'Archer', desc:'+1 range from back row'},
                            {glyph:'⇶', name:'Volley', unit:'2 Archers', desc:'Adjacent pair sweeps shared line'},
                            {glyph:'◎', name:'Accuracy', unit:'Archer', desc:'+50%/stack (max 3) if stationary + same target'},
                            {glyph:'✦', name:'Steady Aim', unit:'Archer', desc:'+2 Pierce with Squire directly in front'},
                            {glyph:'⚒', name:'Anvil & Hammer', unit:'Archer', desc:'+2 dmg targeting near a Squire'},
                            {glyph:'🔥', name:'Flame Arrow', unit:'Archer+Adept', desc:'Same target → arrow gains half Magic dmg'},
                            {glyph:'✚', name:'Last Stand', unit:'Squire', desc:'+3 Me def when isolated (no adjacent allies)'},
                            {glyph:'➤', name:'Vanguard', unit:'Squire', desc:'+1 move next turn after a kill'},
                            {glyph:'✺', name:'Arcing Firebolt', unit:'2+ Magic', desc:'Same target → 2.5× center + 3 splash'},
                            {glyph:'◈', name:'Focused Chan.', unit:'Adept', desc:'+1 Magic/turn while stationary'},
                            {glyph:'▥', name:'Phalanx', unit:'3+ Squires', desc:'+2 Melee def in a row/column, halts charges'},
                        ];
                        let panW = 380, rowH = 17;
                        let panH = 24 + amps.length * rowH + 8;
                        let panX = CANVAS_W - panW - 8, panY = ampsIconY + iconR + 8;
                        this.ctx.save();
                        this.ctx.fillStyle = 'rgba(14,14,22,0.96)';
                        this.ctx.beginPath();
                        this.ctx.roundRect(panX, panY, panW, panH, 6);
                        this.ctx.fill();
                        this.ctx.strokeStyle = '#9af0ff';
                        this.ctx.lineWidth = 1;
                        this.ctx.stroke();
                        // Header
                        this.ctx.fillStyle = '#9af0ff';
                        this.ctx.font = 'bold 11px Arial';
                        this.ctx.textAlign = 'left';
                        this.ctx.textBaseline = 'top';
                        this.ctx.fillText('Amplifiers — position bonuses that trigger automatically', panX + 8, panY + 5);
                        // Rows
                        for (let i = 0; i < amps.length; i++) {
                            let a = amps[i];
                            let y = panY + 24 + i * rowH;
                            this.ctx.fillStyle = '#f6d87a';
                            this.ctx.font = 'bold 10px Arial';
                            this.ctx.fillText(`${a.glyph} ${a.name}`, panX + 8, y);
                            this.ctx.fillStyle = '#999';
                            this.ctx.font = '10px Arial';
                            this.ctx.fillText(a.unit, panX + 130, y);
                            this.ctx.fillStyle = '#ccc';
                            this.ctx.fillText(a.desc, panX + 195, y);
                        }
                        this.ctx.restore();
                    }
                }

                // Amplifier badge hover tooltip — drawn last so it's on top
                if (this._badgeHitAreas && this._badgeHitAreas.length > 0
                    && game.phase !== 'MENU' && game.phase !== 'TUTORIAL') {
                    let hovered = null;
                    for (let b of this._badgeHitAreas) {
                        let dist = Math.sqrt((mouseCanvasX - b.x) ** 2 + (mouseCanvasY - b.y) ** 2);
                        if (dist < b.r + 6) { hovered = b; break; }
                    }
                    if (hovered) {
                        let tipW = 280;
                        let titleLine = `${hovered.glyph} ${hovered.title}`;
                        let descLine = hovered.desc;
                        let tipH = 42;
                        let tipX = hovered.x - tipW / 2;
                        let tipY = hovered.y - tipH - 10;
                        if (tipX < 4) tipX = 4;
                        if (tipX + tipW > CANVAS_W - 4) tipX = CANVAS_W - tipW - 4;
                        if (tipY < 4) tipY = hovered.y + 16;
                        this.ctx.save();
                        this.ctx.fillStyle = 'rgba(16,16,24,0.94)';
                        this.ctx.beginPath();
                        this.ctx.roundRect(tipX, tipY, tipW, tipH, 6);
                        this.ctx.fill();
                        this.ctx.strokeStyle = hovered.color;
                        this.ctx.lineWidth = 1.5;
                        this.ctx.stroke();
                        this.ctx.fillStyle = hovered.color;
                        this.ctx.font = 'bold 13px Arial';
                        this.ctx.textAlign = 'left';
                        this.ctx.textBaseline = 'top';
                        this.ctx.fillText(titleLine, tipX + 8, tipY + 5);
                        this.ctx.fillStyle = '#ccc';
                        this.ctx.font = '11px Arial';
                        this.ctx.fillText(descLine, tipX + 8, tipY + 24);
                        this.ctx.restore();
                    }
                }
            }
        }

        // ===== MAIN GAME LOOP & INPUT HANDLING =====
        let canvas = document.getElementById('gameCanvas');
        let game = new Game();
        let renderer = new Renderer(canvas);

        function pixelToTile(px, py) {
            let ox = CANVAS_W / 2;
            let oy = GRID_Y + PIECE_H + 12 + ISO_TH;
            px -= ox;
            py -= oy;
            let c = (px / ISO_TW + py / ISO_TH) / 2;
            let r = (py / ISO_TH - px / ISO_TW) / 2;
            r = Math.round(r);
            c = Math.round(c);
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS) return [r, c];
            return null;
        }

        // Smart tile resolver: if the click falls within a unit's visible sprite
        // rectangle, return that unit's tile (since tall L2/L3 sprites extend
        // above their tile and would otherwise hit the row above). Falls back
        // to plain pixelToTile for clicks that land on empty isometric tiles.
        // Front-most units win (painter's order: highest r+c drawn last).
        function pixelToTileSmart(px, py) {
            const PLINTH_OFFSET = 6;
            // Skip the currently selected unit — its tall sprite extends over
            // neighboring tiles and would steal clicks intended for those tiles
            // (e.g. picking an attack direction for a Knight after charging).
            let candidates = [...game.p1Units, ...game.p2Units]
                .filter(u => u.r !== null && u !== game.selectedUnit)
                .sort((a, b) => (b.r + b.c) - (a.r + a.c));
            for (let u of candidates) {
                let [cx, cy] = renderer.isoCenter(u.r, u.c);
                let [sw, sh] = spriteSize(u.type);
                let sx = cx - sw / 2;
                let sy = cy - sh + PLINTH_OFFSET;
                if (px >= sx && px < sx + sw && py >= sy && py < sy + sh) {
                    return [u.r, u.c];
                }
            }
            return pixelToTile(px, py);
        }

        // Translate raw mouse coords (which may be scaled by CSS) into canvas coords
        function canvasCoords(e) {
            let rect = canvas.getBoundingClientRect();
            let sx = canvas.width / rect.width;
            let sy = canvas.height / rect.height;
            return [(e.clientX - rect.left) * sx, (e.clientY - rect.top) * sy];
        }

        // Mouse tracking for damage marker hover tooltips
        let mouseCanvasX = -1, mouseCanvasY = -1;
        canvas.addEventListener('mousemove', (e) => {
            let [px, py] = canvasCoords(e);
            mouseCanvasX = px;
            mouseCanvasY = py;
        });

        // Determine which planStep a unit starts in. Most units start in MOVE,
        // but Archmages locked into the Rain Fire / Blink phases of their
        // 3-turn cycle skip straight into the appropriate special step.
        function initialPlanStepFor(unit) {
            if (unit.type === 'Archmage') {
                if (unit.archmageState === 'rainReady') return 'RAIN';
                if (unit.archmageState === 'exhausted') return 'BLINK';
            }
            return 'MOVE';
        }

        // Auto-place remaining units for current placement player. Uses
        // P1_ZONE / P2_ZONE directly so the rows stay in sync with
        // isValidPlacement — otherwise every candidate row is rejected and
        // the button silently does nothing. Walks front row (closest to the
        // opponent) first so melee types don't end up stuck in the back.
        function autoPlaceRemaining(game) {
            let p = game.phase === 'PLACE_P1' ? 1 : 2;
            let units = p === 1 ? game.p1Units : game.p2Units;
            let unplaced = units.filter(u => u.r === null);
            let zone = p === 1 ? P1_ZONE : P2_ZONE;
            // Front row = the row closest to the opposing side. For P1
            // (deployed at top) that's the HIGHER zone row; for P2 (bottom)
            // it's the LOWER zone row.
            let frontRow = p === 1 ? zone[1] : zone[0];
            let backRow  = p === 1 ? zone[0] : zone[1];
            let rowOrder = [frontRow, backRow];
            for (let u of unplaced) {
                let placed = false;
                for (let r of rowOrder) {
                    for (let c = 0; c < COLS; c++) {
                        if (game.isValidPlacement(u, r, c)) {
                            u.r = r; u.c = c;
                            placed = true; break;
                        }
                    }
                    if (placed) break;
                }
            }
            // If all are placed, advance
            if (units.every(u => u.r !== null)) {
                game.nextPhase();
            }
        }

        // Dispatch table for button clicks registered in game.clickBounds.
        function handleButtonClick(game, key) {
            // ---- MENU ----
            if (key === 'mode_pvp') {
                game.gameMode = 'PvP';
                game.nextPhase();
                return true;
            }
            if (key === 'mode_ai') {
                game.gameMode = 'AI';
                game.nextPhase();
                return true;
            }
            if (key === 'mode_campaign') {
                game.gameMode = 'Campaign';
                game.campaignMatch = 1;
                game.campaignScore = [0, 0];
                game.budget = 3; // match 1 = budget 3
                game.phase = 'SHOP_P1';
                game.selectedUnit = null;
                game.planStep = null;
                return true;
            }
            if (key === 'mode_tutorial') {
                game.phase = 'TUTORIAL';
                game.tutorialStep = 0;
                return true;
            }
            // ---- TUTORIAL ----
            if (key === 'tut_next') {
                if (game.tutorialStep >= 11) {
                    game.phase = 'MENU';
                    game.tutorialStep = 0;
                } else {
                    game.tutorialStep = Math.min(11, game.tutorialStep + 1);
                }
                return true;
            }
            if (key === 'tut_back') {
                game.tutorialStep = Math.max(0, game.tutorialStep - 1);
                return true;
            }
            if (key === 'tut_menu') {
                game.phase = 'MENU';
                game.tutorialStep = 0;
                return true;
            }
            if (key === 'amp_prev') {
                if (game.amplifierIdx == null) game.amplifierIdx = 0;
                let n = renderer.getAmplifierCatalog().length;
                game.amplifierIdx = (game.amplifierIdx - 1 + n) % n;
                return true;
            }
            if (key === 'amp_next') {
                if (game.amplifierIdx == null) game.amplifierIdx = 0;
                let n = renderer.getAmplifierCatalog().length;
                game.amplifierIdx = (game.amplifierIdx + 1) % n;
                return true;
            }
            // ---- REMOTE PVP ----
            if (key === 'mode_remote') { startRemoteSetup(game); return true; }
            if (key === 'remote_host') { remoteStartHost(game); return true; }
            if (key === 'remote_join') { game.phase = 'REMOTE_JOIN'; game.remoteStatus = ''; game.joinCodeInput = ''; return true; }
            if (key === 'remote_join_go') { remoteConnectToHost(game); return true; }
            if (key === 'remote_retry_join') { remoteRetryJoin(game); return true; }
            if (key === 'remote_edit_code') {
                // Kick back to the input screen with their code pre-filled.
                if (game.peer) { try { game.peer.destroy(); } catch(e){} game.peer = null; }
                if (game.conn) { try { game.conn.close(); } catch(e){} game.conn = null; }
                game.joinCodeInput = (game.joinCode || '').toUpperCase();
                game.phase = 'REMOTE_JOIN';
                game.remoteStatus = '';
                return true;
            }
            if (key === 'remote_cancel') { remoteCancel(game); return true; }
            if (key === 'remote_back') { game.phase = 'MENU'; game.remoteStatus = ''; return true; }
            if (key === 'remote_quit') { remoteQuit(game); return true; }
            // Reveal-screen "Ready" button: hand off to remoteNextPhase,
            // which ships the place_ready message and parks us in
            // REMOTE_PLACE_WAIT until the opponent is also ready.
            if (key === 'place_reveal_ready') {
                if (game.phase === 'REMOTE_PLACE_REVEAL') {
                    game.nextPhase();
                }
                return true;
            }
            // ---- BUDGET ----
            if (key === 'cull_minus') {
                if (game.phase === 'BUDGET' && game.cullingTurn > 3) game.cullingTurn--;
                return true;
            }
            if (key === 'cull_plus') {
                if (game.phase === 'BUDGET' && game.cullingTurn < 30) game.cullingTurn++;
                return true;
            }
            if (key === 'budget_minus') {
                if (game.phase === 'BUDGET' && game.budget > 1) game.budget--;
                return true;
            }
            if (key === 'budget_plus') {
                if (game.phase === 'BUDGET' && game.budget < 12) game.budget++;
                return true;
            }
            if (key === 'diff_easy') { game.difficulty = 'Easy'; return true; }
            if (key === 'diff_medium') { game.difficulty = 'Medium'; return true; }
            if (key === 'diff_hard') { game.difficulty = 'Hard'; return true; }
            if (key === 'back_menu') {
                game.phase = 'MENU';
                game.gameMode = 'PvP';
                game.selectedUnit = null;
                game.planStep = null;
                return true;
            }
            if (key === 'confirm_budget') {
                if (game.phase === 'BUDGET') game.nextPhase();
                return true;
            }
            // ---- SHOP ----
            if (key.startsWith('buy_')) {
                let type = key.replace('buy_', '');
                let units = game.phase === 'SHOP_P1' ? game.p1Units : game.p2Units;
                let spent = units.reduce((a, u) => a + INVESTED[u.type], 0);
                if (game.budget - spent >= 1 && units.length < MAX_ROSTER) {
                    units.push(new Unit(game.phase === 'SHOP_P1' ? 1 : 2, type));
                }
                return true;
            }
            if (key.startsWith('upgrade_')) {
                let units = game.phase === 'SHOP_P1' ? game.p1Units : game.p2Units;
                let idx = parseInt(key.split('_')[1]);
                if (idx < units.length) {
                    let u = units[idx];
                    let nextType = UPGRADES[u.type];
                    if (nextType) {
                        let upgCost = STATS[nextType].cost;
                        let spent = units.reduce((a, u) => a + INVESTED[u.type], 0);
                        if (game.budget - spent >= upgCost) {
                            u.type = nextType;
                            u.hp = STATS[nextType].hp;
                            u.maxHp = STATS[nextType].hp;
                        }
                    }
                }
                return true;
            }
            if (key.startsWith('remove_')) {
                let units = game.phase === 'SHOP_P1' ? game.p1Units : game.p2Units;
                let idx = parseInt(key.split('_')[1]);
                if (idx < units.length) units.splice(idx, 1);
                return true;
            }
            if (key === 'shop_clear') {
                if (game.phase === 'SHOP_P1') game.p1Units = [];
                else if (game.phase === 'SHOP_P2') game.p2Units = [];
                return true;
            }
            if (key === 'shop_confirm') {
                let units = game.phase === 'SHOP_P1' ? game.p1Units : game.p2Units;
                if (units.length > 0) game.nextPhase();
                return true;
            }
            // ---- HANDOFF ----
            if (key === 'handoff_continue') {
                if (game.phase.startsWith('HANDOFF')) game.nextPhase();
                return true;
            }
            // ---- PLACE ----
            if (key === 'auto_place') {
                autoPlaceRemaining(game);
                return true;
            }
            // ---- PLAN ----
            if (key === 'plan_hold') {
                if (game.selectedUnit && game.planStep === 'MOVE') {
                    let su = game.selectedUnit;
                    su.plannedR = su.r;
                    su.plannedC = su.c;
                    su.plannedAtk = null;
                    su.plannedTrap = null;
                    su.plannedBeacon = null;
                    su.plannedAid = null;
                    su.ordered = true;
                    game.selectedUnit = null;
                    game.planStep = null;
                }
                return true;
            }
            if (key === 'plan_deselect') {
                if (game.selectedUnit) {
                    game.selectedUnit.plannedTrap = null;
                    game.selectedUnit.plannedBeacon = null;
                    game.selectedUnit.plannedAid = null;
                }
                game.selectedUnit = null;
                game.planStep = null;
                return true;
            }
            if (key === 'plan_skip_attack') {
                if (game.selectedUnit && (game.planStep === 'ATTACK' || game.planStep === 'TRAP' || game.planStep === 'BEACON' || game.planStep === 'AID')) {
                    game.selectedUnit.plannedAtk = null;
                    game.selectedUnit.plannedTrap = null;
                    game.selectedUnit.plannedBeacon = null;
                    game.selectedUnit.plannedAid = null;
                    game.selectedUnit.ordered = true;
                    game.selectedUnit = null;
                    game.planStep = null;
                }
                return true;
            }
            if (key === 'plan_reset_move') {
                if (game.selectedUnit) {
                    game.selectedUnit.plannedR = null;
                    game.selectedUnit.plannedC = null;
                    game.selectedUnit.plannedTrap = null;
                    game.selectedUnit.plannedBeacon = null;
                    game.selectedUnit.plannedAid = null;
                    game.planStep = 'MOVE';
                }
                return true;
            }
            if (key === 'ability_trap') {
                if (game.selectedUnit && game.selectedUnit.type === 'Rogue') {
                    game.selectedUnit.plannedAtk = null;
                    game.selectedUnit.plannedAid = null;
                    game.selectedUnit.plannedShadow = null;
                    game.selectedUnit.plannedStealth = false;
                    game.planStep = 'TRAP';
                }
                return true;
            }
            if (key === 'ability_beacon') {
                if (game.selectedUnit && game.selectedUnit.type === 'Adept') {
                    game.selectedUnit.plannedAtk = null;
                    game.selectedUnit.plannedTrap = null;
                    game.selectedUnit.plannedAid = null;
                    game.selectedUnit.plannedShadow = null;
                    game.selectedUnit.plannedStealth = false;
                    game.planStep = 'BEACON';
                }
                return true;
            }
            if (key === 'ability_aid') {
                let su = game.selectedUnit;
                if (su && (su.type === 'Knight' || su.type === 'Paladin')) {
                    su.plannedAtk = null;
                    su.plannedTrap = null;
                    su.plannedShadow = null;
                    su.plannedStealth = false;
                    game.planStep = 'AID';
                }
                return true;
            }
            if (key === 'ability_vanish') {
                let su = game.selectedUnit;
                if (su && su.type === 'Assassin' && !su.stealthed) {
                    // Spend the turn going invisible — no attack this turn.
                    su.plannedAtk = null;
                    su.plannedTrap = null;
                    su.plannedAid = null;
                    su.plannedShadow = null;
                    su.plannedStealth = true;
                    su.ordered = true;
                    game.selectedUnit = null;
                    game.planStep = null;
                }
                return true;
            }
            if (key === 'ability_strike') {
                let su = game.selectedUnit;
                if (su && su.type === 'Assassin' && su.stealthed) {
                    su.plannedAtk = null;
                    su.plannedTrap = null;
                    su.plannedAid = null;
                    su.plannedStealth = false;
                    game.planStep = 'STRIKE';
                }
                return true;
            }
            if (key === 'ability_channel') {
                let su = game.selectedUnit;
                if (su && su.type === 'Archmage' && !su.archmageState) {
                    // Begin the 3-turn cycle. Channeling consumes the whole turn:
                    // no attack, but movement is allowed (Archmage is concentrating
                    // while shifting to a safer spot). Cycle resolves at end of turn.
                    su.plannedAtk = null;
                    su.plannedTrap = null;
                    su.plannedAid = null;
                    su.plannedShadow = null;
                    su.plannedStealth = false;
                    su.plannedChannel = true;
                    su.ordered = true;
                    game.selectedUnit = null;
                    game.planStep = null;
                }
                return true;
            }
            if (key === 'plan_cancel_ability') {
                if (game.selectedUnit && (game.planStep === 'TRAP' || game.planStep === 'BEACON' || game.planStep === 'AID' || game.planStep === 'STRIKE')) {
                    game.selectedUnit.plannedTrap = null;
                    game.selectedUnit.plannedBeacon = null;
                    game.selectedUnit.plannedAid = null;
                    game.selectedUnit.plannedShadow = null;
                    game.selectedUnit.plannedStealth = false;
                    game.planStep = 'ATTACK';
                }
                return true;
            }
            if (key.startsWith('pick_')) {
                let units = game.phase === 'PLAN_P1' ? game.p1Units : game.p2Units;
                let idx = parseInt(key.split('_')[1]);
                if (idx < units.length && !units[idx].ordered) {
                    game.selectedUnit = units[idx];
                    game.planStep = initialPlanStepFor(units[idx]);
                }
                return true;
            }
            if (key === 'plan_ready') {
                let units = game.phase === 'PLAN_P1' ? game.p1Units : game.p2Units;
                // Mark any unselected/unordered units as "hold position"
                for (let u of units) {
                    if (!u.ordered) {
                        u.plannedR = u.r;
                        u.plannedC = u.c;
                        u.plannedAtk = null;
                        u.plannedTrap = null;
                        u.plannedBeacon = null;
                        u.plannedAid = null;
                        u.plannedStealth = false;
                        u.plannedShadow = null;
                        u.plannedChannel = false;
                        u.plannedRain = null;
                        u.plannedBlink = null;
                        u.ordered = true;
                    }
                }
                game.selectedUnit = null;
                game.planStep = null;
                // Remote concurrent play: hitting Ready drops us into
                // REMOTE_WAIT via remoteNextPhase(), which also ships our
                // 'ready' snapshot and (if host) triggers the countdown when
                // both sides are in. No per-phase mode-specific branch needed.
                if (units.every(u => u.ordered)) game.nextPhase();
                return true;
            }
            // ---- READY_ACTION ----
            if (key === 'resolve') {
                if (game.phase === 'READY_ACTION') game.nextPhase();
                return true;
            }
            // ---- GAME_OVER ----
            if (key === 'new_game') {
                window.__resetGame = true;
                return true;
            }
            if (key === 'next_match') {
                if (game.phase === 'GAME_OVER' && game.gameMode === 'Campaign') {
                    let neededToWin = Math.ceil(game.campaignTotal / 2);
                    if (game.campaignScore[0] < neededToWin && game.campaignScore[1] < neededToWin) {
                        let nextMatch = game.campaignMatch + 1;
                        let score = [...game.campaignScore];
                        let diff = game.difficulty;
                        game.initBoard();
                        game.campaignMatch = nextMatch;
                        game.campaignScore = score;
                        game.difficulty = diff;
                        game.gameMode = 'Campaign';
                        game.budget = nextMatch + 2;
                        game.phase = 'SHOP_P1';
                    }
                }
                return true;
            }
            return false;
        }

        // =========================================================
        // REMOTE PVP NETWORKING (PeerJS over WebRTC)
        // =========================================================
        // Architecture — CONCURRENT play
        //   * Host = Player 1. Guest = Player 2.
        //   * Both clients run their own phase sequence simultaneously:
        //       host : BUDGET → SHOP_P1 → PLACE_P1 → PLAN_P1 → REMOTE_WAIT
        //       guest:          SHOP_P2 → PLACE_P2 → PLAN_P2 → REMOTE_WAIT
        //   * Neither side blocks on the other during shop/place/plan. When
        //     both reach REMOTE_WAIT they swap full state (units + traps),
        //     the host triggers a 3-2-1 countdown, then both call
        //     resolveAction() with the same seeded RNG → identical battle.
        //   * After the resolve animation both clients loop back to
        //     PLAN_P{localPlayer} — shop/place happens only in round 1.
        //
        // Messages (all JSON):
        //   {t:'hello',     seed}           host→guest on connect
        //   {t:'budget',    val}            host→guest after BUDGET confirm
        //   {t:'ready',     units, traps}   either→either after local PLAN done
        //   {t:'countdown'}                 host→guest when both are ready
        //   {t:'quit'}                      other player left
        // Messages (all JSON, see handleRemoteMessage for the receiving side):
        //   {t:'hello',     seed}              host→guest once on connect
        //   {t:'budget',    val}               host→guest after BUDGET commit
        //   {t:'ready',     units, traps}      either→other after local PLAN done
        //   {t:'countdown'}                    host→guest when both ready (starts
        //                                      the 3-2-1 → resolveAction timer)
        //   {t:'quit'}                         other player left

        function startRemoteSetup(game) {
            game.phase = 'REMOTE_SETUP';
            game.gameMode = 'Remote';
            game.remoteRole = null;
            game.localPlayer = null;
            game.remoteStatus = '';
            game.joinCodeInput = '';
            // Close any stale peer connection from a prior attempt
            if (game.conn) { try { game.conn.close(); } catch(e){} game.conn = null; }
            if (game.peer) { try { game.peer.destroy(); } catch(e){} game.peer = null; }
            game.peerId = null;
            game.remotePeerId = null;
        }

        function remoteShortId() {
            // 6-char alphanumeric host code (no confusable chars)
            let chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let id = '';
            for (let i = 0; i < 6; i++) id += chars[Math.floor(Math.random() * chars.length)];
            return 'stg-' + id;
        }

        // Explicit PeerJS cloud config. Default options work, but specifying
        // them makes failure modes easier to reason about and lets us swap
        // servers (or add a debug port) in one place.
        //
        // The `config` block is what PeerJS hands to RTCPeerConnection. Without
        // multiple STUN servers a lot of home networks fail the ICE negotiation
        // and you end up with "negotiation-failed" — which is especially common
        // when one peer is on symmetric NAT (most mobile carriers, some ISPs)
        // and no TURN relay is available to fall back to. Adding Google/Twilio
        // STUN plus the free OpenRelay TURN cluster gets the success rate from
        // ~70% to well over 95%.
        const PEER_CONFIG = {
            debug: 2,  // bump debug for troubleshooting
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun.cloudflare.com:3478' },
                    // Metered.ca free TURN — public credentials
                    {
                        urls: 'turn:a.relay.metered.ca:80',
                        username: 'e8dd65b92f416ccc0a6717e0',
                        credential: '3RoO/VBmPKBp7K1t'
                    },
                    {
                        urls: 'turn:a.relay.metered.ca:80?transport=tcp',
                        username: 'e8dd65b92f416ccc0a6717e0',
                        credential: '3RoO/VBmPKBp7K1t'
                    },
                    {
                        urls: 'turn:a.relay.metered.ca:443',
                        username: 'e8dd65b92f416ccc0a6717e0',
                        credential: '3RoO/VBmPKBp7K1t'
                    },
                    {
                        urls: 'turn:a.relay.metered.ca:443?transport=tcp',
                        username: 'e8dd65b92f416ccc0a6717e0',
                        credential: '3RoO/VBmPKBp7K1t'
                    }
                ],
                iceCandidatePoolSize: 4
            }
        };

        function remoteStartHost(game) {
            if (typeof Peer === 'undefined') {
                game.remoteStatus = 'PeerJS failed to load. Check your internet connection.';
                return;
            }
            game.remoteRole = 'host';
            game.localPlayer = 1;
            game.phase = 'REMOTE_HOST_WAIT';
            game.remoteStatus = 'Starting server...';

            let hostId = remoteShortId();
            game.peer = new Peer(hostId, PEER_CONFIG);
            game.peer.on('open', (id) => {
                game.peerId = id.replace('stg-', '');
                game.remoteStatus = 'Waiting for opponent to connect...';
            });
            // PeerJS silently drops the signaling socket sometimes (the
            // public cloud recycles idle connections). If that happens,
            // an incoming guest will get "peer-unavailable" even though
            // we're still here. Reconnect so our ID stays live.
            game.peer.on('disconnected', () => {
                game.remoteStatus = 'Signaling disconnected — reconnecting...';
                try { game.peer.reconnect(); } catch(e) {}
            });
            game.peer.on('error', (err) => {
                let type = err && err.type ? err.type : String(err);
                // 'unavailable-id' → our 6-char code collided (astronomically
                // rare, but handle it rather than hanging). Spin a new one.
                if (type === 'unavailable-id') {
                    game.remoteStatus = 'Code collision, picking a new one...';
                    try { game.peer.destroy(); } catch(e) {}
                    setTimeout(() => remoteStartHost(game), 200);
                    return;
                }
                game.remoteStatus = 'Host error: ' + type;
            });
            game.peer.on('connection', (conn) => {
                game.conn = conn;
                game.remoteStatus = 'Opponent connected! Setting up match...';
                wireConnection(game, conn, /*isHost*/true);
                conn.on('open', () => {
                    // Seed RNG and tell guest to match
                    let seed = (Math.random() * 0xFFFFFFFF) >>> 0;
                    game.rngSeed = seed;
                    game.rngState = seed;
                    conn.send({t: 'hello', seed: seed});
                    // Advance to BUDGET (host picks budget)
                    game.initBoard();
                    game.phase = 'BUDGET';
                    game.budget = 6;
                    game.cullingTurn = 10;
                    // Host will broadcast state once budget is confirmed.
                });
            });
        }

        function remoteConnectToHost(game) {
            if (typeof Peer === 'undefined') {
                game.remoteStatus = 'PeerJS failed to load. Check your internet connection.';
                return;
            }
            // Case matters! remoteShortId() generates uppercase IDs (e.g.
            // stg-ABCXYZ), so the guest must dial with the same case.
            // Lower-casing here was the real cause of peer-unavailable.
            let code = (game.joinCodeInput || '').trim().toUpperCase();
            if (code.length !== 6) {
                game.remoteStatus = 'Code must be 6 characters.';
                return;
            }
            game.remoteRole = 'guest';
            game.localPlayer = 2;
            game.remoteStatus = 'Connecting...';
            game.joinRetries = 0;          // how many peer-unavailable retries we've done
            game.joinCode = code;          // remember so retries don't need re-typing
            game.peer = new Peer(undefined, PEER_CONFIG);

            // Inner helper: actually dial the host. May be called multiple
            // times if we hit peer-unavailable (race with host registration).
            let dialHost = () => {
                let target = 'stg-' + code;
                game.remotePeerId = target;
                let conn = game.peer.connect(target, {reliable: true});
                game.conn = conn;
                wireConnection(game, conn, /*isHost*/false);
                conn.on('open', () => {
                    game.remoteStatus = 'Connected! Waiting for host to set up...';
                });
            };

            game.peer.on('open', () => {
                dialHost();
            });
            game.peer.on('disconnected', () => {
                // Try to climb back on the signaling server rather than
                // giving up. Game data uses a direct WebRTC channel so a
                // brief signaling blip is usually survivable.
                try { game.peer.reconnect(); } catch(e) {}
            });
            game.peer.on('error', (err) => {
                let type = err && err.type ? err.type : String(err);

                // Most common failure: host's ID isn't in the signaling
                // server's table yet (or it got flushed). Retry a few
                // times with backoff before surfacing the error — this
                // fixes 90% of "peer-unavailable" reports.
                if (type === 'peer-unavailable') {
                    game.joinRetries = (game.joinRetries || 0) + 1;
                    if (game.joinRetries <= 3) {
                        let delay = 1000 * game.joinRetries;  // 1s, 2s, 3s
                        game.remoteStatus = `Host not responding, retrying (${game.joinRetries}/3)...`;
                        setTimeout(() => {
                            // Peer still alive? Just redial. If not, rebuild it.
                            if (game.peer && !game.peer.destroyed) {
                                dialHost();
                            }
                        }, delay);
                        return;
                    }
                    game.remoteStatus = 'Host not found. Double-check the code and make sure the host still has their tab open, then Retry.';
                    game.phase = 'REMOTE_JOIN_FAILED';
                    return;
                }

                if (type === 'network' || type === 'server-error' || type === 'socket-error') {
                    game.remoteStatus = 'Network error reaching signaling server — retry in a moment.';
                    game.phase = 'REMOTE_JOIN_FAILED';
                    return;
                }

                // WebRTC ICE negotiation failed — usually a NAT/firewall issue.
                // Often transient; a second attempt frequently succeeds because
                // a different ICE candidate gets picked.
                if (type === 'negotiation-failed' || type === 'webrtc') {
                    game.remoteStatus = 'Couldn\'t open a direct connection (firewall/NAT). Retry — it usually works the second time.';
                    game.phase = 'REMOTE_JOIN_FAILED';
                    return;
                }

                game.remoteStatus = 'Connection error: ' + type;
                game.phase = 'REMOTE_JOIN_FAILED';
            });
        }

        // Retry a failed join with the same code (no re-typing needed).
        function remoteRetryJoin(game) {
            if (game.peer) { try { game.peer.destroy(); } catch(e){} game.peer = null; }
            if (game.conn) { try { game.conn.close(); } catch(e){} game.conn = null; }
            if (!game.joinCode) {
                // Fell back with no code somehow — kick them to the input screen.
                game.phase = 'REMOTE_JOIN';
                game.remoteStatus = '';
                return;
            }
            game.joinCodeInput = game.joinCode;
            game.phase = 'REMOTE_JOIN';
            game.remoteStatus = '';
            remoteConnectToHost(game);
        }

        function wireConnection(game, conn, isHost) {
            conn.on('data', (msg) => { handleRemoteMessage(game, msg, isHost); });
            conn.on('close', () => {
                game.remoteStatus = 'Opponent disconnected.';
                // Fall back to menu
                if (game.phase !== 'MENU' && game.phase !== 'GAME_OVER') {
                    game.phase = 'MENU';
                }
            });
            conn.on('error', (err) => {
                game.remoteStatus = 'Connection error: ' + err;
            });
        }

        function remoteCancel(game) {
            if (game.conn) { try { game.conn.close(); } catch(e){} game.conn = null; }
            if (game.peer) { try { game.peer.destroy(); } catch(e){} game.peer = null; }
            game.phase = 'MENU';
            game.gameMode = null;
            game.remoteRole = null;
            game.localPlayer = null;
            game.remoteStatus = '';
        }

        function remoteQuit(game) {
            try { if (game.conn) game.conn.send({t:'quit'}); } catch(e){}
            remoteCancel(game);
        }

        // True when the local player controls the phase that's currently active.
        // In concurrent Remote play each client only ever sees its own suffix
        // phase (P1 for host, P2 for guest), so any matching-suffix phase is
        // "my turn". REMOTE_WAIT / REMOTE_COUNTDOWN lock everyone out.
        function remoteIsMyTurn(game) {
            if (game.gameMode !== 'Remote') return true;
            if (!game.phase) return true;
            if (game.phase === 'BUDGET') return game.localPlayer === 1;
            if (game.phase === 'REMOTE_WAIT' || game.phase === 'REMOTE_COUNTDOWN') return false;
            if (game.phase === 'REMOTE_PLACE_WAIT') return false;
            if (game.phase === 'REMOTE_PLACE_REVEAL') return true;
            if (game.phase === 'ACTION_RESOLVE') return false;
            let me = game.localPlayer;
            if (game.phase === 'SHOP_P'  + me) return true;
            if (game.phase === 'PLACE_P' + me) return true;
            if (game.phase === 'PLAN_P'  + me) return true;
            // Any other P1/P2-suffixed phase (shouldn't happen in the new
            // flow, but be safe) is the opponent's.
            if (/^(SHOP|PLACE|PLAN)_P[12]$/.test(game.phase)) return false;
            return true;  // MENU / TUTORIAL / GAME_OVER / REMOTE_SETUP etc.
        }

        // --- State serialization ---
        function serializeUnit(u) {
            return {
                player: u.player, type: u.type, r: u.r, c: u.c,
                hp: u.hp, id: u.id, ordered: u.ordered,
                facing: u.facing, archmageState: u.archmageState,
                plannedR: u.plannedR, plannedC: u.plannedC,
                plannedAtk: u.plannedAtk, plannedDest: u.plannedDest,
                plannedRain: u.plannedRain, plannedTrap: u.plannedTrap,
                plannedBeacon: u.plannedBeacon,
                plannedShadow: u.plannedShadow, plannedAid: u.plannedAid,
                plannedStealth: u.plannedStealth, plannedBlink: u.plannedBlink,
                plannedChannel: u.plannedChannel
            };
        }

        function deserializeUnit(o) {
            // Reconstruct Unit instance so getter/prototype methods work
            let u = new Unit(o.player, o.type);
            u.r = o.r; u.c = o.c; u.hp = o.hp; u.id = o.id;
            u.ordered = !!o.ordered;
            u.facing = o.facing || u.facing;
            u.archmageState = o.archmageState || null;
            u.plannedR = o.plannedR != null ? o.plannedR : null;
            u.plannedC = o.plannedC != null ? o.plannedC : null;
            u.plannedAtk = o.plannedAtk || null;
            u.plannedDest = o.plannedDest || null;
            u.plannedRain = o.plannedRain || null;
            u.plannedTrap = o.plannedTrap || null;
            u.plannedBeacon = o.plannedBeacon || null;
            u.plannedShadow = o.plannedShadow || null;
            u.plannedAid = o.plannedAid || null;
            u.plannedStealth = !!o.plannedStealth;
            u.plannedBlink = o.plannedBlink || null;
            u.plannedChannel = o.plannedChannel || null;
            return u;
        }

        function serializeState(game, stripP1Plans) {
            let snap = {
                phase: game.phase,
                budget: game.budget,
                cullingTurn: game.cullingTurn,
                turn: game.turn,
                rngState: game.rngState,
                p1: game.p1Units.map(u => {
                    let s = serializeUnit(u);
                    if (stripP1Plans) {
                        s.plannedR = null; s.plannedC = null;
                        s.plannedAtk = null; s.plannedDest = null;
                        s.plannedRain = null; s.plannedTrap = null;
                        s.plannedBeacon = null;
                    }
                    return s;
                }),
                p2: game.p2Units.map(serializeUnit),
                traps: game.traps.map(t => ({...t})),
                beacons: game.beacons.map(b => ({player: b.player, r: b.r, c: b.c, ownerIdRef: b.ownerId ? b.ownerId.id : null})),
                stripped: !!stripP1Plans
            };
            return snap;
        }

        function applyState(game, snap) {
            game.phase = snap.phase;
            game.budget = snap.budget;
            if (typeof snap.cullingTurn === 'number') game.cullingTurn = snap.cullingTurn;
            game.turn = snap.turn;
            if (snap.rngState != null) game.rngState = snap.rngState;
            game.p1Units = (snap.p1 || []).map(deserializeUnit);
            game.p2Units = (snap.p2 || []).map(deserializeUnit);
            game.traps = (snap.traps || []).map(t => ({...t}));
            // Restore beacons by re-linking ownerId via unit id
            let allUnits = [...game.p1Units, ...game.p2Units];
            let unitById = {};
            for (let u of allUnits) unitById[u.id] = u;
            game.beacons = (snap.beacons || []).map(b => ({
                player: b.player, r: b.r, c: b.c,
                ownerId: b.ownerIdRef != null ? unitById[b.ownerIdRef] : null
