            })).filter(b => b.ownerId); // drop stale beacons whose adept is gone
            game.selectedUnit = null;
            game.planStep = null;
            // Phase-entry resets that normally happen inside nextPhase()
            if (game.phase === 'PLAN_P1') for (let u of game.p1Units) u.ordered = false;
            if (game.phase === 'PLAN_P2') for (let u of game.p2Units) u.ordered = false;
        }

        // Broadcast the local state to the other peer. stripP1Plans should be
        // true when Host finishes PLAN_P1 so guest can't peek at host's moves.
        function remoteBroadcastState(game, stripP1Plans) {
            if (!game.conn) return;
            try {
                game.conn.send({t: 'state', snap: serializeState(game, !!stripP1Plans)});
            } catch (e) {
                console.warn('remote send failed', e);
            }
        }

        function handleRemoteMessage(game, msg, isHost) {
            if (!msg || !msg.t) return;

            // --- HELLO: host→guest once, seeds the shared RNG and parks
            // the guest on the BUDGET screen (they can't edit it — host does).
            if (msg.t === 'hello') {
                game.rngSeed = msg.seed;
                game.rngState = msg.seed;
                game.phase = 'BUDGET';
                game.budget = 6;
                game.cullingTurn = 10;
                game.initBoard();
                game.remoteStatus = '';
                return;
            }

            // --- BUDGET: host→guest when host confirms their budget pick.
            // Both clients jump to their own SHOP phase and play concurrently.
            if (msg.t === 'budget') {
                if (isHost) return;    // host shouldn't receive this
                game.budget = msg.val;
                if (typeof msg.cullingTurn === 'number') game.cullingTurn = msg.cullingTurn;
                game.phase = 'SHOP_P2';
                game.selectedUnit = null;
                game.planStep = null;
                return;
            }

            // --- READY: each client→opponent when they finish their PLAN.
            // Carries their full roster + trap placements. We stash it and
            // apply it once BOTH sides are ready (prevents clobbering the
            // local game state while the opponent is still planning).
            if (msg.t === 'ready') {
                game.remoteOpponentSnapshot = msg;
                game.remoteOpponentReady = true;
                // If we're already in REMOTE_WAIT, the merge can happen now.
                // Otherwise it'll happen when we hit REMOTE_WAIT ourselves.
                if (game.phase === 'REMOTE_WAIT') {
                    remoteMergeOpponentSnapshot(game);
                    game.remoteTryStartCountdown();
                }
                return;
            }

            // --- PLACE SNAPSHOT: each client→opponent immediately after
            // leaving PLACE_P{me}. Apply it right away so the reveal screen
            // can show the opponent's pieces as soon as they arrive. Also
            // re-try the start-plan transition in case the opponent had
            // already clicked Ready and we were just waiting for the pieces.
            if (msg.t === 'place_snapshot') {
                let opp = isHost ? 2 : 1;
                let oppList = (msg.units || []).map(deserializeUnit);
                console.log('[remote] got place_snapshot:', oppList.length, 'opponent units');
                if (opp === 1) game.p1Units = oppList;
                else           game.p2Units = oppList;
                if (game.remoteRole === 'host') game.remoteTryStartPlan();
                return;
            }

            // --- PLACE READY: opponent clicked Ready on the reveal screen.
            // Host checks whether both sides are ready and pushes everyone
            // into PLAN_P{me}. The opponent also includes their roster as a
            // failsafe — if the earlier place_snapshot was dropped, we'll
            // still have their units by the time we advance to PLAN.
            if (msg.t === 'place_ready') {
                console.log('[remote] got place_ready');
                game.remotePlaceOpponentReady = true;
                if (msg.units && msg.units.length) {
                    let opp = isHost ? 2 : 1;
                    let oppList = msg.units.map(deserializeUnit);
                    // Only overwrite if we didn't already have a roster
                    // (the earlier snapshot is canonical). Guards against
                    // clobbering units that moved/changed state.
                    let existing = opp === 1 ? game.p1Units : game.p2Units;
                    if (!existing || existing.length === 0) {
                        if (opp === 1) game.p1Units = oppList;
                        else           game.p2Units = oppList;
                    }
                }
                if (game.remoteRole === 'host') {
                    game.remoteTryStartPlan();
                }
                return;
            }

            // --- START PLAN: host→guest once both sides are place-ready.
            // Guest transitions to PLAN_P2 and begins their first round of
            // planning with the full board visible.
            if (msg.t === 'start_plan') {
                if (isHost) return;
                console.log('[remote] got start_plan, transitioning to PLAN_P2');
                game.phase = 'PLAN_P2';
                game.selectedUnit = null;
                game.planStep = null;
                for (let u of game.p2Units) u.ordered = false;
                game.remotePlaceMyReady = false;
                game.remotePlaceOpponentReady = false;
                return;
            }

            // --- COUNTDOWN: host→guest. Guest mirrors host's phase transition
            // and starts its own local 3-2-1 timer. They won't be perfectly
            // synced to the millisecond but 3 seconds of grace covers the
            // network jitter — both call resolveAction on timer expiry with
            // the same seeded RNG → identical simulation.
            if (msg.t === 'countdown') {
                if (isHost) return;
                // Make sure the guest has merged the host's state before
                // resolving — otherwise p1Units will be stale/empty.
                if (game.remoteOpponentSnapshot) {
                    remoteMergeOpponentSnapshot(game);
                }
                game.remoteCountdownStart = performance.now();
                game.phase = 'REMOTE_COUNTDOWN';
                return;
            }

            if (msg.t === 'quit') {
                game.remoteStatus = 'Opponent left the game.';
                game.phase = 'MENU';
                return;
            }
        }

        // Apply the opponent's ready-snapshot to our local game. "Opponent"
        // means the other player — so if we're host we're merging p2 data.
        function remoteMergeOpponentSnapshot(game) {
            let snap = game.remoteOpponentSnapshot;
            if (!snap) return;
            let oppPlayer = game.localPlayer === 1 ? 2 : 1;
            let oppUnits = (snap.units || []).map(deserializeUnit);
            if (oppPlayer === 1) game.p1Units = oppUnits;
            else                 game.p2Units = oppUnits;
            // Merge traps: keep our own, replace opponent's batch.
            let ourTraps = game.traps.filter(t => t.player !== oppPlayer);
            let theirTraps = (snap.traps || []).map(t => ({...t}));
            game.traps = ourTraps.concat(theirTraps);
            // Merge beacons the same way.
            let ourBeacons = game.beacons.filter(b => b.player !== oppPlayer);
            let allUnits = [...game.p1Units, ...game.p2Units];
            let unitById = {};
            for (let u of allUnits) unitById[u.id] = u;
            let theirBeacons = (snap.beacons || []).map(b => ({
                player: b.player, r: b.r, c: b.c,
                ownerId: b.ownerIdRef != null ? unitById[b.ownerIdRef] : null
            })).filter(b => b.ownerId);
            game.beacons = ourBeacons.concat(theirBeacons);
            game.remoteOpponentSnapshot = null;
        }

        // Guest's typing handler for the join code input. Returns true if key
        // was consumed by the remote setup screens.
        function remoteHandleKey(game, e) {
            // On the failure screen, Enter = retry, Escape = back to menu.
            if (game.phase === 'REMOTE_JOIN_FAILED') {
                if (e.key === 'Enter')  { remoteRetryJoin(game); return true; }
                if (e.key === 'Escape') { remoteCancel(game); return true; }
                return false;
            }
            if (game.phase !== 'REMOTE_JOIN') return false;
            if (e.key === 'Enter') { remoteConnectToHost(game); return true; }
            if (e.key === 'Backspace') {
                game.joinCodeInput = (game.joinCodeInput || '').slice(0, -1);
                return true;
            }
            if (e.key === 'Escape') { remoteCancel(game); return true; }
            // Accept alphanumeric (case-insensitive)
            if (/^[a-zA-Z0-9]$/.test(e.key)) {
                if ((game.joinCodeInput || '').length < 6) {
                    game.joinCodeInput = (game.joinCodeInput || '') + e.key.toUpperCase();
                }
                return true;
            }
            return false;
        }

        canvas.addEventListener('click', (e) => {
            let [px, py] = canvasCoords(e);

            // Dismiss damage pause on click
            if (game.phase === 'ACTION_RESOLVE' && game.animation && game.animation.paused) {
                game.animation = null;
                game.nextPhase();
                return;
            }

            // Reference icon tap-toggle (for mobile)
            if (renderer._refIconAreas) {
                for (let icon of renderer._refIconAreas) {
                    let dist = Math.sqrt((px - icon.x) ** 2 + (py - icon.y) ** 2);
                    if (dist < icon.r + 8) {
                        game._refPanelOpen = game._refPanelOpen === icon.panel ? null : icon.panel;
                        return;
                    }
                }
                // Tap elsewhere closes the panel (but don't block the click)
                if (game._refPanelOpen) { game._refPanelOpen = null; }
            }

            // Remote PvP: if it's not our turn, block all clicks except the
            // quit/cancel buttons on setup and waiting screens.
            let remoteBlocking = (game.gameMode === 'Remote' &&
                                  !remoteIsMyTurn(game) &&
                                  !game.phase.startsWith('REMOTE_'));

            // First: check UI button clicks registered in game.clickBounds
            for (let key in game.clickBounds) {
                let [x, y, w, h] = game.clickBounds[key];
                if (px >= x && px < x + w && py >= y && py < y + h) {
                    if (remoteBlocking && key !== 'remote_quit' && key !== 'remote_cancel') break;
                    let before = game.phase;
                    if (handleButtonClick(game, key)) {
                        if (window.__resetGame) {
                            window.__resetGame = false;
                            game = new Game();
                        }
                        // In the concurrent Remote flow each client drives
                        // its own shop/place/plan independently — no state
                        // broadcast on phase change. Synchronization happens
                        // via the 'budget' / 'ready' / 'countdown' messages
                        // emitted inside remoteNextPhase() / remoteSendReady().
                        return;
                    }
                }
            }
            // In remote mode, also block tile clicks on the board when it's
            // not our turn (prevents guest from moving host's units).
            if (remoteBlocking) return;

            // Record phase to detect auto-advances from placement/planning taps
            var __remotePhaseBefore = (game.gameMode === 'Remote') ? game.phase : null;

            // Phase-specific tile handling (placement, planning)
            if (game.phase.startsWith('PLACE')) {
                let pos = pixelToTile(px, py);
                if (pos) {
                    let [r, c] = pos;
                    let units = game.phase === 'PLACE_P1' ? game.p1Units : game.p2Units;
                    let unplaced = units.filter(u => u.r === null);
                    if (unplaced.length > 0 && game.isValidPlacement(unplaced[0], r, c)) {
                        unplaced[0].r = r;
                        unplaced[0].c = c;
                        if (unplaced.length === 1) {
                            game.nextPhase();
                        }
                    }
                }
            } else if (game.phase.startsWith('PLAN')) {
                let pos = pixelToTileSmart(px, py);
                if (pos) {
                    let [r, c] = pos;
                    let units = game.phase === 'PLAN_P1' ? game.p1Units : game.p2Units;
                    let unit = units.find(u => u.r === r && u.c === c);

                    if (!game.planStep && unit) {
                        // Clicking an already-ordered unit resets its orders
                        if (unit.ordered) {
                            unit.plannedR = null;
                            unit.plannedC = null;
                            unit.plannedAtk = null;
                            unit.plannedTrap = null;
                            unit.plannedBeacon = null;
                            unit.plannedAid = null;
                            unit.plannedStealth = false;
                            unit.plannedShadow = null;
                            unit.plannedChannel = false;
                            unit.plannedRain = null;
                            unit.plannedBlink = null;
                            unit.ordered = false;
                        }
                        game.selectedUnit = unit;
                        game.planStep = initialPlanStepFor(unit);
                    } else if (game.planStep === 'MOVE' && game.selectedUnit) {
                        let moves = game.getValidMoves(game.selectedUnit);
                        if (moves.find(m => m[0] === r && m[1] === c) || (r === game.selectedUnit.r && c === game.selectedUnit.c)) {
                            game.selectedUnit.plannedR = r;
                            game.selectedUnit.plannedC = c;
                            game.planStep = 'ATTACK';
                        }
                    } else if (game.planStep === 'RAIN' && game.selectedUnit) {
                        // Archmage Rain Fire: pick AOE center within Chebyshev 6
                        // of current position. The tile may be anywhere on the
                        // board within range — typically aimed at a cluster.
                        let su = game.selectedUnit;
                        let dist = Math.max(Math.abs(r - su.r), Math.abs(c - su.c));
                        if (dist <= 6) {
                            su.plannedRain = {r, c};
                            su.plannedAtk = null;
                            su.ordered = true;
                            game.selectedUnit = null;
                            game.planStep = null;
                        }
                    } else if (game.planStep === 'BLINK' && game.selectedUnit) {
                        // Archmage exhausted Blink: teleport to any empty tile
                        // within Chebyshev 5 of current position.
                        let su = game.selectedUnit;
                        let dist = Math.max(Math.abs(r - su.r), Math.abs(c - su.c));
                        let occupant = game.getUnitAt(r, c);
                        if (dist >= 1 && dist <= 5 && !occupant) {
                            su.plannedBlink = {r, c};
                            su.plannedAtk = null;
                            su.ordered = true;
                            game.selectedUnit = null;
                            game.planStep = null;
                        }
                    } else if (game.planStep === 'STRIKE' && game.selectedUnit) {
                        // Shadow Strike: pick one of the 8 tiles adjacent to the
                        // Assassin's planned position. Resolution checks whether
                        // an enemy ends up on that tile AND whether the Assassin
                        // is in that enemy's behind tiles (true backstab).
                        // Likely the picked tile is empty at planning time —
                        // you're predicting where the enemy will move.
                        let su = game.selectedUnit;
                        let baseR = su.plannedR != null ? su.plannedR : su.r;
                        let baseC = su.plannedC != null ? su.plannedC : su.c;
                        let dr = r - baseR, dc = c - baseC;
                        let isAdjacent = (Math.abs(dr) <= 1 && Math.abs(dc) <= 1) && !(dr === 0 && dc === 0);
                        if (isAdjacent) {
                            su.plannedShadow = {r, c};
                            su.plannedAtk = null;
                            su.plannedStealth = false;
                            su.ordered = true;
                            game.selectedUnit = null;
                            game.planStep = null;
                        }
                    } else if (game.planStep === 'TRAP' && game.selectedUnit) {
                        // Place trap within 2 tiles of planned position (Rogue/Assassin)
                        let su = game.selectedUnit;
                        let fromR = su.plannedR != null ? su.plannedR : su.r;
                        let fromC = su.plannedC != null ? su.plannedC : su.c;
                        let dist = Math.max(Math.abs(r - fromR), Math.abs(c - fromC));
                        if (r >= 0 && r < ROWS && c >= 0 && c < COLS && dist <= 2) {
                            su.plannedTrap = {r, c};
                            su.plannedAtk = null;
                            su.ordered = true;
                            game.selectedUnit = null;
                            game.planStep = null;
                        }
                    } else if (game.planStep === 'BEACON' && game.selectedUnit) {
                        // Place Adept beacon on any in-bounds tile
                        let su = game.selectedUnit;
                        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                            su.plannedBeacon = {r, c};
                            su.plannedAtk = null;
                            su.ordered = true;
                            game.selectedUnit = null;
                            game.planStep = null;
                        }
                    } else if (game.planStep === 'AID' && game.selectedUnit) {
                        // Heal an adjacent friendly (relative to the move destination)
                        let su = game.selectedUnit;
                        let dr = Math.abs(r - su.plannedR), dc = Math.abs(c - su.plannedC);
                        if ((dr + dc) > 0 && dr <= 1 && dc <= 1) {
                            // Adjacent (orthogonal or diagonal) tile
                            let tgt = game.getUnitAt(r, c);
                            if (tgt && tgt.player === su.player && tgt !== su) {
                                su.plannedAid = {r, c};
                                su.plannedAtk = null;
                                su.ordered = true;
                                game.selectedUnit = null;
                                game.planStep = null;
                            }
                        }
                    } else if (game.planStep === 'ATTACK' && game.selectedUnit) {
                        let su = game.selectedUnit;
                        if (STATS[su.type].rng === 1) {
                            // Melee: click any adjacent cell to declare attack direction.
                            let atks = game.getValidAttacks(su, su.plannedR, su.plannedC);
                            let atkCell = atks.find(a => a.r === r && a.c === c);
                            if (atkCell) {
                                let isCharge = game.isChargeMove(su, su.r, su.c, su.plannedR, su.plannedC);
                                su.plannedAtk = {r, c, damageType: null, isCharge, direction: atkCell.dir};
                                su.ordered = true;
                                game.selectedUnit = null;
                                game.planStep = null;
                            }
                        } else if (STATS[su.type].tileTarget) {
                            // Tile-targeted ranged: click any tile within Chebyshev
                            // range (accounting for High Ground). Resolve-phase
                            // strikes whatever enemy is planned to be on that tile.
                            let dist = Math.max(Math.abs(r - su.plannedR), Math.abs(c - su.plannedC));
                            let rng = game.getEffectiveRange(su);
                            // Beacon Mark: Archer can target a friendly Adept's
                            // beacon on any tile, regardless of range.
                            let isBeaconShot = su.type === 'Archer' && game.beacons.some(b =>
                                b.player === su.player && b.r === r && b.c === c);
                            if (dist > 0 && (dist <= rng || isBeaconShot)) {
                                su.plannedAtk = {r: 0, c: 0, damageType: null, isCharge: false, targetR: r, targetC: c};
                                su.ordered = true;
                                game.selectedUnit = null;
                                game.planStep = null;
                            }
                        } else {
                            // Adept firebolt: still directional (can't "lob" it).
                            let dr = r - su.plannedR, dc = c - su.plannedC;
                            if (dr !== 0 || dc !== 0) {
                                if (dr !== 0) dr = dr > 0 ? 1 : -1;
                                if (dc !== 0) dc = dc > 0 ? 1 : -1;
                                let isDiag = dr !== 0 && dc !== 0;
                                if (!isDiag || STATS[su.type].diag_atk) {
                                    su.plannedAtk = {r: 0, c: 0, damageType: null, isCharge: false, direction: [dr, dc]};
                                    su.ordered = true;
                                    game.selectedUnit = null;
                                    game.planStep = null;
                                }
                            }
                        }
                    }
                }
            }

            // (Concurrent Remote mode: no automatic state broadcast — each
            // client runs independently until the REMOTE_WAIT sync point.)
        });

        document.addEventListener('keydown', (e) => {
            // Dismiss damage pause on any key
            if (game.phase === 'ACTION_RESOLVE' && game.animation && game.animation.paused) {
                game.animation = null;
                game.nextPhase();
                return;
            }
            // Remote setup: join-code typing
            if (game.phase === 'REMOTE_JOIN') {
                if (remoteHandleKey(game, e)) { e.preventDefault(); return; }
            }
            if (e.key === 'Escape') {
                if (game.phase === 'TUTORIAL') {
                    game.phase = 'MENU';
                    game.tutorialStep = 0;
                } else {
                    game.selectedUnit = null;
                    game.planStep = null;
                }
            } else if (e.key === 'ArrowLeft' && game.phase === 'TUTORIAL' && game.tutorialStep === 11) {
                // Amplifier page: cycle backwards
                e.preventDefault();
                if (game.amplifierIdx == null) game.amplifierIdx = 0;
                let n = renderer.getAmplifierCatalog().length;
                game.amplifierIdx = (game.amplifierIdx - 1 + n) % n;
                return;
            } else if (e.key === 'ArrowRight' && game.phase === 'TUTORIAL' && game.tutorialStep === 11) {
                // Amplifier page: cycle forwards
                e.preventDefault();
                if (game.amplifierIdx == null) game.amplifierIdx = 0;
                let n = renderer.getAmplifierCatalog().length;
                game.amplifierIdx = (game.amplifierIdx + 1) % n;
                return;
            } else if (e.key === ' ') {
                e.preventDefault();
                if (game.phase === 'TUTORIAL') {
                    if (game.tutorialStep < 11) {
                        game.tutorialStep++;
                    } else {
                        game.phase = 'MENU';
                        game.tutorialStep = 0;
                    }
                    return;
                }
                if (game.phase.startsWith('PLAN')) {
                    if (game.selectedUnit && game.planStep === 'ATTACK') {
                        // Skip attack
                        game.selectedUnit.plannedAtk = null;
                        game.selectedUnit.ordered = true;
                        game.selectedUnit = null;
                        game.planStep = null;
                    } else if (game.selectedUnit && game.planStep === 'MOVE') {
                        // Stay in place
                        game.selectedUnit.plannedR = game.selectedUnit.r;
                        game.selectedUnit.plannedC = game.selectedUnit.c;
                        game.planStep = 'ATTACK';
                    } else {
                        // No unit selected: commit only if all are ordered.
                        let units = game.phase === 'PLAN_P1' ? game.p1Units : game.p2Units;
                        if (units.every(u => u.ordered)) {
                            game.nextPhase();
                        }
                    }
                }
            } else if (e.key === 'Enter') {
                if (game.phase === 'BUDGET') {
                    game.nextPhase();
                } else if (game.phase.startsWith('SHOP')) {
                    game.nextPhase();
                } else if (game.phase.startsWith('HANDOFF')) {
                    game.nextPhase();
                } else if (game.phase === 'READY_ACTION') {
                    game.nextPhase();
                } else if (game.phase === 'GAME_OVER' && game.gameMode === 'Campaign') {
                    let neededToWin = Math.ceil(game.campaignTotal / 2);
                    if (game.campaignScore[0] < neededToWin && game.campaignScore[1] < neededToWin) {
                        // Start next match
                        let nextMatch = game.campaignMatch + 1;
                        let score = [...game.campaignScore];
                        let diff = game.difficulty;
                        game.initBoard();
                        game.campaignMatch = nextMatch;
                        game.campaignScore = score;
                        game.difficulty = diff;
                        game.gameMode = 'Campaign';
                        game.budget = nextMatch + 2; // match N budget = N+2
                        game.phase = 'SHOP_P1';
                    }
                } else if (game.phase === 'MENU') {
                    game.gameMode = 'PvP';
                    game.nextPhase();
                }
            } else if (e.key === '+' || e.key === '=') {
                if (game.phase === 'BUDGET' && game.budget < 12) game.budget++;
            } else if (e.key === '-') {
                if (game.phase === 'BUDGET' && game.budget > 1) game.budget--;
            } else if (e.key === '1') {
                if (game.phase === 'MENU') {
                    game.gameMode = 'PvP';
                    game.nextPhase();
                } else if (game.phase === 'GAME_OVER') {
                    game = new Game();
                }
            } else if (e.key === '2') {
                if (game.phase === 'MENU') {
                    game.gameMode = 'AI';
                    game.nextPhase();
                } else if (game.phase === 'GAME_OVER') {
                    game = new Game();
                }
            } else if (e.key === '3') {
                if (game.phase === 'MENU') {
                    game.gameMode = 'Campaign';
                    game.campaignMatch = 1;
                    game.campaignScore = [0, 0];
                    game.budget = 3; // match 1 = budget 3
                    game.phase = 'SHOP_P1';
                    game.selectedUnit = null;
                    game.planStep = null;
                } else if (game.phase === 'GAME_OVER') {
                    game = new Game();
                }
            } else if (e.key === '4') {
                if (game.phase === 'MENU') {
                    startRemoteSetup(game);
                }
            } else if (e.key === '5') {
                if (game.phase === 'MENU') {
                    game.phase = 'TUTORIAL';
                    game.tutorialStep = 0;
                }
            } else if (e.key === 'd' || e.key === 'D') {
                if (game.phase === 'BUDGET' && (game.gameMode === 'AI' || game.gameMode === 'Campaign')) {
                    let diffs = ['Easy', 'Medium', 'Hard'];
                    let idx = diffs.indexOf(game.difficulty);
                    game.difficulty = diffs[(idx + 1) % 3];
                }
            } else if (e.key === 'r' || e.key === 'R') {
                if (game.phase === 'GAME_OVER') {
                    game = new Game();
                }
            }
        });

        function gameLoop() {
            renderer.render(game);
            // Remote PvP: when the 3-2-1 countdown elapses, merge any pending
            // opponent snapshot (defensive — the guest may still have one in
            // flight) and kick off the action resolution. Both clients run
            // this independently, seeded with the same RNG, so the animation
            // and final state stay in lockstep without further network chatter.
            if (game.phase === 'REMOTE_COUNTDOWN' && game.remoteCountdownStart != null) {
                let elapsed = performance.now() - game.remoteCountdownStart;
                // 3.2s = 3 full seconds of "3, 2, 1" + a short "FIGHT!" flash
                if (elapsed >= 3200) {
                    if (game.remoteOpponentSnapshot) {
                        remoteMergeOpponentSnapshot(game);
                    }
                    game.remoteCountdownStart = null;
                    game.phase = 'ACTION_RESOLVE';
                    game.resolveAction();
                }
            }
            // After the animation finishes, pause to let the player inspect
            // damage markers. Click or press any key to continue.
            if (game.phase === 'ACTION_RESOLVE' && game.animation) {
                let elapsed = performance.now() - game.animation.startTime;
                if (elapsed >= game.animation.duration && !game.animation.paused) {
                    if (game.animation.damages && game.animation.damages.length > 0) {
                        game.animation.paused = true;
                    } else {
                        game.animation = null;
                        game.nextPhase();
                    }
                }
            }
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
