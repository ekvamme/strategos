                // "HALT" spark when the knight brakes
                if (t > 0.55 && t < 0.85) {
                    let pt = (t - 0.55) / 0.30;
                    this.drawAmpPulse(g, 2, 2, pt, '#ffe06a');
                    this.drawAmpFloatText(g, 2, 2, pt, 'HALT', '#ffe06a');
                }
                // Caption
                this.ctx.fillStyle = '#cfd8ff';
                this.ctx.font = 'bold 13px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('Charge breaks on the shield wall', gx + 2.5 * cell, gy - 8);
            }

            sceneTriangleSight(g, t) {
                // Three Adepts forming a triangle: (0,0), (0,4), (2,2).
                // Hidden Assassin lurking at (1,2) inside the triangle — revealed.
                // Two Adepts ((0,0) and (0,4)) coordinate on (3,2), a Knight target.
                let {gx, gy, cell} = g;
                // Filled triangle interior shading
                this.ctx.save();
                this.ctx.fillStyle = 'rgba(184,224,255,0.14)';
                this.ctx.beginPath();
                let p0 = {x: gx + 0.5 * cell, y: gy + 0.5 * cell};
                let p1 = {x: gx + 4.5 * cell, y: gy + 0.5 * cell};
                let p2 = {x: gx + 2.5 * cell, y: gy + 2.5 * cell};
                this.ctx.moveTo(p0.x, p0.y);
                this.ctx.lineTo(p1.x, p1.y);
                this.ctx.lineTo(p2.x, p2.y);
                this.ctx.closePath();
                this.ctx.fill();
                this.ctx.strokeStyle = 'rgba(184,224,255,0.55)';
                this.ctx.lineWidth = 2;
                this.ctx.setLineDash([6, 4]);
                this.ctx.stroke();
                this.ctx.setLineDash([]);
                this.ctx.restore();
                // Adepts
                this.drawAmpUnit(g, 0, 0, 'Adept', 'A');
                this.drawAmpUnit(g, 0, 4, 'Adept', 'A');
                this.drawAmpUnit(g, 2, 2, 'Adept', 'A');
                // Revealed Assassin inside the triangle (flickers in)
                let flick = 0.35 + 0.35 * Math.abs(Math.sin(t * 12));
                this.ctx.save();
                this.ctx.globalAlpha = flick;
                this.drawAmpUnit(g, 1, 2, 'Assassin', 'B', {label: 'revealed', labelColor: '#b8e0ff'});
                this.ctx.restore();
                // Target Knight
                this.drawAmpUnit(g, 3, 2, 'Knight', 'B', {label: '×2 each', labelColor: '#b8e0ff'});
                // Two coordinated firebolts from (0,0) and (0,4) to (3,2)
                if (t > 0.30) {
                    let p = Math.min(1, (t - 0.30) / 0.25);
                    this.drawAmpArrow(g, 0, 0, 0 + 3 * p, 0 + 2 * p, '#b8e0ff', 3);
                    this.drawAmpArrow(g, 0, 4, 0 + 3 * p, 4 - 2 * p, '#b8e0ff', 3);
                }
                if (t > 0.55) {
                    let pt = Math.min(1, (t - 0.55) / 0.35);
                    this.drawAmpPulse(g, 3, 2, pt, '#b8e0ff');
                    this.drawAmpPulse(g, 3, 2, Math.max(0, pt - 0.2), '#ffffff');
                }
                // Caption
                this.ctx.fillStyle = '#b8e0ff';
                this.ctx.font = 'bold 13px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('Inner sight — triangle reveals, paired strikes ×2', gx + 2.5 * cell, gy - 8);
            }

            sceneTwinTrap(g, t) {
                // Two Rogues at (0,1) and (0,3) both plant on (2,2).
                // Enemy Knight walks into it; splash covers a 5x5 square.
                let {gx, gy, cell} = g;
                // Pre-detonation: show 5x5 AOE as faint red region on (0..4, 0..4).
                // Actually full 5x5 = radius 2, meaning center (2,2) + 24 surrounding.
                // Since the grid IS 5x5, essentially the whole board is the AOE.
                // Restrict visual to the 5x5 centered on (2,2): here it fills the grid.
                if (t > 0.35) {
                    let pulse = 0.10 + 0.08 * Math.abs(Math.sin(t * 10));
                    this.ctx.fillStyle = `rgba(255,154,106,${pulse})`;
                    this.ctx.fillRect(gx, gy, cell * 5, cell * 5);
                    // Inner (full damage) tile
                    this.ctx.fillStyle = 'rgba(255,154,106,0.30)';
                    this.ctx.fillRect(gx + 2 * cell, gy + 2 * cell, cell, cell);
                }
                // Rogues
                this.drawAmpUnit(g, 0, 1, 'Rogue', 'A');
                this.drawAmpUnit(g, 0, 3, 'Rogue', 'A');
                // Plant arrows converging on (2,2)
                if (t < 0.35) {
                    let p = Math.min(1, t / 0.30);
                    this.drawAmpArrow(g, 0, 1, 0 + 2 * p, 1 + 1 * p, '#ff9a6a', 2);
                    this.drawAmpArrow(g, 0, 3, 0 + 2 * p, 3 - 1 * p, '#ff9a6a', 2);
                }
                // Planted trap marker (little glyph at center)
                if (t > 0.32) {
                    let x = gx + 2.5 * cell, y = gy + 2.5 * cell;
                    this.ctx.fillStyle = '#ff9a6a';
                    this.ctx.font = 'bold 16px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText('✸', x, y);
                    this.ctx.textBaseline = 'alphabetic';
                }
                // Victim walks into the trap (Knight from (4,2) to (2,2))
                if (t > 0.50) {
                    let p = Math.min(1, (t - 0.50) / 0.25);
                    let endR = 4 - 2 * p;
                    this.drawAmpUnit(g, endR, 2, 'Knight', 'B');
                } else if (t > 0.32) {
                    this.drawAmpUnit(g, 4, 2, 'Knight', 'B');
                }
                // Detonation pulses across 5x5
                if (t > 0.78) {
                    let pt = Math.min(1, (t - 0.78) / 0.22);
                    this.drawAmpPulse(g, 2, 2, pt, '#ffba88');
                    // Revealed Assassin flash
                    this.drawAmpFloatText(g, 2, 2, pt, 'REVEAL', '#ffba88');
                    // Splash ripples on outer ring
                    let ringTiles = [[0,0],[0,4],[4,0],[4,4],[2,0],[2,4],[0,2],[4,2]];
                    for (let [rr, cc] of ringTiles) {
                        this.drawAmpPulse(g, rr, cc, Math.min(1, pt + 0.1), '#ff9a6a');
                    }
                }
                // Caption
                this.ctx.fillStyle = '#ff9a6a';
                this.ctx.font = 'bold 13px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('5×5 explosion — half damage across the whole square', gx + 2.5 * cell, gy - 8);
            }

            sceneBeaconMark(g, t) {
                // Adept at (0,0) plants beacon at (4,4). Archer at (0,2)
                // fires across the board into the beacon, 3× damage.
                let {gx, gy, cell} = g;
                // Beacon tile glow (pulses the whole time after plant)
                if (t > 0.20) {
                    let pulse = 0.25 + 0.15 * Math.abs(Math.sin(t * 9));
                    this.ctx.fillStyle = `rgba(176,128,255,${pulse})`;
                    this.ctx.fillRect(gx + 4 * cell, gy + 4 * cell, cell, cell);
                    // reticle
                    let cx = gx + 4.5 * cell, cy = gy + 4.5 * cell;
                    this.ctx.strokeStyle = '#d8b8ff';
                    this.ctx.lineWidth = 1.5;
                    this.ctx.beginPath();
                    this.ctx.moveTo(cx - cell * 0.35, cy); this.ctx.lineTo(cx - cell * 0.12, cy);
                    this.ctx.moveTo(cx + cell * 0.12, cy); this.ctx.lineTo(cx + cell * 0.35, cy);
                    this.ctx.moveTo(cx, cy - cell * 0.35); this.ctx.lineTo(cx, cy - cell * 0.12);
                    this.ctx.moveTo(cx, cy + cell * 0.12); this.ctx.lineTo(cx, cy + cell * 0.35);
                    this.ctx.stroke();
                    // Glyph in center
                    this.ctx.fillStyle = '#f0e0ff';
                    this.ctx.font = 'bold 14px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText('🔮', cx, cy);
                    this.ctx.textBaseline = 'alphabetic';
                }
                // Adept and Archer (friendly)
                this.drawAmpUnit(g, 0, 0, 'Adept', 'A');
                this.drawAmpUnit(g, 0, 2, 'Archer', 'A');
                // Phase 1 (0..0.20): Adept casts beacon — violet arc out to (4,4)
                if (t < 0.20) {
                    let p = Math.min(1, t / 0.20);
                    this.drawAmpArrow(g, 0, 0, 4 * p, 4 * p, '#b080ff', 2);
                }
                // Phase 2 (0.20..0.55): enemy Knight walks onto beacon tile
                let knightR = 4, knightC = 2;
                if (t > 0.20 && t < 0.55) {
                    let p = (t - 0.20) / 0.35;
                    knightR = 4;
                    knightC = 2 + 2 * p;
                    this.drawAmpUnit(g, knightR, knightC, 'Knight', 'B');
                } else if (t >= 0.55) {
                    this.drawAmpUnit(g, 4, 4, 'Knight', 'B');
                } else {
                    this.drawAmpUnit(g, 4, 2, 'Knight', 'B');
                }
                // Phase 3 (0.55..0.85): Archer fires across the board into beacon
                if (t > 0.55 && t < 0.85) {
                    let p = (t - 0.55) / 0.30;
                    this.drawAmpArrow(g, 0, 2, 4 * p, 2 + 2 * p, '#ffe080', 2);
                }
                // Phase 4 (0.85..1.0): impact — 3× damage float
                if (t > 0.85) {
                    let pt = Math.min(1, (t - 0.85) / 0.15);
                    this.drawAmpPulse(g, 4, 4, pt, '#ffd070');
                    this.drawAmpFloatText(g, 4, 4, pt, '×3', '#ffd070');
                }
                // Caption
                this.ctx.fillStyle = '#b080ff';
                this.ctx.font = 'bold 13px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('Beacon planted — Archer hits 3× from any distance', gx + 2.5 * cell, gy - 8);
            }

            drawTutorialUnit(type) {
                let s = STATS[type];
                // Tier & archetype subtitle
                let tier = INVESTED[type] === 1 ? 1 : INVESTED[type] === 3 ? 2 : 3;
                let arch = s.atk_type === 'Melee' ? 'Melee'
                         : s.atk_type === 'Piercing' ? 'Ranged'
                         : 'Magic';
                // Unit name
                this.ctx.fillStyle = '#f6d87a';
                this.ctx.font = 'bold 30px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText(type, CANVAS_W / 2, 118);
                this.ctx.fillStyle = '#9ac4ff';
                this.ctx.font = '13px Arial';
                this.ctx.fillText(`Tier ${tier}  •  ${arch}`, CANVAS_W / 2, 138);

                // Left: animated demo
                this.drawTutorialDemo(type, 20, 155, 380, 340);
                // Right: stats panel
                this.drawTutorialStats(type, 410, 155, 285, 500);
                // Bottom: ability notes & flavor (extra tall — Paladin has 4 skills)
                this.drawTutorialNotes(type, 20, 665, CANVAS_W - 40, 400);
            }

            // Animated grid demo: cursor picks the unit, moves it, attacks.
            // Loops every 8 seconds so the player can watch multiple times.
            // Cycling demo animator. For each unit we walk the player through
            // at least one full turn, and for units with multiple skills we cycle
            // through additional variants every 8 seconds so both moves show.
            drawTutorialDemo(type, boxX, boxY, boxW, boxH) {
                // Panel backdrop
                this.ctx.fillStyle = '#1d212d';
                this.ctx.fillRect(boxX, boxY, boxW, boxH);
                this.ctx.strokeStyle = '#3a4050';
                this.ctx.lineWidth = 1;
                this.ctx.strokeRect(boxX, boxY, boxW, boxH);

                // --- VARIANT TABLE --------------------------------------------------
                // Each unit gets 1+ variants. A variant is a fully-scripted mini-turn
                // with its own unit/target positions, attack mode, and damage label.
                // mode = 'basic' | 'charge' | 'trap' | 'aoe'
                const VARIANTS = {
                    Squire:   [
                        { label: 'Swing at a Squire',    dmg: '5 − 5 = 1 Melee (min 1)',       mode: 'basic', enemyType: 'Squire', showMath: true },
                        { label: 'Swing at an Archer',   dmg: '5 − 2 = 3 Melee',                mode: 'basic', enemyType: 'Archer', showMath: true }
                    ],
                    Knight:   [
                        { label: 'Basic attack',         dmg: '10 Melee + 5 cleave',           mode: 'basic' },
                        { label: 'Charge (move 2)',      dmg: '20 Melee main + 5 Melee cleave',mode: 'charge', cleaveN: 1 }
                    ],
                    Paladin:  [
                        { label: 'Basic attack',         dmg: '14 Melee + 7 per cleave',       mode: 'basic' },
                        { label: 'Charge (move 2)',      dmg: '28 Melee main + 7 per cleave',  mode: 'charge', cleaveN: 4 },
                        { label: 'Defensive Aura',       dmg: '+2 to every defense stat',      mode: 'aura' },
                        { label: 'Lend Aid (heal)',      dmg: '+2 HP to adjacent ally',        mode: 'heal' }
                    ],
                    Archer:   [{ label: 'Aimed Shot (pick a tile)', dmg: '6 − 4 = 2 Piercing',   mode: 'basic', showMath: true }],
                    Rogue:    [
                        { label: 'Aimed Shot (pick a tile)', dmg: '8 − 4 = 4 Piercing',        mode: 'basic', showMath: true },
                        { label: 'Plant Trap',           dmg: '9 Explosive when triggered',    mode: 'trap' }
                    ],
                    Assassin: [
                        { label: 'Aimed Shot (pick a tile)', dmg: '10 − 4 = 6 Piercing',       mode: 'basic', showMath: true },
                        { label: 'Shadow Strike (from behind!)', dmg: 'Instant kill — must stand in the 3 back tiles', mode: 'shadow' }
                    ],
                    Adept:    [{ label: 'Firebolt',      dmg: '5 − 2 = 3 Magic',               mode: 'basic', showMath: true }],
                    Mage:     [{ label: 'Firebolt',      dmg: '10 − 2 = 8 Magic',              mode: 'basic', showMath: true }],
                    Archmage: [
                        { label: 'Firebolt',             dmg: '14 − 2 = 12 Magic',             mode: 'basic', showMath: true },
                        { label: 'Rain Fire (3×3 AOE)',  dmg: '14 center + 7 on 4 splashes',   mode: 'aoe' }
                    ]
                };
                let s = STATS[type];
                let vList = VARIANTS[type] || [{ label: 'Attack', dmg: '', mode: 'basic' }];
                let period = 8000;
                let now = performance.now();
                let vIdx = Math.floor(now / period) % vList.length;
                let variant = vList[vIdx];
                let t = now % period;

                // Header: "Demo 2/2 · Charge (move 2)"
                this.ctx.fillStyle = '#9ac4ff';
                this.ctx.font = 'bold 13px Arial';
                this.ctx.textAlign = 'left';
                let hdr = vList.length > 1
                    ? `Demo ${vIdx + 1}/${vList.length}  ·  ${variant.label}`
                    : `Demo  ·  ${variant.label}`;
                this.ctx.fillText(hdr, boxX + 10, boxY + 18);
                // Damage chip right-aligned in header
                this.ctx.fillStyle = '#ffb070';
                this.ctx.font = 'bold 12px Arial';
                this.ctx.textAlign = 'right';
                this.ctx.fillText(variant.dmg, boxX + boxW - 12, boxY + 18);

                // Grid: 5 cols x 4 rows, 50x44 cells, positioned inside box
                let cols = 5, rows = 4, cellW = 52, cellH = 46;
                let gridW = cols * cellW, gridH = rows * cellH;
                let gx = boxX + (boxW - gridW) / 2;
                let gy = boxY + 32 + (boxH - 32 - gridH) / 2;

                // --- PER-VARIANT GEOMETRY ------------------------------------------
                let startR = 2, startC = 1;
                let moveR, moveC, atkTargetR, atkTargetC;
                let cleaveList = [];       // extra cleaved enemies for 'charge'
                let trapR, trapC;          // trap tile for 'trap'
                let trapEnemyR0, trapEnemyC0, trapEnemyR1, trapEnemyC1;
                let aoeCenterR, aoeCenterC, aoeSplashes = [];
                let shadowEnemyR, shadowEnemyC;   // enemy for Shadow Strike demo
                let auraAllies = [];       // friendly ally tiles in Paladin aura
                let healAllyR, healAllyC;  // damaged ally for Lend Aid demo

                if (variant.mode === 'charge') {
                    // Move 2 straight, attack the square ahead, cleave 1–4 neighbours.
                    moveR = 2; moveC = 3;
                    atkTargetR = 2; atkTargetC = 4;
                    if (variant.cleaveN === 1) {
                        cleaveList = [[1, 4]];
                    } else {
                        // Paladin: up to 4 cleaves around the main target.
                        cleaveList = [[1, 4], [3, 4], [1, 3], [3, 3]];
                    }
                } else if (variant.mode === 'trap') {
                    // Rogue stays put, drops a trap, enemy walks into it.
                    moveR = 2; moveC = 1;
                    trapR = 2; trapC = 3;
                    trapEnemyR0 = 0; trapEnemyC0 = 3;
                    trapEnemyR1 = 2; trapEnemyC1 = 3;
                    atkTargetR = trapR; atkTargetC = trapC;
                } else if (variant.mode === 'aoe') {
                    // Archmage stays, drops a 3×3 inferno nearby.
                    moveR = 2; moveC = 1;
                    aoeCenterR = 1; aoeCenterC = 3;
                    // 4 random splashes around center (hand-picked for clarity).
                    aoeSplashes = [[0,2],[0,3],[0,4],[1,4]];
                    atkTargetR = aoeCenterR; atkTargetC = aoeCenterC;
                } else if (variant.mode === 'shadow') {
                    // Assassin is already stealthed. Enemy stands in the middle
                    // of the grid facing south (their normal starting facing as
                    // a P2 unit). Their 3 "back" tiles are the row directly
                    // north of them. Assassin slips from top-left into the
                    // middle back tile and one-shots.
                    startR = 0; startC = 0;
                    moveR = 1; moveC = 2;
                    shadowEnemyR = 2; shadowEnemyC = 2;
                    atkTargetR = shadowEnemyR; atkTargetC = shadowEnemyC;
                } else if (variant.mode === 'aura') {
                    // Paladin centered — allies inside aura gain +2 defense passively.
                    startR = 2; startC = 2;
                    moveR = 2; moveC = 2;
                    atkTargetR = 2; atkTargetC = 2;
                    // Four friendly allies on every diagonal neighbour within 1 tile.
                    auraAllies = [[1,1],[1,3],[3,1],[3,3]];
                } else if (variant.mode === 'heal') {
                    // Paladin stays put and restores 2 HP to an adjacent wounded ally.
                    moveR = 2; moveC = 1;
                    healAllyR = 2; healAllyC = 2;
                    atkTargetR = healAllyR; atkTargetC = healAllyC;
                } else {
                    // basic: move 1, attack adjacent (melee) or at range
                    moveR = 2; moveC = 2;
                    if (s.rng === 1) {
                        atkTargetR = moveR; atkTargetC = moveC + 1;
                    } else {
                        atkTargetR = moveR;
                        atkTargetC = Math.min(cols - 1, moveC + s.rng);
                    }
                }

                // Draw base grid
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        let x = gx + c * cellW, y = gy + r * cellH;
                        this.ctx.fillStyle = (r + c) % 2 === 0 ? '#2f3546' : '#363d52';
                        this.ctx.fillRect(x, y, cellW, cellH);
                        this.ctx.strokeStyle = '#1a1d27';
                        this.ctx.lineWidth = 1;
                        this.ctx.strokeRect(x, y, cellW, cellH);
                    }
                }

                // --- TIMELINE (same boundaries for all variants, shared cursor feel)
                //   0 - 1200 : cursor slides in
                //   1200-1600: click-unit flash
                //   1600-2800: cursor to move target / trap tile / aoe center
                //   2800-3200: click flash
                //   3200-4500: slide (basic/charge) OR enemy walks in (trap) OR channel (aoe)
                //   4500-5700: cursor to attack target (or continuation for trap/aoe)
                //   5700-6100: click flash
                //   6100-7000: attack effect + damage floaters
                //   7000-8000: hold

                // Cursor routing per mode
                let c1R = startR, c1C = startC;           // select unit
                let c2R, c2C;                             // move destination / trap / aoe center
                let c3R, c3C;                             // attack target
                if (variant.mode === 'charge') {
                    c2R = moveR; c2C = moveC;
                    c3R = atkTargetR; c3C = atkTargetC;
                } else if (variant.mode === 'trap') {
                    c2R = trapR; c2C = trapC;
                    c3R = trapR; c3C = trapC;
                } else if (variant.mode === 'aoe') {
                    c2R = aoeCenterR; c2C = aoeCenterC;
                    c3R = aoeCenterR; c3C = aoeCenterC;
                } else if (variant.mode === 'shadow') {
                    c2R = moveR; c2C = moveC;
                    c3R = shadowEnemyR; c3C = shadowEnemyC;
                } else if (variant.mode === 'aura') {
                    // Just click the Paladin — the aura is passive.
                    c2R = startR; c2C = startC;
                    c3R = startR; c3C = startC;
                } else if (variant.mode === 'heal') {
                    c2R = healAllyR; c2C = healAllyC;
                    c3R = healAllyR; c3C = healAllyC;
                } else {
                    c2R = moveR; c2C = moveC;
                    c3R = atkTargetR; c3C = atkTargetC;
                }

                // Unit position (slide animation for basic/charge/shadow)
                let unitR = startR, unitC = startC;
                if (variant.mode === 'basic' || variant.mode === 'charge' || variant.mode === 'shadow') {
                    if (t >= 3200 && t < 4500) {
                        let p = (t - 3200) / 1300;
                        let e = p < 0.5
                            ? 4 * p * p * p
                            : 1 - Math.pow(-2 * p + 2, 3) / 2;
                        unitR = startR + (moveR - startR) * e;
                        unitC = startC + (moveC - startC) * e;
                    } else if (t >= 4500) {
                        unitR = moveR; unitC = moveC;
                    }
                }

                // For aura/heal the unit is always "selected" since we never move.
                let passiveMode = variant.mode === 'aoe' || variant.mode === 'aura' || variant.mode === 'heal';
                let isSelected = t >= 1200 && t < (passiveMode ? 7000 : 4500);

                // Move-range highlight (basic + charge + shadow).
                // Shadow Strike is special: instead of the generic move range,
                // we highlight the 3 "back arc" tiles behind the enemy in
                // violet so players can see exactly where Shadow Strike is
                // legal from.
                if (variant.mode === 'shadow' && t >= 1600 && t < 5500) {
                    // Enemy faces south → back arc = row above the enemy.
                    let pulse = 0.55 + 0.25 * Math.sin(t / 260);
                    let backTiles = [
                        [shadowEnemyR - 1, shadowEnemyC - 1],
                        [shadowEnemyR - 1, shadowEnemyC    ],
                        [shadowEnemyR - 1, shadowEnemyC + 1]
                    ];
                    for (let [rr, cc] of backTiles) {
                        if (rr < 0 || rr >= rows || cc < 0 || cc >= cols) continue;
                        let x = gx + cc * cellW, y = gy + rr * cellH;
                        this.ctx.fillStyle = `rgba(180, 110, 230, ${pulse * 0.35})`;
                        this.ctx.fillRect(x + 2, y + 2, cellW - 4, cellH - 4);
                        this.ctx.strokeStyle = `rgba(210, 160, 255, ${pulse * 0.95})`;
                        this.ctx.setLineDash([4, 3]);
                        this.ctx.lineWidth = 1.8;
                        this.ctx.strokeRect(x + 2, y + 2, cellW - 4, cellH - 4);
                        this.ctx.setLineDash([]);
                    }
                } else if ((variant.mode === 'basic' || variant.mode === 'charge') && t >= 1600 && t < 3200) {
                    let mov = variant.mode === 'charge' ? 2 : s.mov;
                    for (let dr = -mov; dr <= mov; dr++) {
                        for (let dc = -mov; dc <= mov; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            let nr = startR + dr, nc = startC + dc;
                            if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
                            if (!s.diag_move && dr !== 0 && dc !== 0) continue;
                            let dist = s.diag_move
                                ? Math.max(Math.abs(dr), Math.abs(dc))
                                : Math.abs(dr) + Math.abs(dc);
                            if (dist > mov) continue;
                            let x = gx + nc * cellW, y = gy + nr * cellH;
                            this.ctx.fillStyle = 'rgba(70, 180, 90, 0.28)';
                            this.ctx.fillRect(x + 2, y + 2, cellW - 4, cellH - 4);
                            this.ctx.strokeStyle = 'rgba(90, 220, 120, 0.7)';
                            this.ctx.lineWidth = 1.5;
                            this.ctx.strokeRect(x + 2, y + 2, cellW - 4, cellH - 4);
                        }
                    }
                }

                // Attack-target / AOE / trap highlight (skip for aura — passive)
                if (t >= 4500 && t < 7000 && variant.mode !== 'aura') {
                    let tiles = [];
                    let ringColor = 'rgba(255, 90, 60, 0.85)';
                    let fillColor = 'rgba(220, 60, 40, 0.32)';
                    if (variant.mode === 'aoe') {
                        // 3×3 around center
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                let rr = aoeCenterR + dr, cc = aoeCenterC + dc;
                                if (rr >= 0 && rr < rows && cc >= 0 && cc < cols) tiles.push([rr, cc]);
                            }
                        }
                    } else if (variant.mode === 'trap') {
                        tiles.push([trapR, trapC]);
                    } else if (variant.mode === 'charge') {
                        tiles.push([atkTargetR, atkTargetC]);
                        for (let cl of cleaveList) tiles.push(cl);
                    } else if (variant.mode === 'shadow') {
                        // Shadow Strike target highlighted in deep purple
                        tiles.push([shadowEnemyR, shadowEnemyC]);
                        ringColor = 'rgba(200, 120, 255, 0.9)';
                        fillColor = 'rgba(90, 40, 140, 0.35)';
                    } else if (variant.mode === 'heal') {
                        // Heal target highlighted in friendly green instead of red
                        tiles.push([healAllyR, healAllyC]);
                        ringColor = 'rgba(90, 220, 120, 0.9)';
                        fillColor = 'rgba(70, 180, 90, 0.32)';
                    } else {
                        tiles.push([atkTargetR, atkTargetC]);
                    }
                    for (let [rr, cc] of tiles) {
                        let tx = gx + cc * cellW, ty = gy + rr * cellH;
                        this.ctx.fillStyle = fillColor;
                        this.ctx.fillRect(tx + 2, ty + 2, cellW - 4, cellH - 4);
                        this.ctx.strokeStyle = ringColor;
                        this.ctx.lineWidth = 2;
                        this.ctx.strokeRect(tx + 2, ty + 2, cellW - 4, cellH - 4);
                    }
                }

                // Aura ring: glow a 3×3 around the Paladin the whole time.
                if (variant.mode === 'aura' && t >= 1200) {
                    let pulse = 0.55 + 0.25 * Math.sin(t / 280);
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            let rr = startR + dr, cc = startC + dc;
                            if (rr < 0 || rr >= rows || cc < 0 || cc >= cols) continue;
                            let x = gx + cc * cellW, y = gy + rr * cellH;
                            this.ctx.fillStyle = `rgba(246, 216, 122, ${pulse * 0.22})`;
                            this.ctx.fillRect(x + 2, y + 2, cellW - 4, cellH - 4);
                            this.ctx.strokeStyle = `rgba(246, 216, 122, ${pulse * 0.85})`;
                            this.ctx.lineWidth = 1.5;
                            this.ctx.strokeRect(x + 2, y + 2, cellW - 4, cellH - 4);
                        }
                    }
                }

                // Select-ring on unit
                let unitX = gx + unitC * cellW + cellW / 2;
                let unitY = gy + unitR * cellH + cellH / 2;
                if (isSelected) {
                    let pulse = 0.6 + 0.4 * Math.sin(t / 120);
                    this.ctx.strokeStyle = `rgba(246, 216, 122, ${pulse})`;
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.ellipse(unitX, unitY + 8, cellW * 0.4, cellH * 0.28, 0, 0, Math.PI * 2);
                    this.ctx.stroke();
                }

                // Helper: draw a sprite at grid cell (r, c) as given player color.
                let drawSpriteAt = (utype, r, c, player) => {
                    let sp = UNIT_SPRITES[utype + '_' + player];
                    if (!sp || !sp.complete || !sp.naturalWidth) return;
                    let [sw, sh] = spriteSize(utype);
                    let dw = Math.min(sw, cellW * 0.9);
                    let dh = dw * (sh / sw);
                    let px = gx + c * cellW + cellW / 2;
                    let py = gy + r * cellH + cellH / 2;
                    this.ctx.drawImage(sp, px - dw / 2, py - dh + 8, dw, dh);
                };

                // --- ENEMY DUMMIES -------------------------------------------------
                // Charge: main target + cleave targets always visible.
                if (variant.mode === 'charge') {
                    drawSpriteAt('Squire', atkTargetR, atkTargetC, 2);
                    for (let [rr, cc] of cleaveList) drawSpriteAt('Squire', rr, cc, 2);
                }
                // Trap: enemy walks in from trapEnemyR0 -> trapEnemyR1 between 3200-6100
                if (variant.mode === 'trap') {
                    let er = trapEnemyR0, ec = trapEnemyC0;
                    let show = true;
                    if (t < 3200) {
                        er = trapEnemyR0; ec = trapEnemyC0;
                    } else if (t < 6100) {
                        let p = Math.min(1, (t - 3200) / 2900);
                        er = trapEnemyR0 + (trapEnemyR1 - trapEnemyR0) * p;
                        ec = trapEnemyC0 + (trapEnemyC1 - trapEnemyC0) * p;
                    } else {
                        // Explosion happened — hide the dummy to show the kill.
                        show = false;
                    }
                    if (show) drawSpriteAt('Squire', er, ec, 2);
                }
                // AOE: dummies on every splash target + center
                if (variant.mode === 'aoe') {
                    let hidden = t >= 6100;
                    if (!hidden) drawSpriteAt('Squire', aoeCenterR, aoeCenterC, 2);
                    for (let [rr, cc] of aoeSplashes) {
                        if (!hidden) drawSpriteAt('Squire', rr, cc, 2);
                    }
                }
                // Basic ranged: show a single dummy to give the bolt a target
                let enemyType = variant.enemyType || 'Squire';
                if (variant.mode === 'basic' && s.rng > 1) {
                    drawSpriteAt(enemyType, atkTargetR, atkTargetC, 2);
                }
                // Basic melee: show the target dummy too so the swing has context
                if (variant.mode === 'basic' && s.rng === 1) {
                    drawSpriteAt(enemyType, atkTargetR, atkTargetC, 2);
                    // Knight/Paladin cleave on EVERY melee swing — show the cleaved
                    // neighbour who also gets hit for half damage.
                    if (s.cleave > 0) {
                        let clR = Math.max(0, atkTargetR - 1);
                        let clC = Math.min(cols - 1, atkTargetC);
                        if (clR !== atkTargetR || clC !== atkTargetC) {
                            drawSpriteAt('Squire', clR, clC, 2);
                        }
                    }
                }
                // Shadow: draw enemy dummy; hide once the strike kills it (6100+).
                // Also draw a downward facing chevron above the enemy so players
                // see which way the enemy is looking (front = south, back = north).
                if (variant.mode === 'shadow') {
                    if (t < 6100) {
                        drawSpriteAt('Squire', shadowEnemyR, shadowEnemyC, 2);
                        // Facing arrow — bright yellow south-pointing triangle
                        // floating just in front of (below) the enemy sprite.
                        let ex = gx + shadowEnemyC * cellW + cellW / 2;
                        let ey = gy + shadowEnemyR * cellH + cellH - 2;
                        this.ctx.save();
                        this.ctx.fillStyle = 'rgba(255, 220, 80, 0.95)';
                        this.ctx.strokeStyle = 'rgba(20, 10, 0, 0.85)';
                        this.ctx.lineWidth = 1.2;
                        this.ctx.beginPath();
                        this.ctx.moveTo(ex - 7, ey);
                        this.ctx.lineTo(ex + 7, ey);
                        this.ctx.lineTo(ex, ey + 9);
                        this.ctx.closePath();
                        this.ctx.fill();
                        this.ctx.stroke();
                        this.ctx.fillStyle = 'rgba(255, 220, 80, 0.95)';
                        this.ctx.font = 'bold 9px Arial';
                        this.ctx.textAlign = 'center';
                        this.ctx.strokeStyle = 'rgba(20, 10, 0, 0.9)';
                        this.ctx.lineWidth = 3;
                        this.ctx.strokeText('facing', ex, ey + 20);
                        this.ctx.fillText('facing', ex, ey + 20);
                        this.ctx.restore();
                    }
                }
                // Aura: draw every friendly ally around the Paladin.
                if (variant.mode === 'aura') {
                    // Alternating unit types so the aura clearly benefits the WHOLE team.
                    let allyTypes = ['Squire', 'Archer', 'Adept', 'Knight'];
                    for (let i = 0; i < auraAllies.length; i++) {
                        let [rr, cc] = auraAllies[i];
                        drawSpriteAt(allyTypes[i % allyTypes.length], rr, cc, 1);
                    }
                }
                // Heal: draw the wounded ally (a Knight) with a red HP bar above it.
                if (variant.mode === 'heal') {
                    drawSpriteAt('Knight', healAllyR, healAllyC, 1);
                    // HP bar showing the wound — starts half, fills to full after heal.
                    let hpX = gx + healAllyC * cellW + cellW * 0.15;
                    let hpY = gy + healAllyR * cellH + cellH * 0.15;
                    let hpW = cellW * 0.7, hpH = 4;
                    let healed = t >= 6100;
                    let frac = healed ? 1.0 : 0.5;
                    this.ctx.fillStyle = '#3a1010';
                    this.ctx.fillRect(hpX, hpY, hpW, hpH);
                    this.ctx.fillStyle = healed ? '#46d246' : '#d04040';
                    this.ctx.fillRect(hpX, hpY, hpW * frac, hpH);
                    this.ctx.strokeStyle = '#1a1d27';
                    this.ctx.lineWidth = 1;
                    this.ctx.strokeRect(hpX, hpY, hpW, hpH);
                }

                // --- TRAP ICON -----------------------------------------------------
                if (variant.mode === 'trap' && t >= 3200) {
                    let tx = gx + trapC * cellW + cellW / 2;
                    let ty = gy + trapR * cellH + cellH / 2;
                    let pulse = 0.7 + 0.3 * Math.sin(t / 120);
                    this.ctx.fillStyle = `rgba(255, 160, 40, ${pulse * 0.9})`;
                    this.ctx.beginPath();
                    this.ctx.arc(tx, ty + 6, 10, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.strokeStyle = '#1a1d27';
                    this.ctx.lineWidth = 2;
                    this.ctx.stroke();
                    this.ctx.fillStyle = '#1a1d27';
                    this.ctx.font = 'bold 13px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText('⚠', tx, ty + 6);
                    this.ctx.textBaseline = 'alphabetic';
                }

                // --- UNIT SPRITE (player-1 blue) ----------------------------------
                if (variant.mode === 'shadow') {
                    // Assassin is pre-stealthed for the Shadow Strike demo.
                    // Ghost her out and add a violet shadow pool underneath.
                    let ux = gx + unitC * cellW + cellW / 2;
                    let uy = gy + unitR * cellH + cellH - 6;
                    this.ctx.fillStyle = 'rgba(120, 40, 160, 0.35)';
                    this.ctx.beginPath();
                    this.ctx.ellipse(ux, uy, cellW * 0.35, 4, 0, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.save();
                    this.ctx.globalAlpha = 0.55;
                    drawSpriteAt(type, unitR, unitC, 1);
                    this.ctx.restore();
                } else {
                    drawSpriteAt(type, unitR, unitC, 1);
                }

                // --- "STRIKE FROM BEHIND!" BANNER --------------------------------
                // Violet banner above the Assassin during the shadow demo so the
                // "must attack from the back arc" rule reads immediately.
                if (variant.mode === 'shadow' && t >= 1200 && t < 6300) {
                    let fadeIn = Math.min(1, (t - 1200) / 400);
                    let fadeOut = t > 5800 ? Math.min(1, (t - 5800) / 500) : 0;
                    let alpha = fadeIn * (1 - fadeOut);
                    let bounce = 2 + 2 * Math.abs(Math.sin(t / 180));
                    let ux = gx + unitC * cellW + cellW / 2;
                    let uy = gy + unitR * cellH + cellH / 2 - 30 - bounce;
                    this.ctx.save();
                    this.ctx.font = '900 16px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.lineWidth = 4;
                    this.ctx.strokeStyle = `rgba(20, 0, 30, ${alpha})`;
                    this.ctx.strokeText('STRIKE FROM BEHIND!', ux, uy);
                    this.ctx.fillStyle = `rgba(220, 170, 255, ${alpha})`;
                    this.ctx.fillText('STRIKE FROM BEHIND!', ux, uy);
                    this.ctx.restore();
                }

                // --- "CHARGE!" SHOUT ----------------------------------------------
                // Bold orange banner that tracks the charging unit during the slide
                // and lingers briefly after they land, so players can tell a charge
                // apart from a regular step.
                if (variant.mode === 'charge' && t >= 3000 && t < 5500) {
                    let chargeP = Math.min(1, Math.max(0, (t - 3000) / 400));
                    let fadeP = t > 4700 ? Math.min(1, (t - 4700) / 800) : 0;
                    let alpha = (1 - fadeP) * (0.4 + 0.6 * chargeP);
                    let bounce = 3 + 3 * Math.abs(Math.sin(t / 90));
                    let scale = 1 + 0.08 * Math.sin(t / 75);
                    let ux = gx + unitC * cellW + cellW / 2;
                    let uy = gy + unitR * cellH + cellH / 2 - 32 - bounce;
                    this.ctx.save();
                    this.ctx.translate(ux, uy);
                    this.ctx.scale(scale, scale);
                    this.ctx.font = '900 22px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.lineWidth = 4;
                    this.ctx.strokeStyle = `rgba(20, 5, 0, ${alpha})`;
                    this.ctx.strokeText('CHARGE!', 0, 0);
                    this.ctx.fillStyle = `rgba(255, 170, 60, ${alpha})`;
                    this.ctx.fillText('CHARGE!', 0, 0);
                    this.ctx.restore();
                }

                // --- ATTACK EFFECTS -----------------------------------------------
                if (t >= 6100 && t < 7000) {
                    let localT = (t - 6100) / 900;
                    let flashA = Math.sin(localT * Math.PI);
                    let sx0 = gx + unitC * cellW + cellW / 2;
                    let sy0 = gy + unitR * cellH + cellH / 2;

                    if (variant.mode === 'aoe') {
                        // Rain Fire: giant fireburst + 4 smaller splash bursts.
                        let centerX = gx + aoeCenterC * cellW + cellW / 2;
                        let centerY = gy + aoeCenterR * cellH + cellH / 2;
                        // 3x3 tinted fire fill
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                let rr = aoeCenterR + dr, cc = aoeCenterC + dc;
                                if (rr < 0 || rr >= rows || cc < 0 || cc >= cols) continue;
                                let x = gx + cc * cellW, y = gy + rr * cellH;
                                this.ctx.fillStyle = `rgba(255, 120, 40, ${flashA * 0.55})`;
                                this.ctx.fillRect(x + 2, y + 2, cellW - 4, cellH - 4);
                            }
                        }
                        // Big flash at center
                        let g = this.ctx.createRadialGradient(centerX, centerY, 4, centerX, centerY, 60);
                        g.addColorStop(0, `rgba(255, 240, 180, ${flashA})`);
                        g.addColorStop(0.5, `rgba(255, 140, 60, ${flashA * 0.7})`);
                        g.addColorStop(1, 'rgba(180, 30, 20, 0)');
                        this.ctx.fillStyle = g;
                        this.ctx.beginPath();
                        this.ctx.arc(centerX, centerY, 60, 0, Math.PI * 2);
                        this.ctx.fill();
                    } else if (variant.mode === 'trap') {
                        // Explosion at trap tile
                        let tx = gx + trapC * cellW + cellW / 2;
                        let ty = gy + trapR * cellH + cellH / 2;
                        let g = this.ctx.createRadialGradient(tx, ty, 2, tx, ty, 40);
                        g.addColorStop(0, `rgba(255, 230, 160, ${flashA})`);
                        g.addColorStop(0.4, `rgba(255, 120, 40, ${flashA * 0.8})`);
                        g.addColorStop(1, 'rgba(180, 30, 20, 0)');
                        this.ctx.fillStyle = g;
                        this.ctx.beginPath();
                        this.ctx.arc(tx, ty, 40, 0, Math.PI * 2);
                        this.ctx.fill();
                    } else if (variant.mode === 'shadow') {
                        // Dark violet blooms where the enemy died — instant kill burst.
                        let tx = gx + shadowEnemyC * cellW + cellW / 2;
                        let ty = gy + shadowEnemyR * cellH + cellH / 2;
                        let g = this.ctx.createRadialGradient(tx, ty, 2, tx, ty, 45);
                        g.addColorStop(0,   `rgba(230, 180, 255, ${flashA})`);
                        g.addColorStop(0.4, `rgba(140, 60, 200,  ${flashA * 0.8})`);
                        g.addColorStop(1,   'rgba(20, 0, 40, 0)');
                        this.ctx.fillStyle = g;
                        this.ctx.beginPath();
                        this.ctx.arc(tx, ty, 45, 0, Math.PI * 2);
                        this.ctx.fill();
                    } else if (variant.mode === 'heal') {
                        // Green sparkle halo rising off the healed ally.
                        let tx = gx + healAllyC * cellW + cellW / 2;
                        let ty = gy + healAllyR * cellH + cellH / 2;
                        let g = this.ctx.createRadialGradient(tx, ty, 2, tx, ty, 35);
                        g.addColorStop(0,   `rgba(220, 255, 200, ${flashA})`);
                        g.addColorStop(0.5, `rgba(80, 220, 100,  ${flashA * 0.7})`);
                        g.addColorStop(1,   'rgba(20, 90, 40, 0)');
                        this.ctx.fillStyle = g;
                        this.ctx.beginPath();
                        this.ctx.arc(tx, ty, 35, 0, Math.PI * 2);
                        this.ctx.fill();
                        // A few tiny sparkle dots rising
                        for (let i = 0; i < 4; i++) {
                            let sparkY = ty + 10 - (localT * 26) - i * 4;
                            let sparkX = tx + Math.sin(localT * 6 + i) * 10;
                            this.ctx.fillStyle = `rgba(200, 255, 180, ${flashA * 0.9})`;
                            this.ctx.beginPath();
                            this.ctx.arc(sparkX, sparkY, 2, 0, Math.PI * 2);
                            this.ctx.fill();
                        }
                    } else if (s.rng === 1) {
                        // Melee swoosh — in charge mode we also hit cleave tiles
                        let hitList = [[atkTargetR, atkTargetC]];
                        if (variant.mode === 'charge') {
                            for (let cl of cleaveList) hitList.push(cl);
                        }
                        // K/P cleave on basic too — include the neighbour floater tile
                        if (variant.mode === 'basic' && s.cleave > 0) {
                            let clR = Math.max(0, atkTargetR - 1);
                            let clC = Math.min(cols - 1, atkTargetC);
                            if (clR !== atkTargetR || clC !== atkTargetC) {
                                hitList.push([clR, clC]);
                            }
                        }
                        for (let [hr, hc] of hitList) {
                            let tx = gx + hc * cellW + cellW / 2;
                            let ty = gy + hr * cellH + cellH / 2;
                            let dx = tx - sx0, dy = ty - sy0;
                            let len = Math.hypot(dx, dy) || 1;
                            let perpX = -dy / len, perpY = dx / len;
                            if (perpY > 0) { perpX = -perpX; perpY = -perpY; }
                            let arcH = 12 + len * 0.2;
                            let ccx = (sx0 + tx) / 2 + perpX * arcH;
                            let ccy = (sy0 + ty) / 2 + perpY * arcH;
                            this.ctx.lineCap = 'round';
                            this.ctx.strokeStyle = `rgba(230, 40, 40, ${flashA * 0.85})`;
                            this.ctx.lineWidth = 6;
                            this.ctx.beginPath();
                            this.ctx.moveTo(sx0, sy0);
                            this.ctx.quadraticCurveTo(ccx, ccy, tx, ty);
                            this.ctx.stroke();
                            this.ctx.strokeStyle = `rgba(255, 230, 220, ${flashA})`;
                            this.ctx.lineWidth = 2;
                            this.ctx.stroke();
                            this.ctx.lineCap = 'butt';
                        }
                    } else {
                        // Ranged / Magic bolt
                        let tx = gx + atkTargetC * cellW + cellW / 2;
                        let ty = gy + atkTargetR * cellH + cellH / 2;
                        let color = s.atk_type === 'Magic'
                            ? `rgba(255, 140, 40, ${flashA})`
                            : `rgba(255, 235, 170, ${flashA})`;
                        this.ctx.strokeStyle = color;
                        this.ctx.lineWidth = 3;
                        this.ctx.lineCap = 'round';
                        this.ctx.beginPath();
                        this.ctx.moveTo(sx0, sy0);
                        this.ctx.lineTo(tx, ty);
                        this.ctx.stroke();
                        this.ctx.lineCap = 'butt';
                        this.ctx.fillStyle = color;
                        this.ctx.beginPath();
                        this.ctx.arc(tx, ty, 5, 0, Math.PI * 2);
                        this.ctx.fill();
                    }
                }

                // --- DAMAGE FLOATERS ----------------------------------------------
                // Floating number(s) that rise + fade over 6100-7600.
                if (t >= 6100 && t < 7600 && variant.mode !== 'aura') {
                    let p = (t - 6100) / 1500;
                    let yOff = -18 * p;
                    let alpha = p < 0.2 ? p / 0.2 : (1 - (p - 0.2) / 0.8);
                    alpha = Math.max(0, Math.min(1, alpha));
                    this.ctx.save();
                    this.ctx.font = 'bold 20px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.lineWidth = 3;

                    // [r, c, text, color] — color override for heals/kills.
                    let floats = [];
                    let defaultColor = 'rgba(255, 90, 60, {a})';
                    if (variant.mode === 'charge') {
                        // Main takes double damage; cleaves take half. Units reference
                        // the game's actual attack stat so these stay in sync.
                        let atkMe = s.atk.Me;
                        let mainHit = atkMe * 2;
                        let cleaveHit = Math.max(1, Math.floor(atkMe / 2));
                        floats.push([atkTargetR, atkTargetC, '-' + mainHit, defaultColor]);
                        for (let [rr, cc] of cleaveList) floats.push([rr, cc, '-' + cleaveHit, defaultColor]);
                    } else if (variant.mode === 'trap') {
                        floats.push([trapR, trapC, '-9', defaultColor]);
                    } else if (variant.mode === 'aoe') {
                        floats.push([aoeCenterR, aoeCenterC, '-14', defaultColor]);
                        for (let [rr, cc] of aoeSplashes) floats.push([rr, cc, '-7', defaultColor]);
                    } else if (variant.mode === 'shadow') {
                        // Not a damage number — an instant-kill marker in violet.
                        floats.push([shadowEnemyR, shadowEnemyC, 'KILL',
                                     'rgba(220, 170, 255, {a})']);
                    } else if (variant.mode === 'heal') {
                        floats.push([healAllyR, healAllyC, '+2 HP',
                                     'rgba(120, 240, 140, {a})']);
                    } else {
                        // basic: take the atk value matching atk_type. Note: Knight
                        // and Paladin cleave even on a basic swing, so we also show
                        // a half-damage floater on a cleaved neighbour for them.
                        let key = s.atk_type === 'Melee' ? 'Me'
                                : s.atk_type === 'Magic' ? 'Ma'
                                : s.atk_type === 'Explosive' ? 'Ex' : 'P';
                        let main = s.atk[key];
                        if (variant.showMath) {
                            // Spell out the attack formula: atk − def = dmg (min 1).
                            let enemyStats = STATS[variant.enemyType || 'Squire'];
                            let def = enemyStats.dfn[key];
                            let dmg = Math.max(1, main - def);
                            // Use a slightly smaller font so the whole equation fits.
                            floats.push([atkTargetR, atkTargetC,
                                         `${main} − ${def} = ${dmg}`,
                                         defaultColor, 'math']);
                        } else {
                            floats.push([atkTargetR, atkTargetC, '-' + main, defaultColor]);
                        }
                        if (s.cleave > 0 && s.rng === 1) {
                            let cleaveHit = Math.max(1, Math.floor(main / 2));
                            // Imagined cleaved neighbour — the cell diagonally up-right.
                            let clR = Math.max(0, atkTargetR - 1);
                            let clC = Math.min(cols - 1, atkTargetC);
                            if (clR !== atkTargetR || clC !== atkTargetC) {
                                floats.push([clR, clC, '-' + cleaveHit, defaultColor]);
                            }
                        }
                    }
                    for (let entry of floats) {
                        let [rr, cc, txt, colorTmpl, style] = entry;
                        let fx = gx + cc * cellW + cellW / 2;
                        let fy = gy + rr * cellH + cellH / 2 - 4 + yOff;
                        if (style === 'math') {
                            this.ctx.font = 'bold 13px Arial';
                        } else {
                            this.ctx.font = 'bold 20px Arial';
                        }
                        this.ctx.strokeStyle = `rgba(20, 10, 5, ${alpha})`;
                        this.ctx.strokeText(txt, fx, fy);
                        this.ctx.fillStyle = colorTmpl.replace('{a}', alpha.toFixed(3));
                        this.ctx.fillText(txt, fx, fy);
                    }
                    this.ctx.restore();
                }

                // --- AURA CHIPS ----------------------------------------------------
                // For the Paladin aura demo we pulse a "+2 DEF" chip over each ally
                // the whole time, since the buff is permanent while adjacent.
                if (variant.mode === 'aura' && t >= 1200) {
                    let pulse = 0.6 + 0.4 * Math.sin(t / 260);
                    this.ctx.save();
                    this.ctx.font = 'bold 13px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.lineWidth = 3;
                    for (let [rr, cc] of auraAllies) {
                        let fx = gx + cc * cellW + cellW / 2;
                        let fy = gy + rr * cellH + 14;
                        this.ctx.strokeStyle = `rgba(20, 10, 5, ${pulse})`;
                        this.ctx.strokeText('+2 DEF', fx, fy);
                        this.ctx.fillStyle = `rgba(246, 216, 122, ${pulse})`;
                        this.ctx.fillText('+2 DEF', fx, fy);
                    }
                    this.ctx.restore();
                }

                // --- CURSOR --------------------------------------------------------
                let cursorX, cursorY, cursorVisible = true;
                let cellCx = (r, c) => gx + c * cellW + cellW * 0.55;
                let cellCy = (r, c) => gy + r * cellH + cellH * 0.55;
                if (t < 1200) {
                    let cp = t / 1200;
                    let endX = cellCx(c1R, c1C), endY = cellCy(c1R, c1C);
                    cursorX = (gx + gridW + 30) + (endX - (gx + gridW + 30)) * cp;
                    cursorY = (gy + gridH + 30) + (endY - (gy + gridH + 30)) * cp;
                } else if (t < 1600) {
                    cursorX = cellCx(c1R, c1C); cursorY = cellCy(c1R, c1C);
                    cursorVisible = (Math.floor((t - 1200) / 100) % 2) === 0;
                } else if (t < 2800) {
                    let cp = (t - 1600) / 1200;
                    cursorX = cellCx(c1R, c1C) + (cellCx(c2R, c2C) - cellCx(c1R, c1C)) * cp;
                    cursorY = cellCy(c1R, c1C) + (cellCy(c2R, c2C) - cellCy(c1R, c1C)) * cp;
                } else if (t < 3200) {
                    cursorX = cellCx(c2R, c2C); cursorY = cellCy(c2R, c2C);
                    cursorVisible = (Math.floor((t - 2800) / 100) % 2) === 0;
                } else if (t < 4500) {
                    cursorX = cellCx(c2R, c2C); cursorY = cellCy(c2R, c2C);
                } else if (t < 5700) {
                    let cp = (t - 4500) / 1200;
                    cursorX = cellCx(c2R, c2C) + (cellCx(c3R, c3C) - cellCx(c2R, c2C)) * cp;
                    cursorY = cellCy(c2R, c2C) + (cellCy(c3R, c3C) - cellCy(c2R, c2C)) * cp;
                } else if (t < 6100) {
                    cursorX = cellCx(c3R, c3C); cursorY = cellCy(c3R, c3C);
                    cursorVisible = (Math.floor((t - 5700) / 100) % 2) === 0;
                } else {
                    cursorX = cellCx(c3R, c3C); cursorY = cellCy(c3R, c3C);
                }
                if (cursorVisible) this.drawTutorialCursor(cursorX, cursorY);

                // --- PHASE LABEL ---------------------------------------------------
                let label;
                if (variant.mode === 'trap') {
                    if (t < 1600) label = '① Select your Rogue';
                    else if (t < 3200) label = '② Choose a tile for the trap';
                    else if (t < 6100) label = '③ Enemy steps on the trap…';
                    else if (t < 7000) label = '④ Trap detonates!';
                    else label = '…';
                } else if (variant.mode === 'aoe') {
                    if (t < 1600) label = '① Select your Archmage';
                    else if (t < 3200) label = '② Target a 3×3 area (range 6)';
                    else if (t < 6100) label = '③ Channeling…';
                    else if (t < 7000) label = '④ Rain Fire strikes!';
                    else label = '…';
                } else if (variant.mode === 'charge') {
                    if (t < 1600) label = '① Select your unit';
                    else if (t < 3200) label = '② Charge 2 squares in a line';
                    else if (t < 4500) label = '③ Unit charges forward';
                    else if (t < 6100) label = '④ Strike main + cleave neighbours';
                    else if (t < 7000) label = '⑤ Main takes DOUBLE, cleaves take HALF';
                    else label = '…';
                } else if (variant.mode === 'shadow') {
                    if (t < 1600) label = '① Select your stealthed Assassin';
                    else if (t < 3200) label = '② Flank behind an enemy';
                    else if (t < 4500) label = '③ Slip into position';
                    else if (t < 6100) label = '④ Mark the Shadow Strike target';
                    else if (t < 7000) label = '⑤ Instant kill!';
                    else label = '…';
                } else if (variant.mode === 'aura') {
                    if (t < 1600) label = '① Paladin on the field';
                    else label = '② Every adjacent ally gets +2 to all defenses (passive)';
                } else if (variant.mode === 'heal') {
                    if (t < 1600) label = '① Select your Paladin';
                    else if (t < 3200) label = '② Pick "Lend Aid" on an adjacent ally';
                    else if (t < 6100) label = '③ Channelling aid…';
                    else if (t < 7000) label = '④ Ally restored +2 HP';
                    else label = '…';
                } else {
                    if (t < 1600) label = '① Select your unit';
                    else if (t < 3200) label = '② Choose a destination';
                    else if (t < 4500) label = '③ Unit moves';
                    else if (t < 6100) label = '④ Choose attack target';
                    else if (t < 7000) label = '⑤ Attack!';
                    else label = '…';
                }
                this.ctx.fillStyle = '#b2aca4';
                this.ctx.font = '13px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText(label, boxX + boxW / 2, boxY + boxH - 12);
            }

            drawTutorialCursor(x, y) {
                // Classic arrow cursor pointing up-left
                this.ctx.fillStyle = '#ffffff';
                this.ctx.strokeStyle = '#000000';
                this.ctx.lineWidth = 1.5;
                this.ctx.beginPath();
                this.ctx.moveTo(x, y);
                this.ctx.lineTo(x + 14, y + 5);
                this.ctx.lineTo(x + 6, y + 7);
                this.ctx.lineTo(x + 10, y + 16);
                this.ctx.lineTo(x + 7, y + 18);
                this.ctx.lineTo(x + 3, y + 9);
                this.ctx.lineTo(x - 2, y + 13);
                this.ctx.closePath();
                this.ctx.fill();
                this.ctx.stroke();
            }

            // Stats panel: cost, core stats, attack/defense grids
            drawTutorialStats(type, boxX, boxY, boxW, boxH) {
                let s = STATS[type];
                // Panel backdrop
                this.ctx.fillStyle = '#1d212d';
                this.ctx.fillRect(boxX, boxY, boxW, boxH);
                this.ctx.strokeStyle = '#3a4050';
                this.ctx.lineWidth = 1;
                this.ctx.strokeRect(boxX, boxY, boxW, boxH);

                let y = boxY + 22;
                // Section: cost
                this.ctx.fillStyle = '#9ac4ff';
                this.ctx.font = 'bold 13px Arial';
                this.ctx.textAlign = 'left';
                this.ctx.fillText('COST', boxX + 14, y);
                y += 22;

                let inv = INVESTED[type];
                let costBreak;
                if (inv === 1) costBreak = '1 token';
                else if (inv === 3) costBreak = '3 tokens (1 + 2)';
                else costBreak = '6 tokens (1 + 2 + 3)';
                this.ctx.fillStyle = '#f6d87a';
                this.ctx.font = 'bold 20px Arial';
                this.ctx.fillText(costBreak, boxX + 14, y);
                y += 24;

                // Core stats grid
                this.ctx.fillStyle = '#9ac4ff';
                this.ctx.font = 'bold 13px Arial';
                this.ctx.fillText('CORE STATS', boxX + 14, y);
                y += 18;

                let core = [
                    ['HP', s.hp],
                    ['Move', s.mov],
                    ['Range', s.rng],
                    ['Weight', s.weight],
                    ['Type', s.atk_type]
                ];
                for (let [k, v] of core) {
                    this.ctx.fillStyle = '#b2aca4';
                    this.ctx.font = '13px Arial';
                    this.ctx.fillText(k, boxX + 16, y);
                    this.ctx.fillStyle = '#eeeeee';
                    this.ctx.font = 'bold 13px Arial';
                    this.ctx.textAlign = 'right';
                    this.ctx.fillText(String(v), boxX + boxW - 16, y);
                    this.ctx.textAlign = 'left';
                    y += 18;
                }
                y += 6;

                // Attack damage grid — 4 columns (P, Me, Ex, Ma)
                this.ctx.fillStyle = '#ff9a7a';
                this.ctx.font = 'bold 13px Arial';
                this.ctx.fillText('ATTACK DAMAGE', boxX + 14, y);
                y += 18;
                y = this.drawTutorialStatGrid(boxX + 14, y, boxW - 28, s.atk, '#ff9a7a');
                y += 10;

                // Defense grid
                this.ctx.fillStyle = '#7abaff';
                this.ctx.font = 'bold 13px Arial';
                this.ctx.fillText('DEFENSE', boxX + 14, y);
                y += 18;
                y = this.drawTutorialStatGrid(boxX + 14, y, boxW - 28, s.dfn, '#7abaff');
            }

            // Draw one row of 4 labeled stat cells (Piercing / Melee / Explosive / Magic).
            // Labels are full words stacked above the number so players never have
            // to guess what "Mel" or "Exp" means.
            drawTutorialStatGrid(x, y, w, data, accent) {
                let keys = ['P', 'Me', 'Ex', 'Ma'];
                let labels = ['Piercing', 'Melee', 'Explosive', 'Magic'];
                let cw = w / 4;
                let ch = 48;
                for (let i = 0; i < 4; i++) {
                    let cx = x + i * cw;
                    this.ctx.fillStyle = '#262b3a';
                    this.ctx.fillRect(cx + 2, y, cw - 4, ch);
                    this.ctx.strokeStyle = accent;
                    this.ctx.lineWidth = 1;
                    this.ctx.strokeRect(cx + 2, y, cw - 4, ch);
                    this.ctx.fillStyle = '#b2aca4';
                    this.ctx.font = 'bold 10px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText(labels[i], cx + cw / 2, y + 14);
                    this.ctx.fillStyle = '#eeeeee';
                    this.ctx.font = 'bold 19px Arial';
                    this.ctx.fillText(String(data[keys[i]]), cx + cw / 2, y + 38);
                }
                return y + ch + 4;
            }

            // Crude word-wrapping for the abilities box.
            wrapTutorialText(text, maxWidth) {
                let words = text.split(' ');
                let lines = [];
                let cur = '';
                for (let w of words) {
                    let test = cur ? cur + ' ' + w : w;
                    if (this.ctx.measureText(test).width <= maxWidth) {
                        cur = test;
                    } else {
                        if (cur) lines.push(cur);
                        cur = w;
                    }
                }
                if (cur) lines.push(cur);
                return lines;
            }

            drawShop(game) {
                let p = game.phase === 'SHOP_P1' ? 1 : 2;
                let units = game.phase === 'SHOP_P1' ? game.p1Units : game.p2Units;

                this.ctx.textAlign = 'left';
                this.ctx.fillStyle = '#eeeeee';
                if (game.gameMode === 'Campaign') {
                    this.ctx.font = '12px Arial';

                this.ctx.font = 'bold 16px Arial';

                this.ctx.textAlign = 'right';
                this.ctx.fillText(`Tokens: ${left} / ${game.budget}`, CANVAS_W - 14, UI_TOP + 48);

                let cardH = 70;
                let cardW = 225;
                let margin = 12;
                let startX = (CANVAS_W - (cardW * 3 + margin * 2)) / 2;
                for (let i = 0; i < L1_UNITS.length; i++) {
                    let t = L1_UNITS[i];
                    let x = startX + i * (cardW + margin);

                    this.drawUnitCard(game, `buy_${t}`, x, cardY, cardW, cardH, t, canBuy, 'buy');

                let btnY = CANVAS_H - 50;

            drawUnitCard(game, key, x, y, w, h, unitType, enabled, mode) {
                let s = STATS[unitType];
                let bg = enabled ? '#2d3650' : '#252525';
                let border = enabled ? '#6080c0' : '#444';
                // Shadow
                this.ctx.fillStyle = 'rgba(0,0,0,0.4)';
                this.ctx.fillRect(x + 2, y + 2, w, h);
                this.ctx.fillStyle = bg;
                this.ctx.fillRect(x, y, w, h);
                this.ctx.strokeStyle = border;
                this.ctx.lineWidth = 1.5;
                this.ctx.strokeRect(x, y, w, h);

                // Unit name
                this.ctx.fillStyle = enabled ? '#ffffff' : '#888';
                this.ctx.font = 'bold 15px Arial';
                this.ctx.textAlign = 'left';
                this.ctx.fillText(unitType, x + 10, y + 20);

                // Cost badge (upper right)
                let costText = mode === 'buy' ? '1t' : `+${s.cost}t`;
                this.ctx.fillStyle = enabled ? '#46d246' : '#555';
                this.ctx.font = 'bold 13px Arial';
                this.ctx.textAlign = 'right';
                this.ctx.fillText(costText, x + w - 10, y + 20);

                // Stats line: HP / Mov / Rng
                this.ctx.fillStyle = enabled ? '#b2c6ff' : '#666';
                this.ctx.font = '11px Arial';
                this.ctx.textAlign = 'left';
                let statsLine = `HP ${s.hp}  MV ${s.mov}  RNG ${s.rng}  WT ${s.weight}`;
                this.ctx.fillText(statsLine, x + 10, y + 40);

                // Type / damage
                this.ctx.fillStyle = enabled ? '#eecc88' : '#666';
                this.ctx.font = '11px Arial';
                let atkTag = s.atk_type + (s.cleave > 0 ? ` +Cleave${s.cleave}` : '') + (s.firebolt ? ' (pierce)' : '') + (s.blocks ? ' (blocks)' : '');

                this.ctx.fillStyle = enabled ? '#46d246' : '#555';
                this.ctx.font = 'bold 12px Arial';
                this.ctx.textAlign = 'center';
                let actionText = mode === 'buy' ? '+ Buy' : '▲ Upgrade';
                this.ctx.fillText(actionText, x + w / 2, y + h - 10);

                if (enabled) {
                    game.clickBounds[key] = [x, y, w, h];

            drawRosterRow(game, idx, unit, y, h, tokensLeft) {
                let x = 14;
                let w = CANVAS_W - 28;
                let s = STATS[unit.type];
                let nextTier = UPGRADES[unit.type];
                let upgCost = nextTier ? STATS[nextTier].cost : 0;
                let canUp = nextTier && tokensLeft >= upgCost;

                // Row background
                this.ctx.fillStyle = idx % 2 === 0 ? '#2a2826' : '#252321';
                this.ctx.fillRect(x, y, w, h);

                // Unit color tag
                this.ctx.fillStyle = unit.player === 1 ? P1_COLOR : P2_COLOR;
                this.ctx.fillRect(x, y, 4, h);

                // Name + invested (vertically centered)
                let compact = h < 36;
                this.ctx.fillStyle = '#ffffff';
                this.ctx.font = compact ? 'bold 12px Arial' : 'bold 14px Arial';
                this.ctx.textAlign = 'left';
                if (compact) {
                    this.ctx.fillText(`${unit.type}  (${INVESTED[unit.type]}t · HP ${s.hp})`, x + 14, y + h / 2 + 4);
                } else {
                    this.ctx.fillText(`${unit.type}`, x + 14, y + h * 0.38);
                    this.ctx.fillStyle = '#b2aca4';
                    this.ctx.font = '11px Arial';
                    this.ctx.fillText(`${INVESTED[unit.type]}t invested · HP ${s.hp}`, x + 14, y + h * 0.72);
                }

                // Remove button
                let btnH = Math.min(h - 6, 30);
                let btnPad = (h - btnH) / 2;
                this.drawButton(game, `remove_${idx}`, x + 220, y + btnPad, 80, btnH, '✕ Remove', {color: '#6a2a2a', font: 'bold 11px Arial'});

                // Upgrade button (or tier max)
                if (nextTier) {
                    this.drawButton(game, `upgrade_${idx}`, x + w - 210, y + btnPad, 200, btnH,
                        `▲ ${nextTier} (+${upgCost}t)`, {color: canUp ? '#46a046' : '#3a3a3a', enabled: canUp, font: 'bold 12px Arial'});
                } else {
                    this.ctx.fillStyle = '#ffcc44';
                    this.ctx.font = 'bold 12px Arial';
                    this.ctx.textAlign = 'right';
                    this.ctx.fillText('MAX TIER', x + w - 14, y + h / 2 + 4);
                }
            }

            drawRemoteWaitForOpponent(game) {

                // Banner stripe across the top of the UI panel so the player

            // Big synchronized 3-2-1 countdown before the battle resolves.
            drawRemoteCountdown(game) {
                this.ctx.fillStyle = '#0d1018';
                this.ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                let cx = CANVAS_W / 2, cy = CANVAS_H / 2;
                this.ctx.fillStyle = '#b2aca4';
                this.ctx.font = 'bold 22px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('Battle begins in...', cx, cy - 120);

                let start = game.remoteCountdownStart || performance.now();
                let elapsed = performance.now() - start;
                // 3 full seconds: show "3" for t∈[0,1s), "2" for [1,2), "1" for [2,3), blank after.
                let secondsLeft = 3 - Math.floor(elapsed / 1000);
                if (secondsLeft < 1) secondsLeft = null;

                if (secondsLeft) {
                    // Scale/fade pulse inside each second tick.
                    let intoSec = (elapsed % 1000) / 1000;
                    let scale = 1.4 - 0.4 * intoSec;   // starts big, shrinks
                    let alpha = 1 - Math.pow(intoSec, 2.5);  // fades out by end
                    this.ctx.save();
                    this.ctx.translate(cx, cy);
                    this.ctx.scale(scale, scale);
                    this.ctx.font = '900 180px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.lineWidth = 8;
                    this.ctx.strokeStyle = `rgba(20, 5, 0, ${alpha})`;
                    this.ctx.strokeText(String(secondsLeft), 0, 0);
                    this.ctx.fillStyle = `rgba(255, 170, 60, ${alpha})`;
                    this.ctx.fillText(String(secondsLeft), 0, 0);
                    this.ctx.textBaseline = 'alphabetic';
                    this.ctx.restore();
                } else {
                    // Brief "Fight!" flash before resolveAction takes over.
                    this.ctx.fillStyle = '#ff9a4a';
                    this.ctx.font = '900 80px Arial';
                    this.ctx.fillText('FIGHT!', cx, cy + 20);
                }
            }
