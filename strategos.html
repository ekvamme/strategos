                        // Vanguard: Squire killing blow grants +1 mov next turn
                        if (u.type === 'Squire' && tgt.hp <= 0) {
                            u._squireKilledThisTurn = true;
                            u._activeSynergies = [...(u._activeSynergies||[]), 'Vanguard'];
                        }

                        // Last Stand bonus cleave (handled like Knight cleave below,
                        // for an isolated Squire only).
                        let effectiveCleave = STATS[u.type].cleave;
                        if (u.type === 'Squire' && u._lastStand) effectiveCleave = 1;

                        if (effectiveCleave > 0 && i === 0 && STATS[u.type].rng === 1) {
                            let [dr, dc] = direction;
                            let perpR = -dc, perpC = dr;
                            let cleaveTargs = [
                                [u.plannedR + dr + perpR, u.plannedC + dc + perpC],
                                [u.plannedR + dr - perpR, u.plannedC + dc - perpC],
                                [u.plannedR + perpR, u.plannedC + perpC],
                                [u.plannedR - perpR, u.plannedC - perpC]
                            ];
                            let cleaved = new Set();
                            for (let j = 0; j < Math.min(effectiveCleave, 4); j++) {
                                let [cr, cc] = cleaveTargs[j];
                                if (cr >= 0 && cr < ROWS && cc >= 0 && cc < COLS) {
                                    let ct = this.getPlannedUnitAt(cr, cc);
                                    if (ct && ct.player !== u.player && !cleaved.has(ct)) {
                                        cleaved.add(ct);
                                        this.hit(u, ct, true, damageType, 1, 0, 'Cleave');
                                    }
                                }
                            }
                        }
                    }
                }

                // --- RESOLVE VOLLEY PAIRS ---
                // Each archer hits its committed target tile for FULL damage,
                // and the tile one step further in the same firing direction
                // takes HALF damage. Trailing tile is lost if it's off-board.
                for (let {a, b, dr, dc, dist} of volleyPairs) {
                    if (a.hp <= 0 && b.hp <= 0) continue;
                    for (let shooter of [a, b]) {
                        if (shooter.hp <= 0) continue;
                        let mainR = shooter.plannedR + dr * dist;
                        let mainC = shooter.plannedC + dc * dist;
                        if (mainR >= 0 && mainR < ROWS && mainC >= 0 && mainC < COLS) {
                            let t = this.getPlannedUnitAt(mainR, mainC);
                            if (t && t.player !== shooter.player) {
                                this.hit(shooter, t, false, null, 1, 0, 'Volley');
                            }
                        }
                        let trailR = mainR + dr;
                        let trailC = mainC + dc;
                        if (trailR >= 0 && trailR < ROWS && trailC >= 0 && trailC < COLS) {
                            let t2 = this.getPlannedUnitAt(trailR, trailC);
                            if (t2 && t2.player !== shooter.player) {
                                this.hit(shooter, t2, true, null, 1, 0, 'Volley trail');
                            }
                        }
                    }
                }

                // --- RESOLVE ARCING FIREBOLT SPLASHES ---
                for (let burst of arcingBursts) {
                    for (let [sdr, sdc] of burst.splashes) {
                        let sr = burst.r + sdr, sc = burst.c + sdc;
                        if (sr < 0 || sr >= ROWS || sc < 0 || sc >= COLS) continue;
                        let victim = this.getPlannedUnitAt(sr, sc);
                        if (!victim) continue;
                        let caster = burst.casters[0];
                        if (victim.player === caster.player) continue;
                        this.hit(caster, victim, true, null, 1, 0, 'Arcing Firebolt splash');
                    }
                }

                this.p1Units = this.p1Units.filter(u => u.hp > 0);
                this.p2Units = this.p2Units.filter(u => u.hp > 0);
                this.turn++;

                // "The Culling": starting on turn cullingTurn (default 10, host-configurable
                // on the BUDGET screen), every surviving unit loses ceil(25% of maxHp) at the
                // end of the turn. Applies every subsequent turn too until somebody
                // wipes — prevents infinite stalemates. If both sides lose their
                // last units on the same turn (here or via combat), getGameOver()
                // reports a draw.
                if (this.turn >= this.cullingTurn) {
                    for (let u of [...this.p1Units, ...this.p2Units]) {
                        let attrition = Math.max(1, Math.ceil(u.hp * 0.25));
                        u.hp -= attrition;
                        this.recordDamage(u, attrition, 'cull');
                        if (this.combatLog) {
                            let tName = u.player === 1 ? 'P1' : 'P2';
                            this.combatLog.push(`${tName} ${u.type} [Attrition]: ${attrition} dmg (25% of ${u.hp + attrition} remaining HP)`);
                        }
                    }
                    this.p1Units = this.p1Units.filter(u => u.hp > 0);
                    this.p2Units = this.p2Units.filter(u => u.hp > 0);
                }

                // Beacon Mark upkeep: any beacon whose owner died is removed.
                let liveUnits = new Set([...this.p1Units, ...this.p2Units]);
                this.beacons = this.beacons.filter(b => liveUnits.has(b.ownerId));

                // End-of-turn synergy stack updates (on survivors).
                for (let u of [...this.p1Units, ...this.p2Units]) {
                    let moved = (u.plannedR !== null && (u.plannedR !== u.r || u.plannedC !== u.c));
                    // Accuracy (Archer): stack if didn't move AND targeted same tile as last turn.
                    if (u.type === 'Archer') {
                        let tr = u.plannedAtk && u.plannedAtk.targetR != null ? u.plannedAtk.targetR : null;
                        let tc = u.plannedAtk && u.plannedAtk.targetC != null ? u.plannedAtk.targetC : null;
                        if (!moved && tr != null && tr === u.lastTargetR && tc === u.lastTargetC) {
                            u.accuracyStack = Math.min(3, u.accuracyStack + 1);
                        } else {
                            u.accuracyStack = 0;
                        }
                        u.lastTargetR = tr;
                        u.lastTargetC = tc;
                    }
                    // Focused Channeling (Adept): +1 Magic dmg per stationary turn
                    if (u.type === 'Adept') {
                        if (!moved) {
                            u.focusChannelStack = Math.min(5, u.focusChannelStack + 1);
                        } else {
                            u.focusChannelStack = 0;
                        }
                    }
                    // Vanguard +1 mov was applied to THIS turn's planning, so
                    // consume it now that the turn has resolved.
                    if (u.vanguardMov) u.vanguardMov = 0;
                    // The kill detection below re-arms vanguardMov for NEXT turn
                    // before it's consumed, so we check kills before zeroing —
                    // but kills set vanguardMov in the attack loop above, which
                    // runs BEFORE this block. So we need a separate flag for
                    // "this kill happened this turn" to carry forward.
                }
                // Re-arm vanguardMov from this turn's kills (squireKilledThisTurn
                // was set during attack resolution — copy into vanguardMov for
                // the NEXT turn).
                for (let u of [...this.p1Units, ...this.p2Units]) {
                    if (u._squireKilledThisTurn) {
                        u.vanguardMov = 1;
                        u._squireKilledThisTurn = false;
                    }
                }

                this.buildAnimationFromResolution(allUnits, origPos, animAttacks);
            }

            // Build animation state (moves + attacks) consumed by drawActionAnim().
            // Called at the end of resolveAction so the ACTION_RESOLVE phase plays
            // an animated battle sequence before auto-advancing to PLAN_P1.
            buildAnimationFromResolution(allUnits, origPos, animAttacks) {
                let moves = [];
                let deadUnits = [];
                for (let u of allUnits) {
                    let orig = origPos.get(u);
                    let alive = u.hp > 0;
                    let endR, endC;
                    if (alive) {
                        endR = u.r;
                        endC = u.c;
                    } else {
                        endR = u.plannedR != null ? u.plannedR : orig.r;
                        endC = u.plannedC != null ? u.plannedC : orig.c;
                        deadUnits.push(u);
                    }
                    let blinked = !!u._blinked;
                    if (u._blinked) u._blinked = false;
                    moves.push({
                        unit: u,
                        startR: orig.r,
                        startC: orig.c,
                        endR, endC,
                        alive,
                        blinked
                    });
                }
                // Aggregate damage events per unit so multiple hits on the
                // same target (cleave + trap, combined-arms focus fire, etc.)
                // surface as ONE floating number instead of a stacked blur.
                let dmgMap = new Map();
                for (let d of (this.pendingDamages || [])) {
                    let prev = dmgMap.get(d.unit);
                    if (!prev) dmgMap.set(d.unit, {
                        unit: d.unit, amount: 0, kind: d.kind, hits: []
                    });
                    let e = dmgMap.get(d.unit);
                    e.amount += d.amount;
                    if (d.kind === 'dmg') e.kind = 'dmg';
                    e.hits.push({
                        amount: d.amount,
                        attacker: d.attacker ? d.attacker.type : null,
                        attackerPlayer: d.attacker ? d.attacker.player : null,
                        attackerUnit: d.attacker || null,
                        damageType: d.damageType,
                        kind: d.kind
                    });
                }
                let damages = [];
                for (let e of dmgMap.values()) {
                    let r = e.unit.r != null ? e.unit.r : (e.unit.plannedR != null ? e.unit.plannedR : 0);
                    let c = e.unit.c != null ? e.unit.c : (e.unit.plannedC != null ? e.unit.plannedC : 0);
                    let targetType = e.unit.type;
                    let targetHp = e.unit.hp;
                    let targetMaxHp = e.unit.maxHp;
                    let dead = e.unit.hp <= 0;
                    let targetPlayer = e.unit.player;
                    damages.push({ r, c, amount: e.amount, kind: e.kind,
                        targetType, targetPlayer, targetHp, targetMaxHp, dead, hits: e.hits });
                }
                this.pendingDamages = [];

                this.animation = {
                    startTime: performance.now(),
                    // Bumped to 3000ms so the 2-second float-up has time to
                    // complete after the attack window ends at ~1870ms.
                    duration: 3000,
                    moves,
                    attacks: animAttacks,
                    deadUnits,
                    damages
                };

                // Populate the combat log div
                let logDiv = document.getElementById('combatLog');
                if (logDiv && this.combatLog && this.combatLog.length > 0) {
                    logDiv.style.display = 'block';
                    logDiv.innerHTML = '<div style="color:#f0c040;font-weight:bold;margin-bottom:6px;font-family:Arial,sans-serif;font-size:14px;">⚔ Combat Log — Turn ' + this.turn + '</div>' +
                        this.combatLog.map(line => {
                            let color = '#ccc';
                            if (line.includes('[Squeeze]') || line.includes('INSTANT KILL')) color = '#ff6666';
                            else if (line.includes('[Attrition]')) color = '#c084fc';
                            else if (line.includes('Amp:')) color = '#60d0ff';
                            else if (line.includes('[Trap')) color = '#ffa040';
                            else if (line.includes('[Rain Fire')) color = '#ff8040';
                            else if (line.includes('[Cleave]')) color = '#e0e080';
                            return '<div style="color:' + color + ';padding:1px 0;">' + line.replace(/→/g, '→') + '</div>';
                        }).join('');
                    logDiv.scrollTop = 0;
                } else if (logDiv) {
                    logDiv.style.display = 'none';
                }
            }

            getGameOver() {
                // 0 = ongoing, 1 = P1 wins, 2 = P2 wins, 3 = draw.
                // Both sides empty = simultaneous wipe (e.g. last-unit mutual
                // kill or coincident attrition deaths) → DRAW.
                let p1Dead = this.p1Units.length === 0;
                let p2Dead = this.p2Units.length === 0;
                if (p1Dead && p2Dead) return 3;
                if (p1Dead) return 2;
                if (p2Dead) return 1;
                return 0;
            }

            recordCampaignResult() {
                if (this.gameMode !== 'Campaign') return;
                let winner = this.getGameOver();
                if (winner === 1) this.campaignScore[0]++;
                else if (winner === 2) this.campaignScore[1]++;
                // Draw (3) doesn't count — the rematch button re-plays the match.
            }

            nextPhase() {
                // Remote mode uses a completely different, concurrent state
                // machine: each client progresses through its own SHOP/PLACE/
                // PLAN suffix independently, and they only synchronize at the
                // REMOTE_WAIT → countdown → resolve boundary. See
                // remoteNextPhase() for the full flow.
                if (this.gameMode === 'Remote') {
                    this.remoteNextPhase();
                    return;
                }
                let phases = ['BUDGET', 'SHOP_P1', 'HANDOFF_S', 'SHOP_P2', 'PLACE_P1', 'HANDOFF_P', 'PLACE_P2', 'PLAN_P1', 'HANDOFF_PP', 'PLAN_P2', 'READY_ACTION', 'ACTION_RESOLVE'];
                let idx = phases.indexOf(this.phase);

                if (this.phase === 'MENU') {
                    idx = 0;
                } else if (this.phase === 'ACTION_RESOLVE') {
                    if (this.getGameOver()) {
                        this.recordCampaignResult();
                        this.phase = 'GAME_OVER';
                        return;
                    }
                    idx = phases.indexOf('PLAN_P1');
                } else {
                    idx = (idx + 1) % phases.length;
                }

                if (idx >= 0 && idx < phases.length) {
                    this.phase = phases[idx];
                }

                // In AI / Campaign / Remote modes, skip "pass the device" handoff
                // screens and the READY_ACTION confirmation — player hits Ready
                // and battle resolves immediately without extra clicks. (Remote
                // skips HANDOFF because each client is on a different computer.)
                if ((this.gameMode === 'AI' || this.gameMode === 'Campaign' || this.gameMode === 'Remote')
                    && (this.phase.startsWith('HANDOFF') || this.phase === 'READY_ACTION')) {
                    this.nextPhase();
                    return;
                }

                if (this.phase === 'SHOP_P1') {
                    this.selectedUnit = null;
                    this.planStep = null;
                } else if (this.phase === 'SHOP_P2') {
                    if (this.gameMode === 'AI' || this.gameMode === 'Campaign') {
                        this.aiShop();
                        this.nextPhase();
                    } else {
                        this.selectedUnit = null;
                        this.planStep = null;
                    }
                } else if (this.phase === 'PLACE_P1') {
                    this.selectedUnit = null;
                } else if (this.phase === 'PLACE_P2') {
                    if (this.gameMode === 'AI' || this.gameMode === 'Campaign') {
                        this.aiPlace();
                        this.nextPhase();
                    } else {
                        this.selectedUnit = null;
                    }
                } else if (this.phase === 'PLAN_P1') {
                    this.selectedUnit = null;
                    this.planStep = null;
                    for (let u of this.p1Units) u.ordered = false;
                } else if (this.phase === 'PLAN_P2') {
                    if (this.gameMode === 'AI' || this.gameMode === 'Campaign') {
                        this.aiPlan();
                        this.nextPhase();
                    } else {
                        this.selectedUnit = null;
                        this.planStep = null;
                        for (let u of this.p2Units) u.ordered = false;
                    }
                } else if (this.phase === 'ACTION_RESOLVE') {
                    this.resolveAction();
                }
            }

            // =====================================================
            // REMOTE (concurrent) phase machine
            // =====================================================
            // Each client drives its own phase sequence independently.
            // There is no "other player's turn" — both shop/place/plan
            // in parallel. The only sync points are:
            //   1. Host's BUDGET confirmation  → both clients enter their SHOP phase
            //   2. Both players reach REMOTE_WAIT → exchange state, host triggers countdown
            //   3. REMOTE_COUNTDOWN expires     → both call resolveAction (same seeded RNG)
            //   4. ACTION_RESOLVE animation ends → both loop back to PLAN_P{me}
            remoteNextPhase() {
                let me = this.localPlayer;                 // 1 = host, 2 = guest
                let myShop  = 'SHOP_P'  + me;
                let myPlace = 'PLACE_P' + me;
                let myPlan  = 'PLAN_P'  + me;
                let myUnits = me === 1 ? this.p1Units : this.p2Units;

                if (this.phase === 'BUDGET') {
                    // Only the host ever calls nextPhase() from BUDGET; the
                    // guest sits in BUDGET with a "waiting" overlay and gets
                    // kicked to their SHOP phase by a 'budget' message.
                    this.phase = myShop;
                    this.selectedUnit = null;
                    this.planStep = null;
                    if (this.conn) {
                        try { this.conn.send({t: 'budget', val: this.budget, cullingTurn: this.cullingTurn}); } catch(e){}
                    }
                    return;
                }
                if (this.phase === myShop) {
                    this.phase = myPlace;
                    this.selectedUnit = null;
                    return;
                }
                if (this.phase === myPlace) {
                    // Don't jump straight to PLAN — both players need to see
                    // the full board with opponent pieces first. Push our
                    // placement to the opponent immediately, then show the
                    // reveal screen with a "Ready" button.
                    this.phase = 'REMOTE_PLACE_REVEAL';
                    this.selectedUnit = null;
                    this.planStep = null;
                    this.remoteSendPlacement();
                    return;
                }
                if (this.phase === 'REMOTE_PLACE_REVEAL') {
                    // Local player clicked "Ready" on the reveal screen.
                    // Park in REMOTE_PLACE_WAIT until both sides are ready,
                    // then host pushes both into PLAN_P{me}.
                    this.phase = 'REMOTE_PLACE_WAIT';
                    this.remotePlaceMyReady = true;
                    this.remoteSendPlaceReady();
                    this.remoteTryStartPlan();
                    return;
                }
                if (this.phase === myPlan) {
                    // Local player is done with their orders. Park in
                    // REMOTE_WAIT and push our state to the opponent.
                    this.phase = 'REMOTE_WAIT';
                    this.remoteMyReady = true;
                    this.remoteSendReady();
                    this.remoteTryStartCountdown();
                    return;
                }
                if (this.phase === 'ACTION_RESOLVE') {
                    // Animation just finished. Game-over check first.
                    if (this.getGameOver()) {
                        this.phase = 'GAME_OVER';
                        return;
                    }
                    // Loop straight back to planning. No shop/place on
                    // subsequent rounds; just pick new orders and re-sync.
                    this.phase = myPlan;
                    this.selectedUnit = null;
                    this.planStep = null;
                    // Clear ready flags for the next round's sync handshake.
                    this.remoteMyReady = false;
                    this.remoteOpponentReady = false;
                    this.remoteOpponentSnapshot = null;
                    this.remoteCountdownStart = null;
                    for (let u of myUnits) u.ordered = false;
                    return;
                }
            }

            // Ship our full state (units + traps) to the opponent. Called
            // exactly once per round when the local player finishes PLAN.
            remoteSendReady() {
                if (!this.conn) return;
                let me = this.localPlayer;
                let myUnits = me === 1 ? this.p1Units : this.p2Units;
                let myTraps = this.traps.filter(t => t.player === me);
                let myBeacons = this.beacons.filter(b => b.player === me)
                    .map(b => ({player: b.player, r: b.r, c: b.c, ownerIdRef: b.ownerId ? b.ownerId.id : null}));
                try {
                    this.conn.send({
                        t: 'ready',
                        units: myUnits.map(serializeUnit),
                        traps: myTraps.map(t => ({...t})),
                        beacons: myBeacons
                    });
                } catch (e) {
                    console.warn('remote ready send failed', e);
                }
            }

            // Ship just our placed units (no plans yet) to the opponent
            // the instant we leave PLACE_P{me}. This lets the opponent see
            // our pieces on the reveal screen while they finish their own
            // placement or decide to hit Ready.
            remoteSendPlacement() {
                if (!this.conn) return;
                let me = this.localPlayer;
                let myUnits = me === 1 ? this.p1Units : this.p2Units;
                try {
                    this.conn.send({
                        t: 'place_snapshot',
                        units: myUnits.map(serializeUnit)
                    });
                    console.log('[remote] sent place_snapshot with', myUnits.length, 'units');
                } catch (e) {
                    console.warn('remote placement send failed', e);
                }
            }

            // Tell the opponent we clicked Ready on the reveal screen.
            // Includes our current roster as a failsafe in case the initial
            // place_snapshot got dropped — the opponent can merge it in
            // before transitioning to PLAN.
            remoteSendPlaceReady() {
                if (!this.conn) return;
                let me = this.localPlayer;
                let myUnits = me === 1 ? this.p1Units : this.p2Units;
                try {
                    this.conn.send({
                        t: 'place_ready',
                        units: myUnits.map(serializeUnit)
                    });
                    console.log('[remote] sent place_ready (role:', this.remoteRole, ')');
                } catch (e) {
                    console.warn('remote place_ready send failed', e);
                }
            }

            // Host-only: when both sides clicked Ready on the reveal screen,
            // push everyone to PLAN_P{me} so the first round of planning can
            // begin with full visibility of the board.
            remoteTryStartPlan() {
                if (this.remoteRole !== 'host') return;
                console.log('[remote] tryStartPlan:', {
                    phase: this.phase,
                    myReady: this.remotePlaceMyReady,
                    oppReady: this.remotePlaceOpponentReady,
                    p1: this.p1Units.length,
                    p2: this.p2Units.length
                });
                if (!this.remotePlaceMyReady || !this.remotePlaceOpponentReady) return;
                // Be lenient about the phase check: if we're still in REVEAL
                // (hadn't yet clicked our own Ready but somehow both flags
                // got set), or already in WAIT, treat that as "ok to advance".
                // The alternative — silently no-op'ing — was letting players
                // get stuck after placement.
                if (this.phase !== 'REMOTE_PLACE_WAIT' && this.phase !== 'REMOTE_PLACE_REVEAL') return;
                try { this.conn.send({t: 'start_plan'}); } catch (e) {}
                console.log('[remote] host transitioning to PLAN_P1');
                this.phase = 'PLAN_P1';
                this.selectedUnit = null;
                this.planStep = null;
                for (let u of this.p1Units) u.ordered = false;
                // These flags only fire once (at the start of the match).
                this.remotePlaceMyReady = false;
                this.remotePlaceOpponentReady = false;
            }

            // Host-only: if both sides are ready, announce the countdown
            // start and transition both clients to REMOTE_COUNTDOWN. Merges
            // any deferred opponent snapshot first so resolveAction() — which
            // runs on the same seeded RNG on both sides — sees a consistent
            // view of the board on both clients.
            remoteTryStartCountdown() {
                if (this.remoteRole !== 'host') return;
                if (!this.remoteMyReady || !this.remoteOpponentReady) return;
                if (this.phase === 'REMOTE_COUNTDOWN') return;    // already running
                if (this.remoteOpponentSnapshot) {
                    remoteMergeOpponentSnapshot(this);
                }
                try { this.conn.send({t: 'countdown'}); } catch (e) {}
                this.remoteCountdownStart = performance.now();
                this.phase = 'REMOTE_COUNTDOWN';
            }

            // ===== AI SHOP =====
            aiShop() {
                this.p2Units = [];
                let budget = this.budget;
                if (this.difficulty === 'Easy') {
                    // Random L1 units
                    while (budget >= 1) {
                        let t = L1_UNITS[Math.floor(Math.random() * L1_UNITS.length)];
                        this.p2Units.push(new Unit(2, t));
                        budget -= 1;
                    }
                } else if (this.difficulty === 'Medium') {
                    // Pre-built mixed compositions
                    let comps = [
                        ['Knight', 'Rogue', 'Mage'],
                        ['Knight', 'Archer', 'Archer', 'Adept'],
                        ['Mage', 'Rogue', 'Squire', 'Squire'],
                        ['Knight', 'Knight', 'Adept'],
                        ['Rogue', 'Mage', 'Squire', 'Archer'],
                    ];
                    let affordable = comps.filter(c => c.reduce((s,t) => s + INVESTED[t], 0) <= budget);
                    if (affordable.length > 0) {
                        let comp = affordable[Math.floor(Math.random() * affordable.length)];
                        for (let t of comp) {
                            this.p2Units.push(new Unit(2, t));
                            budget -= INVESTED[t];
                        }
                    }
                    // Fill remaining with L1
                    while (budget >= 1 && this.p2Units.length < MAX_ROSTER) {
                        let t = L1_UNITS[Math.floor(Math.random() * L1_UNITS.length)];
                        this.p2Units.push(new Unit(2, t));
                        budget -= 1;
                    }
                } else {
                    // Hard: strong synergy compositions
                    let comps = [
                        ['Paladin', 'Rogue', 'Archer'],
                        ['Archmage', 'Knight', 'Squire'],
                        ['Paladin', 'Mage'],
                        ['Knight', 'Rogue', 'Mage'],
                        ['Assassin', 'Knight', 'Adept'],
                        ['Paladin', 'Archmage'],
                    ];
                    // Filter to affordable
                    let affordable = comps.filter(c => c.reduce((s,t) => s + INVESTED[t], 0) <= this.budget);
                    if (affordable.length > 0) {
                        let comp = affordable[Math.floor(Math.random() * affordable.length)];
                        for (let t of comp) {
                            this.p2Units.push(new Unit(2, t));
                            budget -= INVESTED[t];
                        }
                    }
                    // Fill remaining budget with L1 units
                    while (budget >= 1 && this.p2Units.length < MAX_ROSTER) {
                        let t = L1_UNITS[Math.floor(Math.random() * L1_UNITS.length)];
                        this.p2Units.push(new Unit(2, t));
                        budget -= 1;
                    }
                }
            }

            // ===== AI PLACE =====
            aiPlace() {
                let zone = P2_ZONE;
                let positions = [];
                for (let r = zone[0]; r <= zone[1]; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (!this.getUnitAt(r, c)) positions.push([r, c]);
                    }
                }
                if (this.difficulty === 'Easy') {
                    // Random placement
                    for (let i = positions.length - 1; i > 0; i--) {
                        let j = Math.floor(Math.random() * (i + 1));
                        [positions[i], positions[j]] = [positions[j], positions[i]];
                    }
                } else if (this.difficulty === 'Hard') {
                    // Melee in front row (4), ranged/magic in back row (5)
                    let front = positions.filter(([r]) => r === zone[0]);
                    let back = positions.filter(([r]) => r === zone[1]);
                    let melee = this.p2Units.filter(u => STATS[u.type].rng === 1);
                    let ranged = this.p2Units.filter(u => STATS[u.type].rng > 1);
                    for (let u of melee) {
                        let pos = front.length > 0 ? front.shift() : (back.length > 0 ? back.shift() : positions.shift());
                        if (pos) { u.r = pos[0]; u.c = pos[1]; }
                    }
                    for (let u of ranged) {
                        let pos = back.length > 0 ? back.shift() : (front.length > 0 ? front.shift() : positions.shift());
                        if (pos) { u.r = pos[0]; u.c = pos[1]; }
                    }
                    return;
                }
                // Easy/Medium: sequential or shuffled
                for (let u of this.p2Units) {
                    if (positions.length > 0) {
                        let pos = positions.shift();
                        u.r = pos[0];
                        u.c = pos[1];
                    }
                }
            }

            // ===== AI PLAN =====
            aiPlan() {
                if (this.difficulty === 'Easy') this.aiPlanEasy();
                else if (this.difficulty === 'Medium') this.aiPlanMedium();
                else this.aiPlanHard();
            }

            aiPlanEasy() {
                // Random movement and attack
                for (let u of this.p2Units) {
                    let moves = this.getValidMoves(u);
                    if (moves.length > 0) {
                        let m = moves[Math.floor(Math.random() * moves.length)];
                        u.plannedR = m[0]; u.plannedC = m[1];
                    } else {
                        u.plannedR = u.r; u.plannedC = u.c;
                    }
                    this.aiAssignAttack(u);
                    u.ordered = true;
                }
            }

            aiPlanMedium() {
                // Move toward nearest enemy, best attack
                for (let u of this.p2Units) {
                    let moves = this.getValidMoves(u);
                    let bestMove = [u.r, u.c];
                    let minDist = 999;
                    for (let [mr, mc] of moves) {
                        let minD = 999;
                        for (let e of this.p1Units) {
                            let d = Math.max(Math.abs(e.r - mr), Math.abs(e.c - mc));
                            minD = Math.min(minD, d);
                        }
                        if (minD < minDist) { minDist = minD; bestMove = [mr, mc]; }
                    }
                    u.plannedR = bestMove[0]; u.plannedC = bestMove[1];
                    this.aiAssignAttack(u);
                    u.ordered = true;
                }
            }

            aiPlanHard() {
                // Role-based tactics: melee protect ranged, ranged target weakest, focus fire
                let enemies = [...this.p1Units];
                // Sort enemies by HP ascending (focus weakest)
                enemies.sort((a, b) => a.hp - b.hp);
                let focusTarget = enemies.length > 0 ? enemies[0] : null;

                for (let u of this.p2Units) {
                    let moves = this.getValidMoves(u);
                    let isMelee = STATS[u.type].rng === 1;
                    let bestMove = [u.r, u.c];

                    if (isMelee) {
                        // Melee: advance toward focus target, prefer charge when possible
                        let bestScore = -9999;
                        for (let [mr, mc] of moves) {
                            let score = 0;
                            if (focusTarget) {
                                let d = Math.abs(focusTarget.r - mr) + Math.abs(focusTarget.c - mc);
                                score -= d * 10;
                            }
                            // Bonus for charge moves
                            if (this.isChargeMove(u, u.r, u.c, mr, mc)) score += 15;
                            // Bonus for being adjacent to an enemy
                            for (let e of this.p1Units) {
                                let ed = Math.abs(e.r - mr) + Math.abs(e.c - mc);
                                if (ed === 1) score += 20;
                            }
                            if (score > bestScore) { bestScore = score; bestMove = [mr, mc]; }
                        }
                    } else {
                        // Ranged/Magic: stay at range, prefer positions with good firing lanes.
                        // Use Chebyshev to match actual attack reach; add a soft pull
                        // toward the nearest enemy when out of range so Archers don't
                        // rot in the back row when the front line has advanced past them.
                        let rng = STATS[u.type].rng;
                        let bestScore = -9999;
                        for (let [mr, mc] of moves) {
                            let score = 0;
                            let minEnemyCheb = 999;
                            for (let e of this.p1Units) {
                                let d = Math.max(Math.abs(e.r - mr), Math.abs(e.c - mc));
                                minEnemyCheb = Math.min(minEnemyCheb, d);
                                if (d <= 1) score -= 30; // too close
                                else if (d <= rng) score += 10; // in range
                            }
                            // If NO enemy is within range, advance toward the nearest
                            // one. Mild gradient so this breaks ties without
                            // overriding the safety / in-range / cover signals above.
                            if (minEnemyCheb > rng && minEnemyCheb < 999) {
                                score -= minEnemyCheb;
                            }
                            // Prefer having friendly melee between self and enemies
                            for (let f of this.p2Units) {
                                if (f !== u && STATS[f.type].rng === 1) {
                                    for (let e of this.p1Units) {
                                        let myDist = Math.max(Math.abs(e.r - mr), Math.abs(e.c - mc));
                                        let fDist = Math.max(Math.abs(e.r - f.r), Math.abs(e.c - f.c));
                                        if (fDist < myDist) score += 5; // friend is closer to enemy
                                    }
                                }
                            }
                            if (score > bestScore) { bestScore = score; bestMove = [mr, mc]; }
                        }
                    }
                    u.plannedR = bestMove[0]; u.plannedC = bestMove[1];

                    // Hard AI: prioritize focus target for attack direction
                    this.aiAssignAttackHard(u, focusTarget);
                    u.ordered = true;
                }
            }

            // Predict where enemy `e` will be at resolve-time. If they have a
            // plannedR (in AI vs AI that's already set by the time this runs),
            // use that; otherwise fall back to current position.
            predictEnemyTile(e) {
                if (e.plannedR != null && e.plannedC != null) return {r: e.plannedR, c: e.plannedC};
                return {r: e.r, c: e.c};
            }

            aiAssignAttack(u) {
                if (STATS[u.type].rng === 1) {
                    let atks = this.getValidAttacks(u, u.plannedR, u.plannedC);
                    for (let {r, c, dir} of atks) {
                        let t = this.getPlannedUnitAt(r, c);
                        if (t && t.player === 1) {
                            let isCharge = this.isChargeMove(u, u.r, u.c, u.plannedR, u.plannedC);
                            u.plannedAtk = {r, c, damageType: null, isCharge, direction: dir};
                            break;
                        }
                    }
                } else if (STATS[u.type].tileTarget) {
                    // Tile-target ranged (Archer/Rogue/Assassin/Mage/Archmage):
                    // pick the enemy-predicted tile within effective range that
                    // maximizes expected damage. Score = 1 per enemy in range.
                    let rng = this.getEffectiveRange(u);
                    let bestTile = null, bestScore = -999;
                    let enemies = u.player === 1 ? this.p2Units : this.p1Units;
                    for (let e of enemies) {
                        let p = this.predictEnemyTile(e);
                        let dist = Math.max(Math.abs(p.r - u.plannedR), Math.abs(p.c - u.plannedC));
                        let onBeacon = u.type === 'Archer' && this.beacons.some(b =>
                            b.player === u.player && b.r === p.r && b.c === p.c);
                        if (dist === 0) continue;
                        if (dist > rng && !onBeacon) continue;
                        let score = 10 + (e.maxHp - e.hp); // prefer damaged
                        // Accuracy: repeating same target carries bonus — so a
                        // stationary archer that aimed here last turn scores higher.
                        if (u.type === 'Archer' && u.lastTargetR === p.r && u.lastTargetC === p.c
                            && u.plannedR === u.r && u.plannedC === u.c) {
                            score += 5 * (u.accuracyStack + 1);
                        }
                        if (onBeacon) score += 40; // Beacon Mark = 3X damage
                        if (score > bestScore) { bestScore = score; bestTile = p; }
                    }
                    if (bestTile) u.plannedAtk = {r: 0, c: 0, damageType: null, isCharge: false, targetR: bestTile.r, targetC: bestTile.c};
                } else if (STATS[u.type].firebolt) {
                    // Adept still directional.
                    let best = null, bestScore = -999;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            let targets = this.resolveFireboltPath(u.plannedR, u.plannedC, dr, dc, u);
                            let enemyCount = targets.filter(t => t.player !== u.player).length;
                            if (enemyCount > bestScore) { bestScore = enemyCount; best = [dr, dc]; }
                        }
                    }
                    if (best && bestScore > 0) u.plannedAtk = {r: 0, c: 0, damageType: null, isCharge: false, direction: best};
                }
            }

            aiAssignAttackHard(u, focusTarget) {
                if (STATS[u.type].rng === 1) {
                    let atks = this.getValidAttacks(u, u.plannedR, u.plannedC);
                    let bestAtk = null, bestPriority = -999;
                    for (let {r, c, dir} of atks) {
                        let t = this.getPlannedUnitAt(r, c);
                        if (t && t.player === 1) {
                            let priority = 0;
                            if (focusTarget && t === focusTarget) priority += 100;
                            priority += (t.maxHp - t.hp);
                            let isCharge = this.isChargeMove(u, u.r, u.c, u.plannedR, u.plannedC);
                            if (priority > bestPriority) {
                                bestPriority = priority;
                                bestAtk = {r, c, damageType: null, isCharge, direction: dir};
                            }
                        }
                    }
                    if (bestAtk) u.plannedAtk = bestAtk;
                } else if (STATS[u.type].tileTarget) {
                    // Tile-target ranged: pick tile containing focus target if in
                    // range, else highest-value enemy-predicted tile.
                    let rng = this.getEffectiveRange(u);
                    let bestTile = null, bestScore = -999;
                    let enemies = u.player === 1 ? this.p2Units : this.p1Units;
                    for (let e of enemies) {
                        let p = this.predictEnemyTile(e);
                        let dist = Math.max(Math.abs(p.r - u.plannedR), Math.abs(p.c - u.plannedC));
                        let onBeacon = u.type === 'Archer' && this.beacons.some(b =>
                            b.player === u.player && b.r === p.r && b.c === p.c);
                        if (dist === 0) continue;
                        if (dist > rng && !onBeacon) continue;
                        let score = 10;
                        if (focusTarget && e === focusTarget) score += 50;
                        score += (e.maxHp - e.hp) * 2;
                        if (u.type === 'Archer' && u.lastTargetR === p.r && u.lastTargetC === p.c
                            && u.plannedR === u.r && u.plannedC === u.c) {
                            score += 8 * (u.accuracyStack + 1);
                        }
                        if (onBeacon) score += 60; // Beacon Mark = 3X damage, huge priority
                        // Prefer targeting a tile next to a friendly Squire (Anvil & Hammer)
                        if (u.type === 'Archer') {
                            let allies = u.player === 1 ? this.p1Units : this.p2Units;
                            for (let f of allies) {
                                if (f.type !== 'Squire' || f === u) continue;
                                if (Math.max(Math.abs(f.plannedR - p.r), Math.abs(f.plannedC - p.c)) <= 1) {
                                    score += 5; break;
                                }
                            }
                        }
                        if (score > bestScore) { bestScore = score; bestTile = p; }
                    }
                    if (bestTile) u.plannedAtk = {r: 0, c: 0, damageType: null, isCharge: false, targetR: bestTile.r, targetC: bestTile.c};
                } else if (STATS[u.type].firebolt) {
                    let bestDir = null, bestScore = -999;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            let targets = this.resolveFireboltPath(u.plannedR, u.plannedC, dr, dc, u);
                            let score = 0;
                            for (let t of targets) {
                                if (t.player !== u.player) {
                                    score += 10;
                                    if (focusTarget && t === focusTarget) score += 50;
                                    score += (t.maxHp - t.hp) * 2;
                                }
                            }
                            if (score > bestScore) { bestScore = score; bestDir = [dr, dc]; }
                        }
                    }
                    if (bestDir && bestScore > 0) u.plannedAtk = {r: 0, c: 0, damageType: null, isCharge: false, direction: bestDir};
                }
            }
        }

        // ===== RENDERER CLASS =====
        class Renderer {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
            }

            isoCenter(r, c) {
                let ox = CANVAS_W / 2;
                let oy = GRID_Y + PIECE_H + 12 + ISO_TH;
                return [ox + (c - r) * ISO_TW, oy + (c + r) * ISO_TH];
            }

            drawTile(r, c, color) {
                let [x, y] = this.isoCenter(r, c);
                // Top face
                this.ctx.fillStyle = color;
                this.ctx.beginPath();
                this.ctx.moveTo(x, y - ISO_TH);
                this.ctx.lineTo(x + ISO_TW, y);
                this.ctx.lineTo(x, y + ISO_TH);
                this.ctx.lineTo(x - ISO_TW, y);
                this.ctx.closePath();
                this.ctx.fill();
                this.ctx.strokeStyle = '#786c56';
                this.ctx.lineWidth = 0.5;
                this.ctx.stroke();
                // Left side
                this.ctx.fillStyle = this.darken(color, 0.8);
                this.ctx.beginPath();
                this.ctx.moveTo(x - ISO_TW, y);
                this.ctx.lineTo(x, y + ISO_TH);
                this.ctx.lineTo(x, y + ISO_TH + ISO_TD);
                this.ctx.lineTo(x - ISO_TW, y + ISO_TD);
                this.ctx.closePath();
                this.ctx.fill();
                // Right side
                this.ctx.fillStyle = this.darken(color, 0.7);
                this.ctx.beginPath();
                this.ctx.moveTo(x + ISO_TW, y);
                this.ctx.lineTo(x, y + ISO_TH);
                this.ctx.lineTo(x, y + ISO_TH + ISO_TD);
                this.ctx.lineTo(x + ISO_TW, y + ISO_TD);
                this.ctx.closePath();
                this.ctx.fill();
            }

            darken(hex, factor) {
                let r = parseInt(hex.slice(1, 3), 16);
                let g = parseInt(hex.slice(3, 5), 16);
                let b = parseInt(hex.slice(5, 7), 16);
                return `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
            }

            drawUnit(u, highlight, overrideRC) {
                let rr = u.r, cc = u.c;
                if (overrideRC) { rr = overrideRC[0]; cc = overrideRC[1]; }
                let [cx, cy] = this.isoCenter(rr, cc);
                let color = u.player === 1 ? P1_COLOR : P2_COLOR;
                // Bright, high-contrast team-color accent used for rings/tints so
                // players can tell at a glance which units are theirs. These are
                // purposefully saturated versions of the base team colors.
                let teamAccent = u.player === 1 ? '#5aa6ff' : '#ff6a6a';
                let teamAccentDeep = u.player === 1 ? '#1e66ff' : '#ff2f2f';

                // Tier-based sizing: L1 compact, L2 medium, L3 impressive
                let [sw, sh] = spriteSize(u.type);

                // Anchor sprite so its plinth BASE (bottom of SVG viewBox) sits just
                // below the tile's isometric center, making pieces look planted on
                // the tile's top face. All 9 SVGs place their plinth at viewBox-bottom.
                const PLINTH_OFFSET = 6;
                let sx = cx - sw / 2;
                let sy = cy - sh + PLINTH_OFFSET;

                // Team-colored plinth ring under the unit — a filled ellipse
                // that reads as a team banner underfoot. Drawn BEFORE the
                // sprite so the sprite sits on top of it.
                this.ctx.save();
                this.ctx.fillStyle = teamAccentDeep;
                this.ctx.globalAlpha = 0.85;
                this.ctx.beginPath();
                this.ctx.ellipse(cx, cy + PLINTH_OFFSET, 18, 7, 0, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.globalAlpha = 1;
                this.ctx.strokeStyle = teamAccent;
                this.ctx.lineWidth = 2;
                this.ctx.stroke();
                this.ctx.restore();

                let sprite = UNIT_SPRITES[u.type + '_' + u.player];
                let drew = false;
                if (sprite && sprite.complete && sprite.naturalWidth > 0) {
                    this.ctx.drawImage(sprite, sx, sy, sw, sh);
                    drew = true;
                }
                if (!drew) {
                    // Fallback silhouette (only during initial async image decode)
                    this.ctx.fillStyle = color;
                    this.ctx.fillRect(cx - sw / 3, sy + 10, (sw * 2) / 3, sh - 16);
                }

                // Upper team-color chevron — a tiny colored pennant above the
                // unit's head that always renders on top of the sprite.
                let pennantY = sy + 4;
                this.ctx.fillStyle = teamAccentDeep;
                this.ctx.beginPath();
                this.ctx.moveTo(cx - 6, pennantY);
                this.ctx.lineTo(cx + 6, pennantY);
                this.ctx.lineTo(cx, pennantY + 6);
                this.ctx.closePath();
                this.ctx.fill();
                this.ctx.strokeStyle = '#000';
                this.ctx.lineWidth = 0.8;
                this.ctx.stroke();

                if (highlight) {
                    this.ctx.strokeStyle = '#ffff00';
                    this.ctx.lineWidth = 2;
                    this.ctx.strokeRect(sx, sy, sw, sh);
                }

                // HP bar under the plinth. Color tiers: ≥66% green, 33–66% yellow, <33% red.
                let hpFrac = Math.max(0, u.hp) / u.maxHp;
                let hpColor = hpFrac < 0.33 ? '#e03030' : hpFrac < 0.66 ? '#e8c030' : '#34c04a';
                let barW = 36;
                let barH = 7;
                let barX = cx - barW / 2;
                let barY = cy + PLINTH_OFFSET + 4;
                // Dark backing so depleted portion is visually clear
                this.ctx.fillStyle = 'rgba(0,0,0,0.55)';
                this.ctx.fillRect(barX, barY, barW, barH);
                // Filled portion
                this.ctx.fillStyle = hpColor;
                this.ctx.fillRect(barX, barY, hpFrac * barW, barH);
                // Border
                this.ctx.strokeStyle = '#000';
                this.ctx.lineWidth = 1;
                this.ctx.strokeRect(barX, barY, barW, barH);

                // Facing arrow (8-direction). Drawn just below the HP bar so
                // it sits on the tile face and reads in any of the 8 directions.
                // Defensive aura indicator: pulsating shield icon over any
                // friendly within 1 tile of a same-team Paladin. Uses live
                // positions so the ally visibly carries the shield on the
                // board at all times.
                if (typeof game !== 'undefined' && game && (game.p1Units || game.p2Units)
                    && u.type !== 'Paladin' && u.r != null) {
                    let all = [...(game.p1Units || []), ...(game.p2Units || [])];
                    let buffed = false;
                    for (let ally of all) {
                        if (ally === u) continue;
                        if (ally.player !== u.player) continue;
                        if (ally.type !== 'Paladin') continue;
                        if (ally.r == null) continue;
                        if (Math.abs(ally.r - u.r) <= 1 && Math.abs(ally.c - u.c) <= 1) {
                            buffed = true; break;
                        }
                    }
                    if (buffed) {
                        let pulse = 0.55 + 0.45 * Math.sin(performance.now() / 260);
                        let sxC = cx + sw / 2 - 2;   // top-right shoulder
                        let syC = sy + 12;
                        // Pulsating golden halo behind the shield
                        this.ctx.beginPath();
                        this.ctx.arc(sxC, syC, 10 + 2 * pulse, 0, Math.PI * 2);
                        this.ctx.fillStyle = `rgba(255,220,120,${0.25 + 0.25 * pulse})`;
                        this.ctx.fill();
                        // Shield body (heater shape)
                        this.ctx.save();
                        this.ctx.translate(sxC, syC);
                        this.ctx.scale(1 + 0.06 * pulse, 1 + 0.06 * pulse);
                        this.ctx.beginPath();
                        this.ctx.moveTo(0, -7);
                        this.ctx.lineTo(6, -5);
                        this.ctx.lineTo(6, 2);
                        this.ctx.quadraticCurveTo(6, 7, 0, 8);
                        this.ctx.quadraticCurveTo(-6, 7, -6, 2);
                        this.ctx.lineTo(-6, -5);
                        this.ctx.closePath();
                        this.ctx.fillStyle = `rgba(120,190,255,${0.85})`;
                        this.ctx.fill();
                        this.ctx.strokeStyle = '#0e2744';
                        this.ctx.lineWidth = 1.4;
                        this.ctx.stroke();
                        // Gold cross/chevron on shield
                        this.ctx.strokeStyle = `rgba(255,220,120,${0.9})`;
                        this.ctx.lineWidth = 1.6;
                        this.ctx.beginPath();
                        this.ctx.moveTo(0, -5);
                        this.ctx.lineTo(0, 5);
                        this.ctx.moveTo(-4, 0);
                        this.ctx.lineTo(4, 0);
                        this.ctx.stroke();
                        this.ctx.restore();
                    }
                }

                if (u.facing) {
                    let [fdr, fdc] = u.facing;
                    let len = Math.hypot(fdr, fdc) || 1;
                    let ux = fdc / len, uy = fdr / len;
                    let baseX = cx, baseY = barY + 15; // arrow center (below HP bar)
                    let armR = 8;
                    // Arrow tip + tail
                    let tipX = baseX + ux * armR;
                    let tipY = baseY + uy * armR;
                    let tailX = baseX - ux * armR * 0.6;
                    let tailY = baseY - uy * armR * 0.6;
                    // Two barbs perpendicular at tip
                    let perpX = -uy, perpY = ux;
                    let barbA = 5, barbB = 4;
                    let bxA = tipX - ux * barbA + perpX * barbB;
                    let byA = tipY - uy * barbA + perpY * barbB;
                    let bxB = tipX - ux * barbA - perpX * barbB;
                    let byB = tipY - uy * barbA - perpY * barbB;
                    let arrowColor = u.player === 1 ? '#3a78ff' : '#ff5050';
                    let traceArrow = () => {
                        this.ctx.moveTo(tailX, tailY);
                        this.ctx.lineTo(tipX, tipY);
                        this.ctx.moveTo(bxA, byA);
                        this.ctx.lineTo(tipX, tipY);
                        this.ctx.lineTo(bxB, byB);
                    };
                    this.ctx.strokeStyle = '#000';
                    this.ctx.lineWidth = 2.5;
                    this.ctx.lineCap = 'round';
                    this.ctx.beginPath();
                    traceArrow();
                    this.ctx.stroke();
                    this.ctx.strokeStyle = arrowColor;
                    this.ctx.lineWidth = 1.5;
                    this.ctx.beginPath();
                    traceArrow();
                    this.ctx.stroke();
                }

                // ===== SYNERGY INDICATOR BADGES =====
                // Small colored glyphs above the unit when their positioning
                // triggers a synergy ability. One badge per synergy, stacked
                // horizontally. Drawn on top of everything else.
                if (u._activeSynergies && u._activeSynergies.length > 0) {
                    const BADGES = {
                        HighGround:     {glyph: '⇑',  color: '#9af0ff', title: 'High Ground', desc: 'Back-row Archer gets +1 attack range'},
                        Volley:         {glyph: '⇶', color: '#ffd090', title: 'Volley', desc: '2 Archers targeting the same tile — both deal +2 dmg'},
                        Accuracy:       {glyph: '◎',  color: '#ffe74c', title: 'Accuracy', desc: 'Stationary Archer repeating the same target — +1 dmg per stack'},
                        SteadyAim:      {glyph: '✦',  color: '#b0f0ff', title: 'Steady Aim', desc: 'Archer with friendly Squire directly in front — +2 Pierce dmg'},
                        AnvilHammer:    {glyph: '⚒',  color: '#ff9a50', title: 'Anvil & Hammer', desc: 'Archer targets a tile adjacent to friendly Squire — +1 Pierce dmg'},
                        FlameArrow:     {glyph: '🔥', color: '#ff7a30', title: 'Flame Arrow', desc: 'Archer and Adept target the same tile — arrow deals Magic dmg instead'},
                        LastStand:      {glyph: '✚',  color: '#e0e0ff', title: 'Last Stand', desc: 'Isolated Squire with no adjacent allies — +3 Melee defense'},
                        Vanguard:       {glyph: '➤',  color: '#80ff80', title: 'Vanguard', desc: 'Squire scored a kill last turn — +1 movement this turn'},
                        ArcingFirebolt: {glyph: '✺',  color: '#ff60a0', title: 'Arcing Firebolt', desc: '2+ magic users targeting the same tile — bolts arc to adjacent enemies'},
                        FocusedChan:    {glyph: '◈',  color: '#a080ff', title: 'Focused Channeling', desc: 'Stationary Adept — +1 Magic dmg per turn held still'},
                        Phalanx:        {glyph: '▥',  color: '#cfd8ff', title: 'Phalanx', desc: '3+ Squires in a line — +2 Melee defense, halts enemy charges'},
                    };
                    let shown = [];
                    for (let s of u._activeSynergies) {
                        if (BADGES[s] && !shown.find(x => x.name === s)) {
                            shown.push({name: s, ...BADGES[s]});
                        }
                    }
                    // Focused Channeling indicator from stack count (not a synergy flag)
                    if (u.type === 'Adept' && u.focusChannelStack > 0 && !shown.find(x => x.name === 'FocusedChan')) {
                        shown.push({name: 'FocusedChan', ...BADGES.FocusedChan});
                    }
                    // Accuracy indicator from stack count
                    if (u.type === 'Archer' && u.accuracyStack > 0 && !shown.find(x => x.name === 'Accuracy')) {
                        shown.push({name: 'Accuracy', ...BADGES.Accuracy});
                    }
                    const BADGE_SIZE = 11;
                    let bw = shown.length * (BADGE_SIZE + 2);
                    let bx0 = cx - bw / 2;
                    let by = sy - 2;
                    for (let i = 0; i < shown.length; i++) {
                        let bx = bx0 + i * (BADGE_SIZE + 2);
                        let bcx = bx + BADGE_SIZE / 2;
                        let bcy = by + BADGE_SIZE / 2;
                        this.ctx.fillStyle = 'rgba(0,0,0,0.7)';
                        this.ctx.beginPath();
                        this.ctx.arc(bcx, bcy, BADGE_SIZE / 2 + 1, 0, Math.PI * 2);
                        this.ctx.fill();
                        this.ctx.strokeStyle = shown[i].color;
                        this.ctx.lineWidth = 1;
                        this.ctx.stroke();
                        this.ctx.fillStyle = shown[i].color;
                        this.ctx.font = 'bold 10px Arial';
                        this.ctx.textAlign = 'center';
                        this.ctx.textBaseline = 'middle';
                        this.ctx.fillText(shown[i].glyph, bcx, bcy + 1);
                        // Register for hover hit-testing
                        if (!this._badgeHitAreas) this._badgeHitAreas = [];
                        this._badgeHitAreas.push({
                            x: bcx, y: bcy, r: BADGE_SIZE / 2 + 2,
                            title: shown[i].title, desc: shown[i].desc,
                            color: shown[i].color, glyph: shown[i].glyph
                        });
                    }
                    this.ctx.textBaseline = 'alphabetic';
                }
            }

            drawBoard(game) {
                this.ctx.fillStyle = '#1c1a18';
                this.ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

                // Refresh synergy flags during gameplay so indicator badges
                // and phalanx aura light up in real time.
                if (game.phase !== 'MENU' && game.phase !== 'TUTORIAL'
                    && game.phase !== 'BUDGET' && !game.phase.startsWith('SHOP')
                    && !game.phase.startsWith('HANDOFF') && !game.phase.startsWith('REMOTE_')) {
                    game.computeSynergies();
                }

                // Draw tiles in painter's order (back to front)
                for (let s = 0; s <= ROWS + COLS - 2; s++) {
                    for (let r = 0; r < ROWS; r++) {
                        let c = s - r;
                        if (c < 0 || c >= COLS) continue;
                        let color = (r + c) % 2 === 0 ? '#dac69e' : '#b29c74';
                        this.drawTile(r, c, color);
                    }
                }

                // During action resolution, draw animated movement + attack effects
                if (game.phase === 'ACTION_RESOLVE' && game.animation) {
                    this.drawActionAnim(game);
                    return;
                }

                // Draw traps belonging to the active planning player so they
                // can see what they've placed (opponent never sees these).
                // During REMOTE_WAIT we've already committed our plan, so keep
                // showing our own traps/planned traps to reinforce "orders in".
                let planningViewPlayer = null;
                if (game.phase === 'PLAN_P1') planningViewPlayer = 1;
                else if (game.phase === 'PLAN_P2') planningViewPlayer = 2;
                else if (game.phase === 'REMOTE_WAIT' && game.gameMode === 'Remote') planningViewPlayer = game.localPlayer;
                if (planningViewPlayer !== null) {
                    let myPlayer = planningViewPlayer;
                    // Existing on-board traps owned by this player
                    for (let t of game.traps) {
                        if (t.player === myPlayer) this.drawTrap(t.r, t.c, false);
                    }
                    // Existing beacons owned by this player
                    for (let b of game.beacons) {
                        if (b.player === myPlayer) this.drawBeacon(b.r, b.c, false);
                    }
                    // Newly-planned trap/beacon for currently-selected unit (preview)
                    let myUnits = myPlayer === 1 ? game.p1Units : game.p2Units;
                    for (let u of myUnits) {
                        if (u.plannedTrap) this.drawTrap(u.plannedTrap.r, u.plannedTrap.c, true);
                        if (u.plannedBeacon) this.drawBeacon(u.plannedBeacon.r, u.plannedBeacon.c, true);
                    }
                }

                // Determine viewing player (for stealth visibility)
                let viewPlayer = null;
                if (game.phase === 'PLAN_P1' || game.phase === 'PLACE_P1' || game.phase === 'SHOP_P1') viewPlayer = 1;
                else if (game.phase === 'PLAN_P2' || game.phase === 'PLACE_P2' || game.phase === 'SHOP_P2') viewPlayer = 2;
                else if (game.phase === 'REMOTE_WAIT' && game.gameMode === 'Remote') viewPlayer = game.localPlayer;

                // Blind-placement visibility: during PLACE_P{n}, only the
                // active placing player sees their own units. In local hotseat
                // this stops P2 from peeking at P1's already-placed board when
                // the device is handed over; in Remote PvP the opponent's
                // roster isn't even synced yet, so this is a no-op there.
                let hideOpponentForPlacement = (game.phase === 'PLACE_P1' || game.phase === 'PLACE_P2');

                // Phalanx aura: glowing connection between 3+ Squires in a line.
                // Drawn under units so the glow sits on the tiles.
                // Respects placement visibility — don't reveal opponent positions.
                if (game.phase !== 'ACTION_RESOLVE' && !game.phase.startsWith('HANDOFF')) {
                    for (let team of [game.p1Units, game.p2Units]) {
                        let teamPlayer = team.length > 0 ? team[0].player : 0;
                        // During placement, only show aura for the active player
                        if (hideOpponentForPlacement && viewPlayer && teamPlayer !== viewPlayer) continue;
                        let squires = team.filter(u => u.type === 'Squire' && u._activeSynergies && u._activeSynergies.includes('Phalanx'));
                        if (squires.length < 3) continue;
                        let teamColor = squires[0].player === 1 ? 'rgba(100,140,255,' : 'rgba(255,100,100,';
                        let pulse = 0.4 + 0.2 * Math.sin(performance.now() / 500);
                        // Draw glow on each phalanx Squire's tile
                        for (let s of squires) {
                            let sr = s.plannedR != null ? s.plannedR : s.r;
                            let sc = s.plannedC != null ? s.plannedC : s.c;
                            if (sr == null) continue;
                            let [hx, hy] = this.isoCenter(sr, sc);
                            // Tile glow
                            this.ctx.save();
                            this.ctx.fillStyle = teamColor + (pulse * 0.3) + ')';
                            this.ctx.beginPath();
                            this.ctx.moveTo(hx, hy - ISO_TH);
                            this.ctx.lineTo(hx + ISO_TW, hy);
                            this.ctx.lineTo(hx, hy + ISO_TH);
                            this.ctx.lineTo(hx - ISO_TW, hy);
                            this.ctx.closePath();
                            this.ctx.fill();
                            this.ctx.restore();
                        }
                        // Draw connecting lines between adjacent phalanx Squires
                        for (let i = 0; i < squires.length; i++) {
                            for (let j = i + 1; j < squires.length; j++) {
                                let a = squires[i], b = squires[j];
                                let ar = a.plannedR != null ? a.plannedR : a.r;
                                let ac = a.plannedC != null ? a.plannedC : a.c;
                                let br = b.plannedR != null ? b.plannedR : b.r;
                                let bc = b.plannedC != null ? b.plannedC : b.c;
                                if (ar == null || br == null) continue;
                                let dr = Math.abs(ar - br), dc = Math.abs(ac - bc);
                                if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
                                    let [ax, ay] = this.isoCenter(ar, ac);
                                    let [bx, by] = this.isoCenter(br, bc);
                                    this.ctx.save();
                                    this.ctx.strokeStyle = teamColor + pulse + ')';
                                    this.ctx.lineWidth = 3;
                                    this.ctx.beginPath();
                                    this.ctx.moveTo(ax, ay);
                                    this.ctx.lineTo(bx, by);
                                    this.ctx.stroke();
                                    this.ctx.restore();
                                }
                            }
                        }
                    }
                }

                // Draw units in painter's order
                for (let s = 0; s <= ROWS + COLS - 2; s++) {
                    for (let r = 0; r < ROWS; r++) {
                        let c = s - r;
                        if (c < 0 || c >= COLS) continue;
                        let u = game.getUnitAt(r, c);
                        if (u) {
                            // Blind placement: don't reveal opponent units until both have placed
                            if (hideOpponentForPlacement && viewPlayer !== null && u.player !== viewPlayer) continue;
                            // Stealth visibility: hide opponent's stealthed assassins;
                            // show own stealthed at reduced alpha
                            if (u.stealthed && viewPlayer !== null && u.player !== viewPlayer) continue;
                            let isSel = u === game.selectedUnit;
                            let savedAlpha = this.ctx.globalAlpha;
                            if (u.stealthed && u.player === viewPlayer) this.ctx.globalAlpha = 0.45;
                            this.drawUnit(u, isSel);
                            this.ctx.globalAlpha = savedAlpha;
                        }
                    }
                }

                // "Donnie Darko" preview: for every ordered friendly unit,
                // show a translucent blue trail from its current tile to the
                // tile it's about to move to, plus a ghost copy of the unit
                // at the destination. Lets the player see all their planned
                // movements together before committing. Also visible during
                // REMOTE_WAIT so the player can review what they committed to.
                let previewOwner = null;
                if (game.phase === 'PLAN_P1') previewOwner = 1;
                else if (game.phase === 'PLAN_P2') previewOwner = 2;
                else if (game.phase === 'REMOTE_WAIT' && game.gameMode === 'Remote') previewOwner = game.localPlayer;
                if (previewOwner !== null) {
                    let myUnits = previewOwner === 1 ? game.p1Units : game.p2Units;
                    this.drawPlanPreview(game, myUnits);
                }

                // Aid target indicator (green halo on planned heal recipient)
                if (previewOwner !== null) {
                    let myPlayer = previewOwner;
                    let myUnits = myPlayer === 1 ? game.p1Units : game.p2Units;
                    for (let u of myUnits) {
                        if (u.plannedAid) {
                            let [hx, hy] = this.isoCenter(u.plannedAid.r, u.plannedAid.c);
                            this.ctx.beginPath();
                            this.ctx.arc(hx, hy - 4, 22, 0, Math.PI * 2);
                            this.ctx.strokeStyle = 'rgba(120,255,120,0.85)';
                            this.ctx.lineWidth = 3;
                            this.ctx.stroke();
                            this.ctx.fillStyle = 'rgba(120,255,120,0.95)';
                            this.ctx.font = 'bold 18px Arial';
                            this.ctx.textAlign = 'center';
                            this.ctx.fillText('✚', hx, hy + 2);
                        }
                        // Planned Rain Fire target — orange crosshair on AOE center
                        if (u.plannedRain) {
                            let cr = u.plannedRain.r, cc = u.plannedRain.c;
                            for (let dr = -1; dr <= 1; dr++) {
                                for (let dc = -1; dc <= 1; dc++) {
                                    let tr = cr + dr, tc = cc + dc;
                                    if (tr < 0 || tr >= ROWS || tc < 0 || tc >= COLS) continue;
                                    let [hx, hy] = this.isoCenter(tr, tc);
                                    this.ctx.beginPath();
                                    this.ctx.moveTo(hx, hy - ISO_TH / 2);
                                    this.ctx.lineTo(hx + ISO_TW / 2, hy);
                                    this.ctx.lineTo(hx, hy + ISO_TH / 2);
                                    this.ctx.lineTo(hx - ISO_TW / 2, hy);
                                    this.ctx.closePath();
                                    let isCenter = (dr === 0 && dc === 0);
                                    this.ctx.fillStyle = isCenter ? 'rgba(255,80,0,0.45)' : 'rgba(255,140,40,0.22)';
                                    this.ctx.fill();
                                    this.ctx.strokeStyle = 'rgba(255,80,0,0.9)';
                                    this.ctx.lineWidth = isCenter ? 2 : 1;
                                    this.ctx.stroke();
                                }
                            }
                            let [cx, cy] = this.isoCenter(cr, cc);
                            this.ctx.fillStyle = 'rgba(255,200,80,1)';
                            this.ctx.font = 'bold 18px Arial';
                            this.ctx.textAlign = 'center';
                            this.ctx.fillText('🔥', cx, cy + 4);
                        }
                        // Planned Blink target — blue marker on destination
                        if (u.plannedBlink) {
                            let [hx, hy] = this.isoCenter(u.plannedBlink.r, u.plannedBlink.c);
                            this.ctx.beginPath();
                            this.ctx.arc(hx, hy + 2, 18, 0, Math.PI * 2);
                            this.ctx.strokeStyle = 'rgba(120,180,255,0.95)';
                            this.ctx.lineWidth = 3;
                            this.ctx.stroke();
                            this.ctx.fillStyle = 'rgba(180,210,255,0.95)';
                            this.ctx.font = 'bold 18px Arial';
                            this.ctx.textAlign = 'center';
                            this.ctx.fillText('✦', hx, hy + 6);
                        }
                    }
                }
            }

            // "Donnie Darko"-style planned-move preview. For every ordered
            // friendly unit with a plannedR/plannedC, draws:
            //   * a translucent blue curved trail from u.r,u.c → planned tile
            //   * pulsing "gel" blobs sliding along the trail
            //   * a ghost silhouette of the unit at the destination
            //   * an attack vector (if the unit planned an attack)
            // Only runs during PLAN_P{me}.
            drawPlanPreview(game, units) {
                let t = performance.now() / 1000;
                let pulse = 0.6 + 0.4 * Math.sin(t * 2.5);

                this.ctx.save();
                for (let u of units) {
                    if (!u.ordered) continue;
                    if (u.r == null || u.c == null) continue;
                    if (u.plannedR == null || u.plannedC == null) continue;

                    let isMove = (u.plannedR !== u.r) || (u.plannedC !== u.c);
                    let [sx, sy] = this.isoCenter(u.r, u.c);
                    let [ex, ey] = this.isoCenter(u.plannedR, u.plannedC);

                    if (isMove) {
                        // Control point offset upward a bit so the trail arcs
                        // like a thrown ribbon rather than a straight line.
                        let mx = (sx + ex) / 2;
                        let my = (sy + ey) / 2 - 22;

                        // Outer wide glow
                        this.ctx.lineCap = 'round';
                        this.ctx.strokeStyle = `rgba(80, 160, 255, ${0.18 + 0.10 * pulse})`;
                        this.ctx.lineWidth = 18;
                        this.ctx.beginPath();
                        this.ctx.moveTo(sx, sy);
                        this.ctx.quadraticCurveTo(mx, my, ex, ey);
                        this.ctx.stroke();

                        // Inner bright trail
                        this.ctx.strokeStyle = `rgba(140, 210, 255, ${0.55 + 0.25 * pulse})`;
                        this.ctx.lineWidth = 8;
                        this.ctx.beginPath();
                        this.ctx.moveTo(sx, sy);
                        this.ctx.quadraticCurveTo(mx, my, ex, ey);
                        this.ctx.stroke();

                        // Bright core filament
                        this.ctx.strokeStyle = `rgba(230, 245, 255, ${0.7 + 0.2 * pulse})`;
                        this.ctx.lineWidth = 2.5;
                        this.ctx.beginPath();
                        this.ctx.moveTo(sx, sy);
                        this.ctx.quadraticCurveTo(mx, my, ex, ey);
                        this.ctx.stroke();

                        // Gel blobs crawling along the trail — three beads
                        // phased so one is always mid-way, creating motion.
                        let beads = 3;
                        for (let i = 0; i < beads; i++) {
                            let phase = ((t * 0.55) + i / beads) % 1;
                            let omp = 1 - phase;
                            // Quadratic Bezier sample
                            let bx = omp * omp * sx + 2 * omp * phase * mx + phase * phase * ex;
                            let by = omp * omp * sy + 2 * omp * phase * my + phase * phase * ey;
                            let fade = Math.sin(phase * Math.PI); // 0 at ends, 1 mid-trail
                            this.ctx.fillStyle = `rgba(180, 225, 255, ${0.55 * fade})`;
                            this.ctx.beginPath();
                            this.ctx.arc(bx, by, 6 + 2 * pulse, 0, Math.PI * 2);
